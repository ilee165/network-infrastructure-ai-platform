# NEGATIVE fixture (ADR-0029 §6 / ADR-0044 §1) — a Redis Sentinel config ConfigMap
# that INLINES a `requirepass` literal in the .conf. The password must be supplied
# as REDIS_PASSWORD env from the platform Secret at startup, NEVER baked into the
# ConfigMap (a ConfigMap is non-secret and is dumped freely). MUST be DENIED by the
# no-inline-secret config rule.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netops-redis-sentinel-config
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: redis
data:
  redis.conf: |
    appendonly yes
    appendfsync everysec
    requirepass hunter2-leaked-in-configmap
    dir /data
    port 6379
