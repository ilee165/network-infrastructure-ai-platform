# NEGATIVE — api PDB with minAvailable 0 (allows a drain to take the tier to
# zero). PRODUCTION.md §3.2: "a node drain must never take api to zero." MUST be
# DENIED.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: netops-api
  namespace: netops
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: api
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: netops
      app.kubernetes.io/component: api
