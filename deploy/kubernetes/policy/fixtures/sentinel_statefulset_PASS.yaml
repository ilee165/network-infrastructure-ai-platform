# POSITIVE fixture (ADR-0044 §1) — a compliant Sentinel StatefulSet: 3 Sentinels
# (odd quorum), runs Sentinel with a `sentinel monitor` directive, REDIS_PASSWORD
# by-reference, fully hardened. MUST PASS conftest (no false-reject). Pairs with the
# DENY Sentinel fixtures so a too-strict regression also fails the bite.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netops-redis-sentinel
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: redis-sentinel
spec:
  replicas: 3
  serviceName: netops-redis-sentinel-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: netops
      app.kubernetes.io/component: redis-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netops
        app.kubernetes.io/component: redis-sentinel
    spec:
      serviceAccountName: redis-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sentinel
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              echo "sentinel monitor netops-redis netops-redis-0.netops-redis-headless 6379 2" >> /data/sentinel.conf
              echo "sentinel auth-pass netops-redis $REDIS_PASSWORD" >> /data/sentinel.conf
              exec redis-server /data/sentinel.conf --sentinel
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netops-dev-secrets
                  key: redis-password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
