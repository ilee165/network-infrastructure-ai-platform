# POSITIVE — the compliant api HPA shape (W2-T1, ADR-0043 §1). minReplicas 2,
# CPU + request-rate dual signal, Deployment target. MUST PASS the apiscale.*
# rules (no false-reject).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: netops-api
  namespace: netops
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: netops-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "50"
