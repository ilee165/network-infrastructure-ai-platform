# NEGATIVE fixture (ADR-0044 §1) — a Sentinel StatefulSet (3 replicas) whose pods
# run a PLAIN redis-server with NO `--sentinel` flag and NO `sentinel monitor`
# directive. It monitors nothing and provides NO automatic failover — the whole
# point of the Sentinel tier is absent. MUST be DENIED by both the runs-sentinel and
# has-monitor rules. Fully hardened + 3 replicas — the ONLY violation is that it
# never actually runs Sentinel.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netops-redis-sentinel
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: redis-sentinel
spec:
  replicas: 3
  serviceName: netops-redis-sentinel-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: netops
      app.kubernetes.io/component: redis-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netops
        app.kubernetes.io/component: redis-sentinel
    spec:
      serviceAccountName: redis-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sentinel
          image: redis:7-alpine
          command: ["sh", "-c", "exec redis-server --port 26379 --requirepass $REDIS_PASSWORD"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netops-dev-secrets
                  key: redis-password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
