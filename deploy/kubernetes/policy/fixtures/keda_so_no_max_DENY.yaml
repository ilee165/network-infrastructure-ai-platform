# NEGATIVE — a ScaledObject with NO maxReplicaCount. A missing ceiling inherits
# the KEDA default (100), so over an isolated queue one queue's burst could
# consume the whole node budget and STARVE the others — the §329 failure per-queue
# isolation forbids. MUST be DENIED by the workerscale explicit-ceiling rule
# (ADR-0043 §3 / G-SCA §329). Carries a valid Sentinel trigger + by-ref auth so
# ONLY the missing-ceiling rule bites.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: netops-worker-discovery
  namespace: netops
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: worker-scaling
    netops.io/celery-queue: "discovery"
spec:
  scaleTargetRef:
    name: netops-worker-discovery
  minReplicaCount: 1
  triggers:
    - type: redis-sentinel
      metadata:
        sentinelAddresses: "netops-redis-sentinel-0.netops-redis-sentinel-headless:26379"
        sentinelMaster: "netops-redis"
        listName: "discovery"
        listLength: "5"
      authenticationRef:
        name: netops-redis-auth
