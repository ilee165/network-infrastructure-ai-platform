# NEGATIVE fixture (ADR-0029 §6 / ADR-0044 §1) — a Sentinel-tier Redis StatefulSet
# that INLINES the REDIS_PASSWORD as a literal `value:` instead of a secretKeyRef.
# The credential would then sit in the rendered manifest / Helm history. MUST be
# DENIED by the by-reference rule (and the inline-literal rule). Fully hardened, 3
# replicas — the ONLY violation is the inlined password.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netops-redis
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: redis
spec:
  replicas: 3
  serviceName: netops-redis-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: netops
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netops
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: redis-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["sh", "-c", "exec redis-server /etc/redis/redis.conf --requirepass $REDIS_PASSWORD --masterauth $REDIS_PASSWORD"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: REDIS_PASSWORD
              value: hunter2-inlined-credential
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/redis
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: netops-redis-sentinel-config
