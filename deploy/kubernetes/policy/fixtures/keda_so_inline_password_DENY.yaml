# NEGATIVE — a ScaledObject that INLINES the Redis password into the trigger
# metadata instead of supplying it by-reference via a TriggerAuthentication. An
# inlined credential is a secret-surface leak in the rendered manifest / commit.
# MUST be DENIED by the workerscale credential-by-reference rule. (It also still
# carries a valid redis-sentinel trigger so ONLY the inline-password rule bites.)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: netops-worker-config
  namespace: netops
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: worker-scaling
    netops.io/celery-queue: "config"
spec:
  scaleTargetRef:
    name: netops-worker-config
  minReplicaCount: 1
  maxReplicaCount: 6
  triggers:
    - type: redis-sentinel
      metadata:
        sentinelAddresses: "netops-redis-sentinel-0.netops-redis-sentinel-headless:26379"
        sentinelMaster: "netops-redis"
        listName: "config"
        listLength: "5"
        password: "super-secret-redis-password"
