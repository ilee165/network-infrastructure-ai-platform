# NEGATIVE fixture (ADR-0044 §1) — a Sentinel-tier Redis StatefulSet with only 1
# replica (it mounts -redis-sentinel-config so it IS the HA-tier StatefulSet, not the
# single-instance default). A 1-replica "HA" shard has no replica to promote on a
# primary loss — failover is impossible. MUST be DENIED by the >=3-replicas rule.
# (Fully hardened otherwise, so the ONLY violation is the replica count.)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netops-redis
  labels:
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  serviceName: netops-redis-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: netops
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netops
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: redis-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["sh", "-c", "exec redis-server /etc/redis/redis.conf --requirepass $REDIS_PASSWORD --masterauth $REDIS_PASSWORD"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netops-dev-secrets
                  key: redis-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/redis
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: netops-redis-sentinel-config
