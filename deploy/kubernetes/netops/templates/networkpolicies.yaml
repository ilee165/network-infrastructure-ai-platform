{{- /*
W4 platform NetworkPolicies (ADR-0029 §2 / PRODUCTION.md §3.1) — the firewall
spec for the GA install namespace. The §3.1 topology diagram IS the firewall:
every allow below maps edge-for-edge to a §2 arrow; there is NO allow that is not
an arrow there, and NO empty-`to` (blanket) allow.

Posture (secure-by-default, ADR-0029 §0 — opt-out never opt-in):
- `default-deny-all` selects every pod in the install namespace and denies ALL
  ingress + egress. Every policy below is additive on top of that floor.
- DNS egress is allowed cluster-wide (kube-dns :53) — without it default-deny
  breaks Service-name resolution for every pod.
- Per-edge allows (ADR-0029 §2 table):
    ingress-controller → frontend:8080   (LB --> FE, the SOLE ingress front door)
    frontend           → api:8000        (nginx same-origin reverse proxy, ADR-0012 §2)
    api                → postgres:5432    (A --> PG, P1 direct; PgBouncer is P2)
    api                → neo4j:7687       (A --> NEO)
    api                → redis:6379       (A --> RED)
    worker             → postgres:5432    (WD/WC/WX --> PG)
    worker             → neo4j:7687       (WD/WC/WX --> NEO)
    worker             → redis:6379       (WD/WC/WX --> RED)
    api,worker         → ollama:11434     (A -. LLM .-> OLL — ONLY if ollama enabled)
- externalLlmEgress: OPT-IN, default off. When on, api+worker get a CONFINED
  egress allow to the external LLM provider CIDRs:443 — never an empty-`to` rule.
- NO blanket device-management egress: that is the packet-capture W3 policy
  (packet-capture-networkpolicy.yaml), confined to the segmented capture namespace.

The packet-capture / packet-analysis NetworkPolicies are W3-owned and live in
their own templates; this file does NOT touch them.

Disabling the whole set is a warned opt-out (`networkPolicy.enabled=false`,
NOTES.txt) — never the default.
*/ -}}
{{- if .Values.networkPolicy.enabled }}
{{- $fullname := include "netops.fullname" . }}
{{- $name := include "netops.name" . }}
{{- $ns := .Release.Namespace }}
# ---------------------------------------------------------------------------
# default-deny-all — the posture floor (ADR-0029 §2 / PRODUCTION.md §9).
# podSelector {} selects every pod in the namespace; with both policyTypes listed
# and no allow rules here, ALL ingress and egress is denied unless an additive
# policy below explicitly allows it.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-default-deny-all
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ---------------------------------------------------------------------------
# allow-dns-egress — every pod may reach kube-dns :53 UDP/TCP (otherwise
# default-deny breaks name resolution). Confined to the kube-dns selector.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-dns-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.namespaceSelectorLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- if .Values.services.frontend.enabled }}
---
# ---------------------------------------------------------------------------
# allow-ingress-to-frontend — §2 `LB --> FE`. The ingress controller is the SOLE
# front door; it reaches frontend:8080 only. Both the ingress namespace AND the
# controller pod labels are matched so only the real controller is permitted.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-ingress-to-frontend
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  podSelector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "frontend") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressController.namespaceSelectorLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressController.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.services.frontend.port }}
{{- end }}
{{- if and .Values.services.api.enabled .Values.services.frontend.enabled }}
---
# ---------------------------------------------------------------------------
# allow-frontend-to-api — §2 frontend → api:8000. nginx same-origin reverse
# proxy (ADR-0012 §2); this is the SOLE ingress path to api (no direct
# ingress-controller → api door).
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-frontend-to-api
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "api") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "frontend") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.services.api.port }}
{{- end }}
{{- if .Values.services.api.enabled }}
---
# ---------------------------------------------------------------------------
# allow-api-egress — §2 `A --> PG`, `A --> NEO`, `A --> RED` (+ ollama if
# enabled, below). Each `to` targets exactly one data-store component on its
# canonical port. No empty-`to` rule.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-api-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "api") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # api → postgres:5432 (A --> PG; P1 direct, PgBouncer is a P2 insert).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
    # api → neo4j:7687 (A --> NEO).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.neo4j.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.neo4j.port }}
    # api → redis:6379 (A --> RED).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.broker.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.broker.port }}
    {{- if .Values.services.ollama.enabled }}
    # api → ollama:11434 (A -. LLM .-> OLL — egress half of the §2 edge; the
    # ollama-side ingress allow is allow-llm-to-ollama. Renders ONLY when ollama
    # is enabled, so default-deny stays intact when the local-LLM profile is off).
    - to:
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "ollama") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.services.ollama.port }}
    {{- end }}
{{- end }}
{{- if .Values.services.worker.enabled }}
---
# ---------------------------------------------------------------------------
# allow-worker-egress — §2 `WD/WC/WX --> {PG,NEO,RED}`. The worker consumes the
# topology queue (→ Neo4j projection) and uses Redis as broker+backend. Each `to`
# targets one data-store component on its canonical port. No empty-`to` rule.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-worker-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  podSelector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "worker") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # worker → postgres:5432 (WD/WC/WX --> PG).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
    # worker → neo4j:7687 (WD/WC/WX --> NEO; topology projection consumer).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.neo4j.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.neo4j.port }}
    # worker → redis:6379 (WD/WC/WX --> RED; Celery broker + result backend).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.broker.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.broker.port }}
    {{- if .Values.services.ollama.enabled }}
    # worker → ollama:11434 (A -. LLM .-> OLL — egress half of the §2 edge; the
    # ollama-side ingress allow is allow-llm-to-ollama. Renders ONLY when ollama
    # is enabled, so default-deny stays intact when the local-LLM profile is off).
    - to:
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "ollama") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.services.ollama.port }}
    {{- end }}
{{- end }}
{{- if .Values.audit.chainVerify.enabled }}
---
# ---------------------------------------------------------------------------
# allow-audit-egress (A9, PR#76) — the audit-chain-verify CronJob pods (component
# `audit`) recompute the append-only audit_log hash chain and so MUST reach
# postgres:5432. Without this allow the default-deny floor (podSelector {}) blocks
# the connection and the audit-integrity job FAILS EVERY RUN (a default-on
# regression — audit.chainVerify.enabled is true by default). DNS is already
# granted cluster-wide by allow-dns-egress; this adds the ONE missing data-store
# edge (mirrors allow-worker-egress, scoped to Postgres only). No empty-`to` rule.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-audit-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: audit
spec:
  podSelector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "audit") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # audit-chain-verify → postgres:5432 (recomputes the audit_log hash chain).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
{{- end }}
{{- if .Values.credentials.rotation.enabled }}
---
# ---------------------------------------------------------------------------
# allow-credentials-egress (A9, PR#76) — the credential-rotation CronJob pods
# (component `credentials`) run the confirm-then-swap device-secret rotation pass,
# which reads/writes the credential rows in postgres:5432. Same default-deny gap as
# the audit job: without this allow the rotation pass cannot reach Postgres. Renders
# only when the (default-off) rotation tier is enabled. DNS is cluster-wide via
# allow-dns-egress; this adds the Postgres edge only. No empty-`to` rule.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-credentials-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: credentials
spec:
  podSelector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "credentials") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # credential-rotation → postgres:5432 (reads/updates the credential rows).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
{{- end }}
{{- if and .Values.services.neo4j.enabled .Values.services.neo4j.autoRebuild.enabled (or .Values.services.postgres.enabled .Values.cloudNativePg.enabled) }}
---
# ---------------------------------------------------------------------------
# allow-neo4j-rebuild-egress (W1-T3) — the automated-rebuild reconciler pods
# (component `neo4j-rebuild`) RE-PROJECT the topology: they READ the inventory from
# postgres:5432 (the system of record) and WRITE the projected graph to neo4j:7687.
# Same default-deny gap as the worker/audit jobs: without this allow the reconciler
# cannot reach either store and every rebuild FAILS, leaving the topology stale after
# a liveness-recreate. DNS is cluster-wide via allow-dns-egress; this adds the two §2
# data-store edges (mirrors allow-worker-egress, scoped to PG+NEO). No empty-`to` rule.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-neo4j-rebuild-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j-rebuild
spec:
  podSelector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "neo4j-rebuild") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # neo4j-rebuild → postgres:5432 (reads the normalized inventory to re-project).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
    # neo4j-rebuild → neo4j:7687 (writes the re-projected topology graph).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.neo4j.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.neo4j.port }}
{{- end }}
{{- if .Values.cloudNativePg.enabled }}
---
# ---------------------------------------------------------------------------
# allow-cnpg-pooler-ingress (W1-T1, ADR-0042 §3/§4) — under default-deny the
# PgBouncer Pooler (and the CNPG Cluster + the pgvector-replica smoke Job — ALL
# carry component=postgres) get NO ingress, so api/worker → pooler:5432 would be
# blocked and the HA tier could not serve a single connection. This allow lets the
# postgres-component pods ACCEPT ingress on 5432 from: api + worker (the app DB
# path through the Pooler), the audit/credential CronJobs, and OTHER
# postgres-component pods (pooler → cluster, smoke → cluster `-ro`, and intra-
# cluster streaming replication). Renders ONLY with the CNPG tier; allow-list
# minimal (one port, specific selectors — never an empty `from`).
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-cnpg-pooler-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.services.api.enabled }}
        # api → pooler:5432 (the app DB path through PgBouncer).
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "api") | nindent 14 }}
        {{- end }}
        {{- if .Values.services.worker.enabled }}
        # worker → pooler:5432.
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "worker") | nindent 14 }}
        {{- end }}
        {{- if .Values.audit.chainVerify.enabled }}
        # audit-chain-verify → pooler:5432.
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "audit") | nindent 14 }}
        {{- end }}
        {{- if .Values.credentials.rotation.enabled }}
        # credential-rotation → pooler:5432.
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "credentials") | nindent 14 }}
        {{- end }}
        # postgres → postgres:5432 (pooler → cluster, smoke → cluster `-ro`, and
        # intra-cluster streaming replication — all component=postgres).
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
---
# ---------------------------------------------------------------------------
# allow-cnpg-postgres-egress (W1-T1, ADR-0042 §3/§4) — the postgres-component pods
# (Pooler, Cluster, smoke Job) are selected by the default-deny floor, so their
# EGRESS is denied too. The Pooler must reach the Cluster primary, the smoke Job
# must reach the `-ro` replica Service, and the Cluster instances must reach each
# other for streaming replication — every hop is postgres → postgres:5432. This
# allows EXACTLY that intra-component edge (plus cluster-wide DNS via
# allow-dns-egress). No blanket egress — one port, the postgres selector only.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-cnpg-postgres-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # postgres → postgres:5432 (pooler → cluster, smoke → cluster `-ro`,
    # intra-cluster replication). DNS egress is granted cluster-wide separately.
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.postgres.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
{{- end }}
{{- if .Values.redisSentinel.enabled }}
---
# ---------------------------------------------------------------------------
# allow-redis-sentinel-client-egress (W1-T4, ADR-0044 §1) — under the default-deny
# floor the api/worker get NO egress to the Sentinels, so the failover-aware
# client (sentinel:// URL) could not query Sentinel for the current primary and
# the broker tier would be unreachable. The §2 `api/worker → redis:6379` broker
# edges (allow-api-egress / allow-worker-egress above) already permit the DATA
# port; this adds the ONE missing Sentinel-DISCOVERY edge (api/worker →
# sentinel:26379). Renders only with the Sentinel tier; allow-list minimal (one
# port, the sentinel selector — never an empty `to`). Skipped when both api and
# worker are disabled: operator: In with an empty values list is rejected by the
# Kubernetes API server as an invalid LabelSelectorRequirement.
# ---------------------------------------------------------------------------
{{- if or .Values.services.api.enabled .Values.services.worker.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-redis-sentinel-client-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-sentinel
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - {{ $name }}
      - key: app.kubernetes.io/component
        operator: In
        values:
          {{- if .Values.services.api.enabled }}
          - api
          {{- end }}
          {{- if .Values.services.worker.enabled }}
          - worker
          {{- end }}
  policyTypes:
    - Egress
  egress:
    # api/worker → sentinel:26379 (Sentinel primary-discovery query).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.sentinel.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.sentinel.port }}
{{- end }}
---
# ---------------------------------------------------------------------------
# allow-redis-sentinel-ingress (W1-T4, ADR-0044 §1) — the Sentinel pods accept
# ingress on :26379 from: api/worker (primary-discovery), OTHER Sentinels (the
# quorum gossip pub/sub), and the Redis pods (Sentinel↔Redis hello). Under
# default-deny the Sentinels would otherwise accept nothing and the quorum could
# never form. Allow-list minimal — one port, specific selectors, never empty `from`.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-redis-sentinel-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-sentinel
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.networkPolicy.sentinel.podSelectorLabels | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.services.api.enabled }}
        # api → sentinel:26379 (primary discovery).
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "api") | nindent 14 }}
        {{- end }}
        {{- if .Values.services.worker.enabled }}
        # worker → sentinel:26379.
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "worker") | nindent 14 }}
        {{- end }}
        # sentinel → sentinel:26379 (quorum gossip — Sentinel pub/sub between peers).
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.sentinel.podSelectorLabels | nindent 14 }}
        # redis → sentinel:26379 (Sentinel hello/announce exchange).
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.broker.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.sentinel.port }}
---
# ---------------------------------------------------------------------------
# allow-redis-sentinel-egress (W1-T4, ADR-0044 §1) — the Sentinel pods (selected
# by the default-deny floor) must EGRESS to: every Redis instance on :6379 (to
# monitor health + drive failover) and their Sentinel peers on :26379 (quorum
# gossip). No blanket egress — exactly those two intra-tier edges (+ cluster-wide
# DNS via allow-dns-egress).
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-redis-sentinel-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-sentinel
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.networkPolicy.sentinel.podSelectorLabels | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # sentinel → redis:6379 (monitor every Redis instance; drive promotion).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.broker.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.broker.port }}
    # sentinel → sentinel:26379 (quorum gossip to peers).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.sentinel.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.sentinel.port }}
---
# ---------------------------------------------------------------------------
# allow-redis-ingress (W1-T4, ADR-0044 §1) — the Redis pods accept ingress on
# :6379 from: api/worker (the broker/result/cache + rate-limit clients), the
# Sentinels (health monitoring), and OTHER Redis pods (replica → primary streaming
# replication). Under default-deny they would otherwise accept nothing and neither
# the broker nor replication could connect. Allow-list minimal — one port.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-redis-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.networkPolicy.broker.podSelectorLabels | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.services.api.enabled }}
        # api → redis:6379 (broker/result/cache + rate-limit).
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "api") | nindent 14 }}
        {{- end }}
        {{- if .Values.services.worker.enabled }}
        # worker → redis:6379 (Celery broker + result backend).
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "worker") | nindent 14 }}
        {{- end }}
        # sentinel → redis:6379 (health monitoring / failover).
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.sentinel.podSelectorLabels | nindent 14 }}
        # redis → redis:6379 (replica → primary streaming replication).
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.broker.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.broker.port }}
---
# ---------------------------------------------------------------------------
# allow-redis-replication-egress (W1-T4, ADR-0044 §1) — the Redis pods (selected
# by the default-deny floor) must EGRESS to each other on :6379 for streaming
# replication (replica → primary; after a promotion the direction flips). No
# blanket egress — exactly the one intra-tier edge (+ cluster-wide DNS).
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-redis-replication-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.networkPolicy.broker.podSelectorLabels | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # redis → redis:6379 (replica → primary streaming replication; intra-shard).
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.broker.podSelectorLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.broker.port }}
{{- end }}
{{- if .Values.services.ollama.enabled }}
{{- if or .Values.services.api.enabled .Values.services.worker.enabled }}
---
# ---------------------------------------------------------------------------
# allow-llm-to-ollama — §2 `A -. LLM .-> OLL`. Renders ONLY when ollama is
# enabled (opt-in local-LLM profile, ADR-0009). api and/or worker → ollama:11434.
# When ollama is disabled this whole policy is absent — no dangling edge.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-llm-to-ollama
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  podSelector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "ollama") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.services.api.enabled }}
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "api") | nindent 14 }}
        {{- end }}
        {{- if .Values.services.worker.enabled }}
        - podSelector:
            matchLabels:
              {{- include "netops.serviceSelector" (dict "ctx" . "component" "worker") | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.services.ollama.port }}
{{- end }}
{{- end }}
{{- if .Values.networkPolicy.externalLlmEgress.enabled }}
{{- if or .Values.services.api.enabled .Values.services.worker.enabled }}
---
# ---------------------------------------------------------------------------
# allow-external-llm-egress — OPT-IN (networkPolicy.externalLlmEgress.enabled),
# DEFAULT OFF. api+worker → external LLM provider CIDRs:443 (ADR-0009
# anthropic/openai/azure). CONFINED to the configured CIDRs — NEVER an empty-`to`
# allow. Absent entirely while the opt-in is off (the secure default).
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-allow-external-llm-egress
  namespace: {{ $ns }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-llm-egress
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - {{ $name }}
      - key: app.kubernetes.io/component
        operator: In
        values:
          {{- if .Values.services.api.enabled }}
          - api
          {{- end }}
          {{- if .Values.services.worker.enabled }}
          - worker
          {{- end }}
  policyTypes:
    - Egress
  egress:
    - to:
        {{- range .Values.networkPolicy.externalLlmEgress.cidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        {{- range .Values.networkPolicy.externalLlmEgress.ports }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
{{- end }}
{{- end }}
{{- end }}
