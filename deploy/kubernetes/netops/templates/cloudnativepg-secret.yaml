{{- /*
CloudNativePG superuser + app credential Secrets — DEV CONVENIENCE + L4
(W1-T1, ADR-0042 §1 / P1-W4 L4).

CloudNativePG reads `kubernetes.io/basic-auth` Secrets (a `username` + a
`password` key) for the cluster SUPERUSER (`spec.superuserSecret`) and the app/
replication role (`spec.bootstrap.initdb.secret`). These render ONLY when no
`secrets.existingSecret` is supplied — in production the credentials come from
the external-secrets operator / CSI secrets-store backed by the customer
KMS/Vault (ADR-0029 §6), and the chart renders NOTHING here.

L4 (the load-bearing idempotency guarantee): on `helm upgrade` each password is
REUSED from the already-installed Secret via `lookup`, NEVER regenerated — a
regenerated superuser/replication password would no longer match the credential
CNPG baked into PGDATA at first bootstrap and would SEVER every live connection
(ADR-0042 §1). `lookup` returns empty during `helm template`/CI (no API server),
so a fresh render still produces random placeholders and the gates pass; a real
upgrade preserves them. First install generates; upgrades preserve. The render-
twice CI guard (ci/cnpg/render-twice.sh) proves a second render reuses, never regenerates.

No credential literal EVER appears in values.yaml, this template, or Helm
history — the values are produced by `randAlphaNum`, not authored.
*/ -}}
{{- if and .Values.cloudNativePg.enabled (not .Values.secrets.existingSecret) }}
{{- $fullname := include "netops.fullname" . -}}
{{- $k := .Values.secrets.keys -}}
{{- /* Superuser Secret. */ -}}
{{- $superName := printf "%s-cnpg-superuser" $fullname -}}
{{- $superPrior := (lookup "v1" "Secret" .Release.Namespace $superName) -}}
{{- $superData := dict -}}
{{- if $superPrior }}{{ $superData = $superPrior.data }}{{ end -}}
{{- $superPass := (hasKey $superData $k.cnpgSuperuserPassword) | ternary (index $superData $k.cnpgSuperuserPassword | default "" | b64dec) (randAlphaNum 32) -}}
{{- /* App / replication role Secret. */ -}}
{{- $appName := printf "%s-cnpg-app" $fullname -}}
{{- $appPrior := (lookup "v1" "Secret" .Release.Namespace $appName) -}}
{{- $appData := dict -}}
{{- if $appPrior }}{{ $appData = $appPrior.data }}{{ end -}}
{{- $appPass := (hasKey $appData $k.cnpgAppPassword) | ternary (index $appData $k.cnpgAppPassword | default "" | b64dec) (randAlphaNum 32) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $superName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
  annotations:
    netops.io/dev-secret: "true"
    netops.io/secret-source: helm-generated-dev-convenience
    # cnpg.io/reload lets the operator pick up a rotated value without a restart.
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
stringData:
  # CNPG superuser. Reused on upgrade via lookup (L4) — NEVER regenerated.
  {{ $k.cnpgSuperuserUsername }}: postgres
  {{ $k.cnpgSuperuserPassword }}: {{ $superPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
  annotations:
    netops.io/dev-secret: "true"
    netops.io/secret-source: helm-generated-dev-convenience
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
stringData:
  # CNPG app/replication role (owner of the platform database). Reused on upgrade
  # via lookup (L4) — NEVER regenerated. Username mirrors config.postgres.user.
  {{ $k.cnpgAppUsername }}: {{ .Values.cloudNativePg.bootstrap.owner | quote }}
  {{ $k.cnpgAppPassword }}: {{ $appPass | quote }}
{{- end }}
