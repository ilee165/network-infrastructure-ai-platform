{{- /*
Platform-secret DEV CONVENIENCE (ADR-0029 §6 / ADR-0013 §4).

This template renders ONLY when no `existingSecret` is supplied — the guard
below. In production the Secret named in `secrets.existingSecret` is populated
out-of-band by the external-secrets operator or a CSI secrets-store volume
backed by the customer KMS/Vault (ADR-0029 §6); the chart then renders NOTHING
here and never touches credential material.

When NO existingSecret is given (dev/test only), a Secret is rendered with
GENERATED placeholder values so the stack boots locally. The values are produced
by `randAlphaNum` — they are NOT literals in values.yaml, this template, or Helm
release history as authored secret material. NOTES.txt warns loudly that this
path is dev-only; it is explicitly NOT a production secret store (external-secrets is).

IDEMPOTENT: on `helm upgrade` against a live cluster, each value is REUSED from
the already-installed Secret (via `lookup`) instead of being regenerated — a
regenerated password would no longer match the credential baked into the data
store at first init and would silently break auth. `lookup` returns empty during
`helm template`/CI (no API server), so a fresh render still produces random
placeholders and the gates are unaffected. First install generates; upgrades preserve.

Device credentials NEVER appear here under any path — they stay AES-256-GCM
encrypted in Postgres (D11). This Secret holds only platform infra secrets.
*/ -}}
{{- if not .Values.secrets.existingSecret }}
{{- $name := printf "%s-dev-secrets" (include "netops.fullname" .) -}}
{{- $prior := (lookup "v1" "Secret" .Release.Namespace $name) -}}
{{- $priorData := dict -}}
{{- if $prior }}{{ $priorData = $prior.data }}{{ end -}}
{{- /* reuse the prior (base64) value for a key if present, else generate one */ -}}
{{- $pgKey := .Values.secrets.keys.postgresPassword -}}
{{- $neoKey := .Values.secrets.keys.neo4jAuth -}}
{{- $redisKey := .Values.secrets.keys.redisPassword -}}
{{- $oidcKey := .Values.secrets.keys.oidcClientSecret -}}
{{- $pg := (hasKey $priorData $pgKey) | ternary (index $priorData $pgKey | default "" | b64dec) (randAlphaNum 32) -}}
{{- $neo := (hasKey $priorData $neoKey) | ternary (index $priorData $neoKey | default "" | b64dec) (printf "%s/%s" .Values.config.neo4j.user (randAlphaNum 32)) -}}
{{- $redis := (hasKey $priorData $redisKey) | ternary (index $priorData $redisKey | default "" | b64dec) (randAlphaNum 32) -}}
{{- $oidc := (hasKey $priorData $oidcKey) | ternary (index $priorData $oidcKey | default "" | b64dec) (randAlphaNum 32) -}}
{{- /* W5-T1 pgBackRest repo placeholders — only when the backup tier is enabled. */ -}}
{{- $bkCipherKey := .Values.secrets.keys.backupRepoCipherPass -}}
{{- $bkS3Key := .Values.secrets.keys.backupRepoS3Key -}}
{{- $bkS3SecretKey := .Values.secrets.keys.backupRepoS3KeySecret -}}
{{- $bkCipher := (hasKey $priorData $bkCipherKey) | ternary (index $priorData $bkCipherKey | default "" | b64dec) (randAlphaNum 48) -}}
{{- $bkS3 := (hasKey $priorData $bkS3Key) | ternary (index $priorData $bkS3Key | default "" | b64dec) (randAlphaNum 20) -}}
{{- $bkS3Secret := (hasKey $priorData $bkS3SecretKey) | ternary (index $priorData $bkS3SecretKey | default "" | b64dec) (randAlphaNum 40) -}}
{{- /* W5-T4 pcap-snapshot object-store credential placeholders — SEPARATE, write-
to-`pcaps/`-prefix-only credential, only when the pcap snapshot tier is enabled. */ -}}
{{- $pcapS3KeyName := .Values.secrets.keys.pcapSnapshotS3Key -}}
{{- $pcapS3SecretName := .Values.secrets.keys.pcapSnapshotS3KeySecret -}}
{{- $pcapS3 := (hasKey $priorData $pcapS3KeyName) | ternary (index $priorData $pcapS3KeyName | default "" | b64dec) (randAlphaNum 20) -}}
{{- $pcapS3Secret := (hasKey $priorData $pcapS3SecretName) | ternary (index $priorData $pcapS3SecretName | default "" | b64dec) (randAlphaNum 40) -}}
{{- /*
W5-T1 pgBackRest mTLS material (ADR-0030 §4). The scheduled CronJob reaches the
in-postgres `pgbackrest server` over TLS, so we need a CA + a server cert (SAN =
the postgres Service) + a client cert (CN = backup.postgres.tls.clientCommonName).
DEV CONVENIENCE only: generated here with genCA/genSignedCert (self-signed),
reused on upgrade via lookup so the server/client pair stays consistent across
renders. In production these come from existingSecret / external-secrets. Rendered
under `data:` (base64 PEM) because cert material is multi-line, not an alphanum
placeholder. Generated only when the backup tier + TLS + in-chart postgres are on.
*/ -}}
{{- $bkTls := and .Values.backup.postgres.enabled .Values.backup.postgres.tls.enabled .Values.services.postgres.enabled -}}
{{- $tlsKeys := .Values.secrets.keys -}}
{{- $caCrt := "" -}}{{- $caKey := "" -}}
{{- $srvCrt := "" -}}{{- $srvKey := "" -}}
{{- $cliCrt := "" -}}{{- $cliKey := "" -}}
{{- if $bkTls -}}
  {{- $pgSvc := printf "%s-postgres" (include "netops.fullname" .) -}}
  {{- $pgFqdn := printf "%s.%s.svc" $pgSvc .Release.Namespace -}}
  {{- $caKeyName := "backup-tls-ca-key" -}}
  {{- $srvCrtName := $tlsKeys.backupTlsServerCert -}}{{- $srvKeyName := $tlsKeys.backupTlsServerKey -}}
  {{- $cliCrtName := $tlsKeys.backupTlsClientCert -}}{{- $cliKeyName := $tlsKeys.backupTlsClientKey -}}
  {{- $caCrtName := $tlsKeys.backupTlsCa -}}
  {{- if and (hasKey $priorData $caCrtName) (hasKey $priorData $srvCrtName) (hasKey $priorData $cliCrtName) -}}
    {{- /* Reuse the installed CA + server/client pair (keeps mTLS consistent). */ -}}
    {{- $caCrt = index $priorData $caCrtName | b64dec -}}
    {{- $srvCrt = index $priorData $srvCrtName | b64dec -}}
    {{- $srvKey = index $priorData $srvKeyName | b64dec -}}
    {{- $cliCrt = index $priorData $cliCrtName | b64dec -}}
    {{- $cliKey = index $priorData $cliKeyName | b64dec -}}
  {{- else -}}
    {{- $ca := genCA (printf "%s-pgbackrest-ca" (include "netops.fullname" .)) 3650 -}}
    {{- $srv := genSignedCert $pgFqdn (list) (list $pgSvc $pgFqdn (printf "%s.%s.svc.cluster.local" $pgSvc .Release.Namespace)) 3650 $ca -}}
    {{- $cli := genSignedCert .Values.backup.postgres.tls.clientCommonName (list) (list .Values.backup.postgres.tls.clientCommonName) 3650 $ca -}}
    {{- $caCrt = $ca.Cert -}}
    {{- $srvCrt = $srv.Cert -}}{{- $srvKey = $srv.Key -}}
    {{- $cliCrt = $cli.Cert -}}{{- $cliKey = $cli.Key -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
  annotations:
    # Loud marker: this is a generated dev Secret, NOT a production secret store.
    netops.io/dev-secret: "true"
    netops.io/secret-source: helm-generated-dev-convenience
type: Opaque
stringData:
  # Dev-only values: reused from the installed Secret on upgrade (lookup), freshly
  # generated on first install / CI render. Supply `secrets.existingSecret` in
  # production so this whole object is skipped.
  {{ $pgKey }}: {{ $pg | quote }}
  {{ $neoKey }}: {{ $neo | quote }}
  {{ $redisKey }}: {{ $redis | quote }}
  # OIDC client secret: a dev placeholder is always generated (unused while OIDC
  # is disabled); the REAL value MUST come from existingSecret in production
  # (ADR-0028). Never a literal here.
  {{ $oidcKey }}: {{ $oidc | quote }}
  {{- if .Values.backup.postgres.enabled }}
  # pgBackRest repo secrets (W5-T1, ADR-0030 §1) — dev placeholders, reused on
  # upgrade via lookup (L4). In production these come from existingSecret /
  # external-secrets. The cipher pass is the aes-256-cbc repo passphrase
  # (DISTINCT from the platform KEK, never co-located with the repo — ADR-0011 §4);
  # the S3 key/secret are the MinIO credential scoped to the `pgbackrest/` prefix.
  {{ $bkCipherKey }}: {{ $bkCipher | quote }}
  {{ $bkS3Key }}: {{ $bkS3 | quote }}
  {{ $bkS3SecretKey }}: {{ $bkS3Secret | quote }}
  {{- end }}
  {{- if .Values.backup.pcap.enabled }}
  # pcap snapshot object-store credential (W5-T4, ADR-0030 §3 / ADR-0023 §5) — a
  # SEPARATE dev placeholder scoped write-only to the `pcaps/` prefix, reused on
  # upgrade via lookup (L4). DISTINCT from the pgbackrest/ credential above so a
  # leak of one does not grant the other's prefix. In production these come from
  # existingSecret / external-secrets. Never a literal.
  {{ $pcapS3KeyName }}: {{ $pcapS3 | quote }}
  {{ $pcapS3SecretName }}: {{ $pcapS3Secret | quote }}
  {{- end }}
  {{- if eq .Values.secrets.kms.provider "secret" }}
  {{- $kmsKey := .Values.secrets.kms.masterKeyRefKey -}}
  {{- $kms := (hasKey $priorData $kmsKey) | ternary (index $priorData $kmsKey | default "" | b64dec) (default (printf "dev-local:%s" (randAlphaNum 16)) .Values.secrets.kms.masterKeyRef) }}
  # KMS master-key REFERENCE (handle/path), dev-only. provider=external skips
  # this — the production path resolves the handle against the customer KMS.
  {{ $kmsKey }}: {{ $kms | quote }}
  {{- end }}
{{- if $bkTls }}
data:
  # pgBackRest mTLS material (W5-T1, ADR-0030 §4) — base64 PEM under `data:` (cert
  # bytes are multi-line, not alphanum placeholders). DEV-ONLY self-signed CA +
  # server/client pair, reused on upgrade via lookup. Production supplies these
  # via existingSecret / external-secrets. The CA private key is NOT shipped — only
  # the CA cert is needed by peers to verify; the server/client keys ARE shipped
  # (the sidecar + CronJob need them to present their cert) and stay in this Secret.
  {{ .Values.secrets.keys.backupTlsCa }}: {{ $caCrt | b64enc }}
  {{ .Values.secrets.keys.backupTlsServerCert }}: {{ $srvCrt | b64enc }}
  {{ .Values.secrets.keys.backupTlsServerKey }}: {{ $srvKey | b64enc }}
  {{ .Values.secrets.keys.backupTlsClientCert }}: {{ $cliCrt | b64enc }}
  {{ .Values.secrets.keys.backupTlsClientKey }}: {{ $cliKey | b64enc }}
{{- end }}
{{- end }}
