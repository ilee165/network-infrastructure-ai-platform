{{- /*
Platform-secret DEV CONVENIENCE (ADR-0029 §6 / ADR-0013 §4).

This template renders ONLY when no `existingSecret` is supplied — the guard
below. In production the Secret named in `secrets.existingSecret` is populated
out-of-band by the external-secrets operator or a CSI secrets-store volume
backed by the customer KMS/Vault (ADR-0029 §6); the chart then renders NOTHING
here and never touches credential material.

When NO existingSecret is given (dev/test only), a Secret is rendered with
GENERATED-AT-RENDER placeholder values so the stack boots locally. The values
are produced by `randAlphaNum` at template time — they are NOT literals in
values.yaml, this template, or Helm release history as authored secret material.
NOTES.txt warns loudly that this path is dev-only. A re-render rotates them, so
this is explicitly NOT a production secret store (that is external-secrets).

Device credentials NEVER appear here under any path — they stay AES-256-GCM
encrypted in Postgres (D11). This Secret holds only platform infra secrets.
*/ -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netops.fullname" . }}-dev-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
  annotations:
    # Loud marker: this is a generated dev Secret, NOT a production secret store.
    netops.io/dev-secret: "true"
    netops.io/secret-source: helm-generated-dev-convenience
type: Opaque
stringData:
  # All values below are render-time random placeholders (dev only). Supply
  # `secrets.existingSecret` in production so this whole object is skipped.
  {{ .Values.secrets.keys.postgresPassword }}: {{ randAlphaNum 32 | quote }}
  {{ .Values.secrets.keys.neo4jAuth }}: {{ printf "%s/%s" .Values.config.neo4j.user (randAlphaNum 32) | quote }}
  {{ .Values.secrets.keys.redisPassword }}: {{ randAlphaNum 32 | quote }}
  # OIDC client secret placeholder — empty when OIDC is disabled; a real value
  # MUST come from existingSecret in production (ADR-0028). Never a literal here.
  {{ .Values.secrets.keys.oidcClientSecret }}: {{ randAlphaNum 32 | quote }}
  {{- if eq .Values.secrets.kms.provider "secret" }}
  # KMS master-key REFERENCE (handle/path), dev-only. provider=external skips
  # this — the production path resolves the handle against the customer KMS.
  {{ .Values.secrets.kms.masterKeyRefKey }}: {{ default (printf "dev-local:%s" (randAlphaNum 16)) .Values.secrets.kms.masterKeyRef | quote }}
  {{- end }}
{{- end }}
