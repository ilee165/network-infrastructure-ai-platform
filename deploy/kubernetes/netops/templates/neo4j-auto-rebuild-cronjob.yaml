{{- /*
Neo4j AUTOMATED-REBUILD reconciler — CronJob (steady-state) + a Helm post-rollout
Job (immediate, on every chart apply) (W1-T3, ADR-0005 D5; ADR-0029 §1/§3;
PRODUCTION.md §3.2 — single Neo4j + automated rebuild).

WHAT IT DOES (the designed Neo4j HA mitigation — Community has no clustering, so a
re-projection IS the recovery, ADR-0005 §3.2):

Neo4j is a PURE projection of Postgres (the system of record) — it holds NO
un-rebuildable state (ADR-0005 D5). When the Neo4j pod's liveness probe fails the
kubelet RECREATES the container (StatefulSet restartPolicy is always Always); the
data PVC may then come up EMPTY or STALE. This reconciler closes the loop with NO
manual step: it checks whether the projected graph is missing/stale and, if so,
RE-PROJECTS the whole Postgres inventory into Neo4j via the EXISTING metric-emitting
full-rebuild path (app.engines.topology.metrics.timed_rebuild → rebuild() →
projector.full_rebuild). When the graph is already healthy it is a NO-OP. So:

    liveness fail -> kubelet recreate -> (graph empty) -> next reconcile re-projects
                  -> readiness returns -> topology fresh again.   [no human in the loop]

OBSERVABILITY (the topology-RTO):
  * the rebuild path records `topology_rebuild_seconds` (Histogram) + node/edge
    gauges on the in-process Prometheus REGISTRY (G-OBS), AND
  * because a Job pod is NOT scrapable, this reconciler ALSO writes a node_exporter
    TEXTFILE `.prom` carrying `topology_rebuild_seconds` (the established
    no-pushgateway pattern, mirrors the audit-chain-verify CronJob). THAT duration
    is the topology-RTO the W4-T4 destroy-and-rebuild drill compares against and the
    G-OBS topology-freshness SLO reads (PRODUCTION.md §3.2/§11 G-REL).

This is DISTINCT from the W5-T3 quarterly rebuild-DRILL (a suspended, P2-executed,
manual assertion harness under templates/backup/). This is the always-on production
recovery wiring.

W4-LESSONS guards:
  L3 — EVERY $VAR (the assembled Postgres DSN, the Neo4j password split out of the
       `user/password` AUTH secret, the metric path) expands inside ONE `sh -c`
       script; the k8s exec argv never does its own $(VAR) substitution — a raw argv
       would re-project against a LITERAL `$(VAR)` host and silently mis-target.
  L5 — `set -o pipefail` + a `test -s` non-empty guard on the metric `.prom` so a
       silently-empty rebuild-duration write FAILS the run (never a false pass).
  L4 — this Job generates NO chart secret (it references existing platform Secret
       keys); nothing to make idempotent here.
SECRET-SURFACE: the Postgres password + the Neo4j auth are valueFrom.secretKeyRef
ONLY — never inlined (ADR-0029 §6). Connection coordinates (hosts, URIs, users) are
non-secret configMap env.

Disabling the tier (services.neo4j.autoRebuild.enabled=false) renders NOTHING here
and emits a NOTES warning — a CONSCIOUS warned opt-out (ADR-0029 §0): without it a
liveness-fail leaves the topology graph stale until a human re-projects.
*/ -}}
{{- /*
Reusable reconciler pod spec (authored ONCE so the post-rollout Job and the
steady-state CronJob cannot drift). Defined at the top level (Helm `define` may not
nest inside an `if` action).
*/ -}}
{{- define "netops.neo4jAutoRebuildPod" -}}
{{- $ctx := .ctx -}}
{{- $a := $ctx.Values.services.neo4j.autoRebuild -}}
{{- $fullname := include "netops.fullname" $ctx -}}
{{- $secretName := include "netops.platformSecretName" $ctx -}}
metadata:
  labels:
    {{- include "netops.componentLabels" (dict "ctx" $ctx "component" "neo4j-rebuild") | nindent 4 }}
    netops.io/rebuild-role: neo4j-auto-rebuild
spec:
  serviceAccountName: neo4j-rebuild-sa
  automountServiceAccountToken: {{ $ctx.Values.serviceAccounts.automountServiceAccountToken }}
  restartPolicy: Never
  securityContext:
    {{- include "netops.podSecurityContext" $ctx | nindent 4 }}
  containers:
    - name: neo4j-auto-rebuild
      image: {{ include "netops.backendImage" $ctx }}
      imagePullPolicy: {{ $ctx.Values.images.backend.pullPolicy }}
      command:
        - sh
        - -c
        # ONE sh -c script (L3: env vars — the assembled Postgres DSN, the Neo4j
        # password split from the `user/password` AUTH secret, the metric path —
        # expand HERE; a raw exec argv would NOT do $(VAR) and would re-project
        # against a literal host). set -o pipefail + a `test -s` non-empty guard on
        # the metric .prom (L5) so a silently-empty rebuild-duration write FAILS.
        - |
          set -euo pipefail
          echo "[neo4j-auto-rebuild] reconcile: re-project topology from Postgres if the graph is empty/stale (ADR-0005 D5)"
          # Percent-encode the Postgres user + password before assembling the DSN
          # (an unencoded ':' / '@' / '/' / '%' would corrupt the authority). Done
          # with python (present on the backend image); the encoded values stay in
          # shell locals, never logged. Mirrors the audit-chain-verify CronJob.
          NETOPS_PG_USER_ENC="$(python -c 'import os,urllib.parse;print(urllib.parse.quote(os.environ["NETOPS_POSTGRES_USER"],safe=""))')"
          NETOPS_PG_PASS_ENC="$(python -c 'import os,urllib.parse;print(urllib.parse.quote(os.environ["NETOPS_POSTGRES_PASSWORD"],safe=""))')"
          export NETOPS_DATABASE_URL="postgresql+asyncpg://${NETOPS_PG_USER_ENC}:${NETOPS_PG_PASS_ENC}@${NETOPS_POSTGRES_HOST}:${NETOPS_POSTGRES_PORT}/${NETOPS_POSTGRES_DB}"
          # The Neo4j Secret stores `user/password` (the neo4j-image NEO4J_AUTH
          # shape). app.knowledge.neo4j_client reads NETOPS_NEO4J_PASSWORD, so split
          # the password out here (L3 in-shell; the password never appears in a
          # manifest/argv). The user comes from the non-secret config env.
          export NETOPS_NEO4J_PASSWORD="${NETOPS_NEO4J_AUTH#*/}"
          # mTLS (ADR-0039 §4): when mtls.postgres is on, the NETOPS_DB_SSL_* env +
          # the mounted client cert make app.db build the verify-full SSLContext; the
          # pg_hba hostssl-only rule rejects a plaintext connection, so this Job MUST
          # present the client cert (mounted read-only below).
          mkdir -p "${TOPOLOGY_METRICS_DIR}"
          # Run the reconcile through the EXISTING metric-emitting full-rebuild path:
          # app.engines.topology.auto_rebuild is the thin OPERATOR CLI over
          # app.engines.topology.metrics.timed_rebuild (-> rebuild() ->
          # projector.full_rebuild) — the same module-invocation convention the drills
          # use. It re-projects ONLY when the projected graph is missing/STALER than
          # --staleness-seconds (the post-liveness-recreate EMPTY graph reads as
          # infinitely stale -> rebuilds; a fresh graph is a NO-OP), records
          # topology_rebuild_seconds + node/edge gauges on the in-process registry, AND
          # writes the rebuild DURATION to the node_exporter textfile .prom (the
          # scrapable topology-RTO the W4-T4 drill + G-OBS freshness SLO read). A
          # non-zero exit (rebuild failure) FAILS the pod (set -e). The metric path +
          # staleness are passed as argv that the SHELL expands from env (L3).
          python -m app.engines.topology.auto_rebuild \
            --metrics-textfile "${TOPOLOGY_METRICS_DIR}/topology_rebuild_seconds.prom" \
            --staleness-seconds "${TOPOLOGY_STALENESS_SECONDS}" \
            | tee /tmp/rebuild/result.txt
          echo "[neo4j-auto-rebuild] assert the rebuild-duration metric was written non-empty (L5 belt-and-braces)"
          test -s "${TOPOLOGY_METRICS_DIR}/topology_rebuild_seconds.prom"
          echo "[neo4j-auto-rebuild] reconcile complete"
      securityContext:
        {{- include "netops.hardenedSecurityContext" $ctx | nindent 8 }}
      env:
        # Where the reconciler writes the node_exporter textfile metric (the
        # no-pushgateway pattern — a Job pod is not scrapable; the file survives the
        # pod for the agent/node_exporter to collect). Used by the sh -c script.
        - name: TOPOLOGY_METRICS_DIR
          value: {{ $a.metricsDir | quote }}
        # Re-project only when the last projection is older than this many seconds
        # (the post-recreate EMPTY graph reads as infinitely stale -> always rebuilds;
        # a fresh graph is a NO-OP). 0 forces an unconditional rebuild every tick.
        - name: TOPOLOGY_STALENESS_SECONDS
          value: {{ $a.stalenessSeconds | quote }}
        # --- connection coordinates: NON-secret configMap env (hosts/URIs/users). ---
        - name: NETOPS_POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ $fullname }}-config
              key: NETOPS_POSTGRES_HOST
        - name: NETOPS_POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ $fullname }}-config
              key: NETOPS_POSTGRES_PORT
        - name: NETOPS_POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: {{ $fullname }}-config
              key: NETOPS_POSTGRES_DB
        - name: NETOPS_POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: {{ $fullname }}-config
              key: NETOPS_POSTGRES_USER
        - name: NETOPS_NEO4J_URI
          valueFrom:
            configMapKeyRef:
              name: {{ $fullname }}-config
              key: NETOPS_NEO4J_URI
        - name: NETOPS_NEO4J_USER
          valueFrom:
            configMapKeyRef:
              name: {{ $fullname }}-config
              key: NETOPS_NEO4J_USER
        # --- credentials: external-secret REFs ONLY; NEVER inlined (ADR-0029 §6). ---
        - name: NETOPS_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $secretName }}
              key: {{ $ctx.Values.secrets.keys.postgresPassword }}
        - name: NETOPS_NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: {{ $secretName }}
              key: {{ $ctx.Values.secrets.keys.neo4jAuth }}
        {{- /* api/worker -> Postgres mTLS CLIENT env (ADR-0039 §4), WITHOUT
        NETOPS_DATABASE_URL (the sh -c script assembles the DSN itself). Renders
        nothing when mTLS is off. */ -}}
        {{- include "netops.dbClientTlsSslEnv" $ctx | nindent 8 }}
      resources:
        {{- toYaml $a.resources | nindent 8 }}
      volumeMounts:
        # readOnlyRootFilesystem:true — the textfile metric dir + the result stream +
        # /tmp are the ONLY writable mounts (emptyDir; torn down with the pod). NO data
        # PVC: the graph is re-projected from Postgres, never restored onto a volume.
        - name: metrics
          mountPath: {{ $a.metricsDir }}
        - name: rebuild-scratch
          mountPath: /tmp/rebuild
        - name: tmp
          mountPath: /tmp
        {{- include "netops.dbClientTlsVolumeMount" $ctx | nindent 8 }}
  volumes:
    - name: metrics
      emptyDir:
        sizeLimit: 16Mi
    - name: rebuild-scratch
      emptyDir:
        sizeLimit: 64Mi
    - name: tmp
      emptyDir:
        sizeLimit: 128Mi
    {{- include "netops.dbClientTlsVolume" $ctx | nindent 4 }}
{{- end -}}
{{- if and .Values.services.neo4j.enabled .Values.services.neo4j.autoRebuild.enabled (or .Values.services.postgres.enabled .Values.cloudNativePg.enabled) }}
{{- $a := .Values.services.neo4j.autoRebuild -}}
{{- $fullname := include "netops.fullname" . -}}
---
# Post-rollout Job (Helm hook): runs ONCE on every chart install/upgrade so a fresh
# (or just-recreated) Neo4j is projected immediately, without waiting for the first
# CronJob tick. Idempotent — the reconcile is a no-op when the graph is already
# fresh. hook-weight after the data stores so Neo4j/Postgres are up first.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullname }}-neo4j-auto-rebuild
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.componentLabels" (dict "ctx" . "component" "neo4j-rebuild") | nindent 4 }}
    netops.io/rebuild-role: neo4j-auto-rebuild
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ $a.backoffLimit }}
  ttlSecondsAfterFinished: {{ $a.ttlSecondsAfterFinished }}
  template:
    {{- include "netops.neo4jAutoRebuildPod" (dict "ctx" .) | nindent 4 }}
---
# Steady-state reconciler CronJob: the always-on recovery loop. On each tick it
# re-projects from Postgres IF the graph is empty/stale (the post-liveness-recreate
# state) and is a no-op otherwise — so a liveness-fail -> recreate is auto-healed
# with NO manual step, and the topology-RTO (`topology_rebuild_seconds`) is recorded.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullname }}-neo4j-auto-rebuild
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.componentLabels" (dict "ctx" . "component" "neo4j-rebuild") | nindent 4 }}
    netops.io/rebuild-role: neo4j-auto-rebuild
spec:
  schedule: {{ $a.schedule | quote }}
  concurrencyPolicy: {{ $a.concurrencyPolicy }}
  startingDeadlineSeconds: {{ $a.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ $a.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $a.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ $a.backoffLimit }}
      template:
        {{- include "netops.neo4jAutoRebuildPod" (dict "ctx" .) | nindent 8 }}
{{- end }}
