{{- /*
DEVICE-CREDENTIAL ROTATION CronJob (W4-T2, ADR-0040 §1; ADR-0015).

ONE scheduled CronJob (<fullname>-credential-rotation) that runs the confirm-then-
swap, fail-closed device-secret rotation pass (ADR-0040 §1/§3). For each credential
due for rotation it:

  * STAGES a fresh KMS-wrapped DEK for a new secret via the EXISTING ADR-0032
    envelope provider (NO new crypto; disjoint from the W6-T3 KEK re-wrap pass);
  * VERIFIES the new secret against the target device, and ACTIVATES it ONLY on a
    successful verify — the prior credential stays valid until the swap is confirmed,
    so a failed rotation NEVER locks a device out (fail-closed);
  * on repeated verify failure marks the credential DEGRADED and the non-zero exit +
    the structured log line ARE the alert (ADR-0015). Transient plaintext is zeroized
    and never logged/queued/cached/returned/audited (ADR-0040 §1 / ADR-0032 §6).

It runs `python -m app.workers.tasks.credential_rotation` on the SAME Python-bearing
backend image as the api/worker (it imports the shared rotation service). It is a
K8s CronJob, NOT Celery beat, so it keeps running when the app/Redis is degraded
(same posture as the backup/verify tiers). Disabling the tier
(credentials.rotation.enabled=false) renders NOTHING here (a warned opt-out,
NOTES.txt).

This is the STORED-COPY rotation only (ADR-0040 §4): changing the secret ON the
device is out of P2 scope and, when scoped in later, routes through the ADR-0020
four-eyes ChangeRequest spine — never a direct write from this Job.

W4-LESSONS guards applied:
  L3 — the Postgres password + the assembled DSN live INSIDE one `sh -c '...'`
       script; the k8s exec argv never does its own $(VAR) substitution.
  L5 — `set -o pipefail` and a `test -s` non-empty guard on the summary file so a
       silently-empty run FAILS the job rather than passing.
  L4 — this Job generates NO chart secret (it references existing Secret keys);
       nothing to make idempotent here.
*/ -}}
{{- if .Values.credentials.rotation.enabled }}
{{- $v := .Values.credentials.rotation -}}
{{- $fullname := include "netops.fullname" . -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullname }}-credential-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.componentLabels" (dict "ctx" . "component" "credentials") | nindent 4 }}
spec:
  schedule: {{ $v.schedule | quote }}
  concurrencyPolicy: {{ $v.concurrencyPolicy }}
  startingDeadlineSeconds: {{ $v.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ $v.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $v.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ $v.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "netops.componentLabels" (dict "ctx" . "component" "credentials") | nindent 12 }}
        spec:
          automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
          restartPolicy: Never
          securityContext:
            {{- include "netops.podSecurityContext" . | nindent 12 }}
          containers:
            - name: credential-rotation
              image: {{ include "netops.backendImage" . }}
              imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
              securityContext:
                {{- include "netops.hardenedSecurityContext" . | nindent 16 }}
              command:
                - sh
                - -c
                # ONE sh -c script (L3: env vars — including the by-reference
                # Postgres password — expand HERE; a raw exec argv would NOT do
                # $(VAR)). The DSN is assembled from the non-secret host/port/db/
                # user config + the secret password, never inlined in the manifest.
                # set -o pipefail (L5); the rotation module exits non-zero when a
                # credential degrades after repeated verify failure (the loud
                # signal), and the `test -s` belt-and-braces asserts the run summary
                # file was actually written.
                - |
                  set -euo pipefail
                  echo "[credential-rotation] confirm-then-swap device-secret rotation pass (ADR-0040 §1)"
                  export NETOPS_DATABASE_URL="postgresql+asyncpg://${NETOPS_POSTGRES_USER}:${NETOPS_POSTGRES_PASSWORD}@${NETOPS_POSTGRES_HOST}:${NETOPS_POSTGRES_PORT}/${NETOPS_POSTGRES_DB}"
                  mkdir -p "${CREDENTIAL_ROTATION_SUMMARY_DIR}"
                  # Non-zero exit here (a credential degraded after repeated verify
                  # failure) FAILS the pod via set -e — the alert (ADR-0015). A clean
                  # pass writes a versions/counts-only summary (no secret material).
                  python -m app.workers.tasks.credential_rotation
                  echo "[credential-rotation] asserting the run summary was written (L5 belt-and-braces)"
                  test -s "${CREDENTIAL_ROTATION_SUMMARY_DIR}/credential_rotation.prom"
                  echo "[credential-rotation] device-secret rotation pass complete (fail-closed, no lock-out)"
              env:
                # Where the job writes the versions/counts-only run summary (consumed
                # by app.workers.tasks.credential_rotation; used by the sh -c script,
                # never a raw exec argv).
                - name: CREDENTIAL_ROTATION_SUMMARY_DIR
                  value: {{ $v.summaryDir | quote }}
                # Retry budget per credential before it is marked degraded + alerted
                # (ADR-0040 §3). Read by the rotation pass.
                - name: CREDENTIAL_ROTATION_MAX_ATTEMPTS
                  value: {{ $v.maxAttempts | quote }}
                # Non-secret Postgres coordinates from the platform ConfigMap; the
                # sh -c script assembles the DSN from these + the password below.
                - name: NETOPS_POSTGRES_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: {{ $fullname }}-config
                      key: NETOPS_POSTGRES_HOST
                - name: NETOPS_POSTGRES_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: {{ $fullname }}-config
                      key: NETOPS_POSTGRES_PORT
                - name: NETOPS_POSTGRES_DB
                  valueFrom:
                    configMapKeyRef:
                      name: {{ $fullname }}-config
                      key: NETOPS_POSTGRES_DB
                - name: NETOPS_POSTGRES_USER
                  valueFrom:
                    configMapKeyRef:
                      name: {{ $fullname }}-config
                      key: NETOPS_POSTGRES_USER
                # Postgres password — external-secret REF only; NEVER inlined
                # (ADR-0029 §6). Mirrors the api/worker deployments.
                - name: NETOPS_POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      {{- if .Values.secrets.existingSecret }}
                      name: {{ .Values.secrets.existingSecret }}
                      {{- else }}
                      name: {{ $fullname }}-dev-secrets
                      {{- end }}
                      key: {{ .Values.secrets.keys.postgresPassword }}
              resources:
                {{- toYaml $v.resources | nindent 16 }}
              volumeMounts:
                # readOnlyRootFilesystem:true — the summary dir + /tmp are the ONLY
                # writable mounts (emptyDir; torn down with the pod).
                - name: summary
                  mountPath: {{ $v.summaryDir }}
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: summary
              emptyDir:
                sizeLimit: 16Mi
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
{{- end }}
