{{- /*
Postgres mTLS pg_hba.conf (W4-T4, ADR-0039 §3).

The load-bearing REFUSAL control: this pg_hba.conf is the ONLY host-based-auth
file Postgres uses (the StatefulSet sets `-c hba_file=` to the mounted copy), and
its only TCP line is a single `hostssl … clientcert=verify-full` rule. There is
NO plaintext `host …` line, so a non-TLS connection matches no rule and is
REJECTED at the server, and `hostnossl` is never granted — plaintext has no
listener path. `clientcert=verify-full` additionally REQUIRES a client cert from
the trusted CA whose CN equals the connecting username (ADR-0039 §3), so an
untrusted-CA or wrong-CN client is refused too. The client still authenticates
with scram-sha-256 (the password) on top of the verified cert — mutual auth.

The `local` (unix-socket) line stays `trust` so the in-pod `pg_isready` health
probes (PGHOST=/var/run/postgresql) keep working without a cert; the socket is
not reachable off-pod, so this is not a plaintext network path.

Config only — NO key material here (the cert/key live in the mounted Secret).
Rendered only when mtls.postgres.enabled.
*/ -}}
{{- if .Values.mtls.postgres.enabled }}
{{- $m := .Values.mtls.postgres -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "netops.fullname" . }}-postgres-tls-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
data:
  pg_hba.conf: |
    # netops mTLS pg_hba (ADR-0039 §3). Generated by Helm — DO NOT edit in place.
    #
    # TYPE      DATABASE  USER  ADDRESS       METHOD
    # Local unix socket: trust (in-pod health probes only; not a network path).
    local       all       all                 trust
    # TCP: TLS REQUIRED (hostssl) + client cert REQUIRED & verified (clientcert=
    # verify-full: trusted CA AND cert CN == username) + scram-sha-256 password.
    # No plaintext `host`/`hostnossl` line exists, so non-TLS connections are
    # refused (they match no rule). IPv4 + IPv6 any-source (NetworkPolicy already
    # confines who can reach 5432; this enforces TLS + cert on every TCP client).
    hostssl     all       all   0.0.0.0/0     {{ $m.hbaAuthMethod }} clientcert=verify-full
    hostssl     all       all   ::/0          {{ $m.hbaAuthMethod }} clientcert=verify-full
{{- end }}
