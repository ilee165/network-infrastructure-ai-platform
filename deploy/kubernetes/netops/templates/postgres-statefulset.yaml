{{- /*
Postgres StatefulSet (ADR-0029 §1 — pgvector/pgvector:pg16, toggleable).
Disable with services.postgres.enabled=false to point at an external/operator-
managed instance (P2 → CloudNativePG, ADR-0013 §4). A NOTES warning is emitted
when disabled.

PostgreSQL writable paths (readOnlyRootFilesystem:true requires emptyDir for each
path postgres writes that is NOT the data PVC):
  /var/run/postgresql   — unix socket directory + .pid file
  /tmp                  — Postgres temp files

The data directory (/var/lib/postgresql/data) is the PVC mount — writable, no
emptyDir needed there. However, postgres by default initialises PGDATA inside
/var/lib/postgresql/data/pgdata (with initdb) and writes logs + conf there;
we use the PVC for that path.

Hardening:
- runAsUser/runAsGroup 10001 (values.hardening) used for the postgres container;
  the pgvector image must be run as a non-root user. Standard pgvector/pgvector
  images support PGUSER / running non-root.
- The postgres process needs a writable unix socket dir (/var/run/postgresql)
  which we supply via emptyDir.
- seccompProfile: RuntimeDefault (same as all general services).
- resource requests + limits (ADR-0029 §3).
- liveness: pg_isready exec probe (ADR-0029 §7).
- readiness: same.
- startupProbe: generous window for initdb on first boot.
*/ -}}
{{- if .Values.services.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "netops.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  replicas: {{ .Values.services.postgres.replicas }}
  serviceName: {{ include "netops.fullname" . }}-postgres
  selector:
    matchLabels:
      {{- include "netops.serviceSelector" (dict "ctx" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "netops.componentLabels" (dict "ctx" . "component" "postgres") | nindent 8 }}
    spec:
      serviceAccountName: postgres-sa
      automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
      securityContext:
        {{- include "netops.podSecurityContext" . | nindent 8 }}
      {{- if and .Values.backup.postgres.enabled }}
      # WAL archiving wiring (W5-T1, ADR-0030 §1). The pgvector image has no
      # pgbackrest binary, so an initContainer copies it (static) out of the
      # pgbackrest image into a shared emptyDir on the postgres container's PATH.
      # Postgres `archive_command` (set via -c args below) then runs that
      # pgbackrest to encrypt + push each completed WAL segment to the repo — the
      # RPO floor (ADR-0030 §1 req 1). The scheduled full/incr backups are the
      # CronJobs (independent of this container; ADR-0030 §4/§5).
      initContainers:
        - name: pgbackrest-binary
          image: {{ include "netops.image" (dict "img" .Values.backup.postgres.image) }}
          imagePullPolicy: {{ .Values.backup.postgres.image.pullPolicy }}
          securityContext:
            {{- include "netops.hardenedSecurityContext" . | nindent 12 }}
          command:
            - sh
            - -c
            # L5: pipefail + a `test -s` size guard so a missing/empty binary copy
            # fails the pod instead of leaving archive_command silently broken.
            - |
              set -euo pipefail
              cp /usr/bin/pgbackrest /shared/pgbackrest
              chmod 0755 /shared/pgbackrest
              test -s /shared/pgbackrest
          resources:
            {{- toYaml .Values.backup.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: pgbackrest-bin
              mountPath: /shared
      {{- end }}
      containers:
        - name: postgres
          image: {{ include "netops.image" (dict "img" .Values.images.postgres) }}
          imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
          {{- $mtls := .Values.mtls.postgres -}}
          {{- if or .Values.backup.postgres.enabled $mtls.enabled }}
          # `-c` config overrides appended to the pgvector entrypoint's `postgres`
          # invocation. archive_* (ADR-0030 §1) enable continuous WAL archiving;
          # ssl_*/hba_file (ADR-0039 §3) turn on the server cert + the
          # `hostssl … clientcert=verify-full` pg_hba that REQUIRES + verifies the
          # client cert and REFUSES plaintext. archive_command is a postgres shell
          # (postgres expands %p), NOT a k8s exec argv.
          args:
            {{- if .Values.backup.postgres.enabled }}
            - -c
            - archive_mode={{ .Values.backup.postgres.wal.archiveMode }}
            - -c
            - wal_level=replica
            - -c
            - archive_command=/shared/pgbackrest/pgbackrest --stanza={{ .Values.backup.postgres.stanza }} --config=/etc/pgbackrest/pgbackrest.conf archive-push %p
            {{- end }}
            {{- if $mtls.enabled }}
            # mTLS server side (ADR-0039 §3). ssl=on + the server cert/key + the CA
            # the server verifies CLIENT certs against; hba_file points at the
            # mounted pg_hba.conf whose only TCP line is `hostssl …
            # clientcert=verify-full` — so a non-TLS / untrusted-CA connection is
            # REFUSED at the server (there is NO plaintext `host` listener line).
            - -c
            - ssl=on
            - -c
            - ssl_cert_file={{ $mtls.mountPath }}/server/{{ $mtls.serverCertFile | default "tls.crt" }}
            - -c
            - ssl_key_file={{ $mtls.mountPath }}/server/{{ $mtls.serverKeyFile | default "tls.key" }}
            - -c
            - ssl_ca_file={{ $mtls.mountPath }}/server/{{ $mtls.caFile | default "ca.crt" }}
            - -c
            - hba_file={{ $mtls.mountPath }}/hba/pg_hba.conf
            {{- end }}
          {{- end }}
          ports:
            - name: postgres
              containerPort: {{ .Values.services.postgres.port }}
              protocol: TCP
          securityContext:
            {{- include "netops.hardenedSecurityContext" . | nindent 12 }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "netops.fullname" . }}-config
                  key: NETOPS_POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "netops.fullname" . }}-config
                  key: NETOPS_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.secrets.existingSecret }}{{ .Values.secrets.existingSecret }}{{ else }}{{ include "netops.fullname" . }}-dev-secrets{{ end }}
                  key: {{ .Values.secrets.keys.postgresPassword }}
            # Unix socket directory — postgres writes its .pid and socket here.
            - name: PGHOST
              value: /var/run/postgresql
            {{- if .Values.backup.postgres.enabled }}
            # archive_command runs pgbackrest in THIS container; it needs the repo
            # credentials as PGBACKREST_* env (external-secret REFs only, NEVER
            # inlined — ADR-0030 §1 / ADR-0011 §4). The cipher pass + S3 key/secret
            # let archive-push encrypt and push each WAL segment to the repo.
            {{- if .Values.backup.postgres.encryption.enabled }}
            - name: PGBACKREST_REPO1_CIPHER_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "netops.platformSecretName" . }}
                  key: {{ .Values.secrets.keys.backupRepoCipherPass }}
            {{- end }}
            - name: PGBACKREST_REPO1_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "netops.platformSecretName" . }}
                  key: {{ .Values.secrets.keys.backupRepoS3Key }}
            - name: PGBACKREST_REPO1_S3_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "netops.platformSecretName" . }}
                  key: {{ .Values.secrets.keys.backupRepoS3KeySecret }}
            {{- end }}
          resources:
            {{- toYaml .Values.services.postgres.resources | nindent 12 }}
          startupProbe:
            exec:
              # exec-probe argv runs directly (no shell) and does NOT undergo
              # $(VAR) substitution — that only applies to container command/args.
              # Wrap in `sh -c` so POSTGRES_USER/POSTGRES_DB expand at probe time
              # (mirrors the redis template's documented pattern, ADR-0029 §7).
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 60
            periodSeconds: 5
          livenessProbe:
            exec:
              # exec-probe argv runs directly (no shell) and does NOT undergo
              # $(VAR) substitution — that only applies to container command/args.
              # Wrap in `sh -c` so POSTGRES_USER/POSTGRES_DB expand at probe time
              # (mirrors the redis template's documented pattern, ADR-0029 §7).
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              # exec-probe argv runs directly (no shell) and does NOT undergo
              # $(VAR) substitution — that only applies to container command/args.
              # Wrap in `sh -c` so POSTGRES_USER/POSTGRES_DB expand at probe time
              # (mirrors the redis template's documented pattern, ADR-0029 §7).
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            # Postgres data directory (PVC — persistent, writable).
            - name: data
              mountPath: /var/lib/postgresql/data
            # Unix socket dir + pid file (emptyDir — non-persistent scratch).
            - name: run
              mountPath: /var/run/postgresql
            # Postgres temp files.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.backup.postgres.enabled }}
            # pgBackRest binary (init-copied) + stanza config (ConfigMap) so
            # archive_command can encrypt + push WAL. readOnlyRootFilesystem:true
            # still holds — these add the binary/config + a writable pgbackrest
            # runtime/lock dir (the ONLY new writable mount for archive-push).
            - name: pgbackrest-bin
              mountPath: /shared/pgbackrest
              readOnly: true
            - name: pgbackrest-config
              mountPath: /etc/pgbackrest
              readOnly: true
            - name: pgbackrest-runtime
              mountPath: /var/lib/pgbackrest
            {{- end }}
            {{- if .Values.mtls.postgres.enabled }}
            # api/worker↔postgres mTLS (ADR-0039 §3). The SERVER cert/key + the CA
            # the server verifies CLIENT certs against, mounted READ-ONLY from the
            # cert-manager-issued (or dev-fallback) Secret — never image-baked or
            # logged (ADR-0039 §5). The pg_hba.conf (hostssl + clientcert=verify-
            # full, no plaintext line) is a separate read-only ConfigMap mount.
            - name: db-tls-server
              mountPath: {{ .Values.mtls.postgres.mountPath }}/server
              readOnly: true
            - name: db-tls-hba
              mountPath: {{ .Values.mtls.postgres.mountPath }}/hba
              readOnly: true
            {{- end }}
        {{- if and .Values.backup.postgres.enabled .Values.backup.postgres.tls.enabled }}
        # pgBackRest TLS SERVER sidecar (W5-T1, ADR-0030 §4). It shares the PGDATA
        # PVC (local pg1-path) and serves it to the remote backup CronJob over
        # mTLS — the CronJob has NO PGDATA volume and cannot read pg1-path itself.
        # Uses the SAME init-copied pgbackrest binary + the LOCAL pgbackrest.conf
        # (no pg1-host). Hardened identically (drop-ALL, non-root, RO-rootfs).
        - name: pgbackrest-server
          image: {{ include "netops.image" (dict "img" .Values.backup.postgres.image) }}
          imagePullPolicy: {{ .Values.backup.postgres.image.pullPolicy }}
          securityContext:
            {{- include "netops.hardenedSecurityContext" . | nindent 12 }}
          command:
            - /shared/pgbackrest/pgbackrest
          args:
            - --config=/etc/pgbackrest/pgbackrest.conf
            - server
          ports:
            - name: pgbackrest
              containerPort: {{ .Values.backup.postgres.tls.serverPort }}
              protocol: TCP
          env:
            # The server reads + pushes to the repo on the client's behalf, so it
            # needs the repo credentials as PGBACKREST_* env (external-secret REFs
            # only; NEVER inlined — ADR-0030 §1 / ADR-0011 §4).
            {{- if .Values.backup.postgres.encryption.enabled }}
            - name: PGBACKREST_REPO1_CIPHER_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "netops.platformSecretName" . }}
                  key: {{ .Values.secrets.keys.backupRepoCipherPass }}
            {{- end }}
            - name: PGBACKREST_REPO1_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "netops.platformSecretName" . }}
                  key: {{ .Values.secrets.keys.backupRepoS3Key }}
            - name: PGBACKREST_REPO1_S3_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "netops.platformSecretName" . }}
                  key: {{ .Values.secrets.keys.backupRepoS3KeySecret }}
          resources:
            {{- toYaml .Values.backup.postgres.resources | nindent 12 }}
          volumeMounts:
            # Shares the PGDATA PVC so pg1-path is LOCAL to the server.
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: pgbackrest-bin
              mountPath: /shared/pgbackrest
              readOnly: true
            - name: pgbackrest-config
              mountPath: /etc/pgbackrest
              readOnly: true
            # mTLS material (CA + server cert/key) mounted read-only from the Secret.
            - name: pgbackrest-tls
              mountPath: /etc/pgbackrest-tls
              readOnly: true
            - name: pgbackrest-runtime
              mountPath: /var/lib/pgbackrest
        {{- end }}
      volumes:
        - name: run
          emptyDir:
            sizeLimit: 16Mi
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
        {{- if .Values.mtls.postgres.enabled }}
        # api/worker↔postgres mTLS material (ADR-0039 §3/§5). The SERVER keypair +
        # CA from the cert-manager-issued (or dev-fallback) Secret. defaultMode
        # 0640 so the root-owned key is group-readable by the postgres uid (via
        # fsGroup) while staying non-world-readable — postgres REFUSES an over-
        # permissive (0644/world-readable) ssl_key_file. By-reference; never inlined.
        - name: db-tls-server
          secret:
            secretName: {{ .Values.mtls.postgres.serverSecretName }}
            defaultMode: 0640
        # pg_hba.conf: a ConfigMap whose only TCP line is `hostssl … cert
        # clientcert=verify-full` (no plaintext `host` line) — the server REFUSES
        # non-TLS / untrusted-CA connections (ADR-0039 §3). Non-secret (config only).
        - name: db-tls-hba
          configMap:
            name: {{ include "netops.fullname" . }}-postgres-tls-config
        {{- end }}
        {{- if .Values.backup.postgres.enabled }}
        - name: pgbackrest-bin
          emptyDir:
            sizeLimit: 64Mi
        - name: pgbackrest-config
          configMap:
            name: {{ include "netops.fullname" . }}-pgbackrest-config
        - name: pgbackrest-runtime
          emptyDir:
            sizeLimit: 512Mi
        {{- if .Values.backup.postgres.tls.enabled }}
        # pgBackRest mTLS material (CA + server cert/key) for the server sidecar,
        # by-reference from the platform Secret (NEVER inlined). The sidecar
        # presents server.crt; pg1-host clients verify against ca.crt.
        - name: pgbackrest-tls
          secret:
            secretName: {{ include "netops.platformSecretName" . }}
            items:
              - key: {{ .Values.secrets.keys.backupTlsCa }}
                path: ca.crt
              - key: {{ .Values.secrets.keys.backupTlsServerCert }}
                path: server.crt
              - key: {{ .Values.secrets.keys.backupTlsServerKey }}
                path: server.key
        {{- end }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "netops.componentLabels" (dict "ctx" . "component" "postgres") | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.services.postgres.storage.size }}
---
# Headless Service for the StatefulSet (stable DNS per pod) + a ClusterIP
# Service for client connections (the api/worker dial the Service VIP).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netops.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "netops.serviceSelector" (dict "ctx" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.services.postgres.port }}
      targetPort: postgres
      protocol: TCP
    {{- if and .Values.backup.postgres.enabled .Values.backup.postgres.tls.enabled }}
    # pgBackRest TLS server port — the backup CronJob reaches the in-pod
    # `pgbackrest server` sidecar here (mTLS), NOT 5432 (ADR-0030 §4).
    - name: pgbackrest
      port: {{ .Values.backup.postgres.tls.serverPort }}
      targetPort: pgbackrest
      protocol: TCP
    {{- end }}
{{- end }}
