{{- /*
Least-privilege RBAC (ADR-0029 §5 / ADR-0031 §1):
- own ServiceAccount per workload (capture, analysis)
- automountServiceAccountToken: false (the workers talk to Postgres/Redis, NOT
  the K8s API, so they need no token mounted)
- ZERO Role / ClusterRole / RoleBinding / ClusterRoleBinding shipped here.
The capture and analysis paths never share a ServiceAccount — the
credential-bearing and untrusted-parser identities are physically distinct.
*/ -}}
{{- if .Values.serviceAccounts.create }}
{{- /*
W4 per-workload ServiceAccounts (ADR-0029 §5):
- api-sa, worker-sa, frontend-sa — the three platform services.
- postgres-sa, neo4j-sa, redis-sa, ollama-sa — data stores (guarded by enabled).
All carry automountServiceAccountToken:false; zero Role/ClusterRole/Binding.
*/ -}}
{{- if .Values.services.api.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- if .Values.services.worker.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- if .Values.services.frontend.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- if .Values.services.postgres.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- if .Values.services.neo4j.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neo4j-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- if .Values.services.redis.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- if .Values.services.ollama.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ollama-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- /*
backup-sa is the shared backup identity used by the pgBackRest postgres CronJobs
(W5-T1) AND the pcap snapshot/restore drill CronJobs (W5-T4). It must render
whenever ANY of those consumers render, or a consumer references a missing SA:
  - the in-chart pgBackRest tier:   backup.postgres.enabled AND services.postgres.enabled
  - the pcap snapshot/restore tier:  backup.pcap.enabled
  - the CloudNativePG HA tier (W1-T1, ADR-0042): cloudNativePg.enabled — which
    REQUIRES services.postgres.enabled=false (mutual exclusion), so the old
    postgres-coupled gate would otherwise drop this SA out from under the pcap
    CronJobs. Rendering the SA here is the fix (the SA grants no API access).
*/ -}}
{{- if or (and .Values.backup.postgres.enabled .Values.services.postgres.enabled) .Values.backup.pcap.enabled .Values.cloudNativePg.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  # Own SA for the pgBackRest backup CronJobs (W5-T1, ADR-0029 §5). The backup
  # job talks to Postgres + the object store, NOT the K8s API — so it mounts no
  # token; zero Role/Binding is granted to it (a backup pod must not reach the
  # API). Physically distinct from postgres-sa (separate identity for the DR tier).
  name: backup-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- if .Values.seccompInstaller.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: seccomp-installer-sa
  # SA lives alongside its DaemonSet in the relaxed-PSA namespace (the install
  # namespace's PSS `restricted` HARD-REJECTS the root+hostPath installer pod;
  # PSA cannot be exempted by pod annotations). ADR-0029 §3 / ADR-0031 §5.
  namespace: {{ include "netops.seccompInstallerNamespace" . }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: seccomp-installer
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
---
{{- if and .Values.packet.enabled .Values.packet.capture.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: packet-capture-sa
  # Capture's SA lives in the capture namespace alongside its Deployment
  # (ADR-0031 §5 — relaxed-PSA namespace for the NET_RAW deviation).
  namespace: {{ include "netops.captureNamespace" . }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: packet-capture
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- if and .Values.packet.enabled .Values.packet.analysis.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: packet-analysis-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: packet-analysis
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
{{- end }}
{{- end }}
{{- /*
The ONLY namespaced Role the chart ships (ADR-0029 §5): a tightly-scoped grant
for the Helm pre-upgrade Alembic migration Job, OPT-IN and DEFAULT OFF. It is a
Role + RoleBinding confined to the release namespace — NEVER a ClusterRole /
ClusterRoleBinding (the chart ships ZERO of those, asserted in the rego). The
Role permits get/list/watch on EXACTLY the migration Job's own ConfigMap and
nothing else; the long-running api/worker/frontend pods are never bound to it.
When migrationJob.rbac.enabled is false (the default) NO object below renders and
the secure default — no platform workload holds any K8s API permission — holds.
*/ -}}
{{- if .Values.migrationJob.rbac.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.migrationJob.rbac.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration-job
automountServiceAccountToken: {{ .Values.serviceAccounts.automountServiceAccountToken }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migration-job-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration-job
rules:
  # Least-privilege: GET on EXACTLY the migration Job's own ConfigMap by name,
  # in this namespace only. No verbs beyond get/list/watch, no other resources,
  # no wildcard. The expand/contract Alembic Job reads its config and nothing
  # more (PRODUCTION.md §10 / ADR-0029 §5).
  - apiGroups: [""]
    resources: ["configmaps"]
    # resourceNames is MANDATORY when this Role renders: an empty list would grant
    # get/list/watch on EVERY ConfigMap in the namespace, contradicting the
    # least-privilege claim above. `required` fails the template when an operator
    # opts the migration RBAC on without naming the Job's ConfigMap (ADR-0029 §5).
    resourceNames:
      - {{ required "migrationJob.rbac.configMapName is REQUIRED when migrationJob.rbac.enabled=true — the migration Role must be scoped to exactly one ConfigMap, never all ConfigMaps in the namespace (ADR-0029 §5 least-privilege)." .Values.migrationJob.rbac.configMapName }}
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migration-job-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration-job
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: migration-job-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.migrationJob.rbac.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
