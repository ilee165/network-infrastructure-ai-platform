{{- /*
GOLDEN-SIGNAL GRAFANA DASHBOARDS — provisioning ConfigMap (W3-T4, ADR-0046 §4;
PRODUCTION.md §6 / §11 G-OBS §335).

Ships the in-repo golden-signal dashboards-as-code (deploy/observability/dashboards/
*.json) into the cluster as a Grafana-sidecar-discoverable ConfigMap — NO click-ops
(ADR-0046 §4: "dashboards are code in the repo ... provisioned via the chart"). The
`grafana_dashboard: "1"` label is the kube-prometheus-stack / Grafana sidecar
selector: a Grafana running that sidecar auto-loads every dashboard in `data`
without a manual import.

SINGLE SOURCE OF TRUTH + LINT GATE
  The dashboard JSON embedded here via `.Files.Get` is the SAME file the structural
  lint (deploy/observability/dashboards/lint_dashboards.py) + its bite proof
  (run-dashboard-lint-bite.sh) validate, and whose panels read the W3-T2 §1
  recording-rule `slo:` series + the ADR-0015 `netops_*` base series. A renamed base
  metric breaks the dashboard lint, by design (ADR-0046 §4) — never silently the
  dashboard.

EXPOSE-DON'T-BUNDLE (ADR-0015 alt.1 / ADR-0046 §4)
  Renders ONLY when observability.grafanaDashboards.enabled. A default install
  exposes the `netops_*` series on /metrics but does NOT bundle a Prometheus/Grafana
  stack; the dashboards ship as opt-in CODE. Running the monitoring stack (and this
  ConfigMap) stays the operator's choice — same posture as the W3-T2 PrometheusRule.

  NOTE on PG/Neo4j/Redis panels: those dashboards read the conventional
  postgres_exporter / redis_exporter / neo4j-metrics series (this chart bundles no
  exporter — expose-don't-bundle). Wiring those exporters is named-deferred to the
  operator; the dashboard descriptions FLAG it (and the lint asserts the FLAG).
*/ -}}
{{- if .Values.observability.grafanaDashboards.enabled }}
{{- /*
FAIL LOUD ON AN UNSYNCED CHART (PR #159 review): before the build-time copy
step existed, deploy/kubernetes/netops/dashboards/ was a checked-in file, so
.Files.Glob below could never come up empty. Now it's a gitignored build
artifact (see .gitignore) produced by sync-to-chart.sh, so a render taken
without that step first — e.g. a manual `helm install`/`helm template`/`helm
package` outside CI — would otherwise silently ship an empty-data ConfigMap:
the sidecar provisions nothing and nothing errors. Fail instead.
*/ -}}
{{- if not (.Files.Glob "dashboards/*.json") }}
{{- fail "observability.grafanaDashboards.enabled=true but deploy/kubernetes/netops/dashboards/ is empty. Run deploy/observability/dashboards/sync-to-chart.sh before helm lint/template/package (that directory is a gitignored build artifact, not a checked-in file — see deploy/kubernetes/netops/README.md)." }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "netops.fullname" . }}-grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
    netops.ai/golden-signal-dashboards: "true"
    # Grafana sidecar discovery selector (kube-prometheus-stack default). Override
    # the key/value via values if your Grafana sidecar watches a different label.
    {{ .Values.observability.grafanaDashboards.sidecarLabel.key }}: {{ .Values.observability.grafanaDashboards.sidecarLabel.value | quote }}
    {{- with .Values.observability.grafanaDashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.observability.grafanaDashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- /*
  Embed every dashboard JSON. `.Files.Glob` walks the chart-relative path; the
  canonical dashboards live OUTSIDE the chart dir (deploy/observability/dashboards)
  and Helm cannot read outside the chart root, so
  deploy/observability/dashboards/sync-to-chart.sh copies them into
  deploy/kubernetes/netops/dashboards/ at BUILD TIME (run before `helm lint`/
  `helm template`/`helm package`; wired into CI ahead of every render — see
  .github/workflows/ci.yml). That copy is a build artifact, not a checked-in
  file (see .gitignore), and is embedded from there. Each entry is keyed by its
  filename so the sidecar provisions one dashboard per key.
  */}}
  {{- $root := . }}
  {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |-
{{ $root.Files.Get $path | indent 4 }}
  {{- end }}
{{- end }}
