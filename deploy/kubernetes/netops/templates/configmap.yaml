{{- /*
Non-secret application config (ADR-0029 §1 — `configmap.yaml`, NETOPS_* settings).
This holds ONLY connection coordinates + behavioural flags. NO credential
material ever lands here — passwords, the OIDC client secret, and the KMS
master-key reference are by-reference only via the `secrets` map (ADR-0029 §6).
The api/worker read these as NETOPS_* env at boot.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "netops.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netops.labels" . | nindent 4 }}
data:
  NETOPS_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  # Postgres (D11) — password is by-reference (secrets.keys.postgresPassword).
  # When the CloudNativePG HA tier is enabled this resolves to the PgBouncer
  # Pooler rw Service (the single-instance Service is not rendered) — ADR-0042 §4.
  NETOPS_POSTGRES_HOST: {{ include "netops.postgresHost" . | quote }}
  NETOPS_POSTGRES_PORT: {{ .Values.config.postgres.port | quote }}
  NETOPS_POSTGRES_DB: {{ .Values.config.postgres.database | quote }}
  NETOPS_POSTGRES_USER: {{ .Values.config.postgres.user | quote }}
  # Neo4j (D5 projection) — auth is by-reference (secrets.keys.neo4jAuth).
  NETOPS_NEO4J_URI: {{ .Values.config.neo4j.uri | quote }}
  NETOPS_NEO4J_USER: {{ .Values.config.neo4j.user | quote }}
  # Redis broker/result backend — password is by-reference (secrets.keys.redisPassword).
  # NETOPS_REDIS_URL is the SOURCE OF TRUTH the app reads (config.redis_url; the
  # Celery broker/result backend, the rate-limiter, and the health probe all dial
  # it). Under the redisSentinel HA tier (W1-T4, ADR-0044 §1) this resolves to a
  # `sentinel://h0:26379;h1:26379;h2:26379/<db>` URL so the client discovers the
  # CURRENT primary via Sentinel and re-points on failover with NO config change —
  # there is NO static Redis host pin. When the tier is off it is the plain
  # single-instance `redis://host:port/db` URL (the GA default render is unchanged).
  # The password is NEVER in this URL — it is the separate NETOPS_REDIS_PASSWORD
  # secretKeyRef env on the api/worker pods.
  NETOPS_REDIS_URL: {{ include "netops.redisUrl" . | quote }}
  # Sentinel discovery coordinates (NON-SECRET) the Sentinel-aware client passes
  # in its transport options (master_name + the Sentinel host list). Surfaced even
  # when the tier is off so the coordinate is stable; the URL scheme above is what
  # switches the client into Sentinel mode.
  NETOPS_REDIS_SENTINEL_MASTER: {{ include "netops.redisSentinelMaster" . | quote }}
  {{- if .Values.redisSentinel.enabled }}
  NETOPS_REDIS_SENTINEL_HOSTS: {{ include "netops.redisSentinelHosts" . | quote }}
  {{- end }}
  # Single-instance coordinates (retained for backward compatibility / external
  # broker overrides). Under the Sentinel tier the URL above supersedes these.
  NETOPS_REDIS_HOST: {{ .Values.config.redis.host | quote }}
  NETOPS_REDIS_PORT: {{ .Values.config.redis.port | quote }}
  # LLM provider profile (ADR-0009) — REAL Settings keys (llm_profile /
  # ollama_base_url; Settings has extra="ignore", so a wrong key here fails
  # SILENTLY). profile=local dials Ollama at NETOPS_OLLAMA_BASE_URL, which
  # defaults to the chart's in-cluster ollama Service (services.ollama, opt-in).
  NETOPS_LLM_PROFILE: {{ .Values.config.llm.profile | quote }}
  NETOPS_OLLAMA_BASE_URL: {{ include "netops.ollamaBaseUrl" . | quote }}
  {{- with .Values.config.llm.localModel }}
  NETOPS_LLM_LOCAL_MODEL: {{ . | quote }}
  {{- end }}
  # OIDC/SSO non-secret coordinates (ADR-0028). The client SECRET is by-reference
  # only (secrets.keys.oidcClientSecret) — issuer/clientId are non-secret.
  NETOPS_OIDC_ENABLED: {{ .Values.config.oidc.enabled | quote }}
  NETOPS_OIDC_ISSUER: {{ .Values.config.oidc.issuer | quote }}
  NETOPS_OIDC_CLIENT_ID: {{ .Values.config.oidc.clientId | quote }}
  # KMS master-key REFERENCE provider (ADR-0032 / D11). The handle/path is
  # resolved at runtime — this is the provider selector, NOT the key.
  NETOPS_KMS_PROVIDER: {{ .Values.secrets.kms.provider | quote }}
  {{- if .Values.secrets.kms.masterKeyRef }}
  NETOPS_KMS_MASTER_KEY_REF: {{ .Values.secrets.kms.masterKeyRef | quote }}
  {{- end }}
  # Production posture gate (W6-T2, ADR-0032 §2). ON in-chart by default so the
  # credential service REFUSES to start on a local Env/File KEK in production —
  # a non-production KEK can never hide behind a green deploy. Off in compose.
  # NOTE: do NOT use `| default true` on a bool — Helm's `default` treats the
  # boolean `false` as empty and would silently force an explicit `isProd: false`
  # opt-out back to true. Guard on whether the key is ABSENT (kindIs "invalid")
  # instead: absent ⇒ true (secure default, values.yaml also ships true); present
  # ⇒ honour the operator's explicit value (including an intentional false).
  NETOPS_IS_PROD: {{ (kindIs "invalid" .Values.config.kms.isProd) | ternary true .Values.config.kms.isProd | quote }}
  {{- with .Values.config.kms.keyProvider }}
  # Active KEK backend (W6-T2): aws | azure | vault (production KMS) — the
  # credential service selects by THIS value only; all auth below is referenced
  # indirectly (IAM role / managed identity / credential_ref), never inlined.
  NETOPS_VAULT_KEY_PROVIDER: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.kms.aws }}
  {{- with .keyArn }}
  NETOPS_AWS_KMS_KEY_ARN: {{ . | quote }}
  {{- end }}
  {{- with .region }}
  NETOPS_AWS_REGION: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.config.kms.azure }}
  {{- with .vaultUri }}
  NETOPS_AZURE_KEY_VAULT_URI: {{ . | quote }}
  {{- end }}
  {{- with .keyName }}
  NETOPS_AZURE_KEY_NAME: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.config.kms.vault }}
  {{- with .addr }}
  NETOPS_VAULT_ADDR: {{ . | quote }}
  {{- end }}
  {{- with .transitMount }}
  NETOPS_VAULT_TRANSIT_MOUNT: {{ . | quote }}
  {{- end }}
  {{- with .transitKey }}
  NETOPS_VAULT_TRANSIT_KEY: {{ . | quote }}
  {{- end }}
  {{- with .credentialRef }}
  # INDIRECT login handle (k8s-auth role / AppRole id), NOT a token value.
  NETOPS_VAULT_CREDENTIAL_REF: {{ . | quote }}
  {{- end }}
  {{- end }}
