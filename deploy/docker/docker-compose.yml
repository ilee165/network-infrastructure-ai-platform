# AI Network Operations Platform - Docker Compose stack (M0; ADR-0013 / D13).
#
# Run from the REPOSITORY ROOT after `cp .env.example .env`:
#
#   docker compose -f deploy/docker/docker-compose.yml up -d
#   docker compose -f deploy/docker/docker-compose.yml --profile local-llm up -d
#
# Recommended: add `--env-file .env` so compose variable interpolation (used
# for the neo4j credentials below) reads the root .env — without it compose
# only interpolates from the shell environment. Full first-run notes:
# deploy/docker/README.md.
#
# Canonical service names (DECISIONS-BRIEF section 1): api, worker, frontend,
# postgres, neo4j, redis, ollama (profile "local-llm"). Data stores are not
# published to the host by default (secure by default); uncomment the ports
# stanzas for local debugging only.

name: netops

services:
  # FastAPI REST + WebSocket API (uvicorn; default CMD of the backend image).
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    image: netops-backend:dev
    env_file: ../../.env
    ports:
      - "8000:8000"
    volumes:
      # pcap artifact volume (ADR-0013 §3 / ADR-0023 §3): the API streams
      # downloads from here; the capture/retention workers write/purge it.
      - pcaps:/data/pcaps
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    # Healthcheck (GET /api/v1/health/live) is baked into the image.

  # Celery worker - same image as `api`, command overridden to consume the
  # general D8 queues (ADR-0008) plus the default `system` queue
  # (system.* tasks, e.g. the system.healthcheck broker round-trip probe).
  #
  # NOTE (ADR-0031 §1 / P1 W3): the `packet` queue is split OUT of this shared
  # worker into the dedicated, OS-isolated `packet-analysis` service below — the
  # untrusted-pcap parser must never share a process with credential-bearing,
  # broadly-egressing general workers. This matches the Helm chart's two-Deployment
  # split (capture + analysis). Compose deferral: a fully-separated privileged
  # `packet-capture` worker (NET_RAW, management-subnet egress) is the K8s
  # capture-Deployment's concern and is NOT modelled in this dev Compose stack —
  # local dev captures are typically driven device-side, and adding NET_RAW to a
  # dev container would weaken the very posture this split exists to demonstrate.
  # The required, security-load-bearing half — the hardened analysis sandbox in
  # lockstep with the K8s analysis profile (seccomp, cap_drop, read_only,
  # resource limits) — IS modelled, below.
  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    image: netops-backend:dev
    command: celery -A app.workers.celery_app worker -Q discovery,config,docs,system
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    # The image HEALTHCHECK targets uvicorn on :8000, which the worker does
    # not serve - override with a Celery broker round-trip ping.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3

  # Packet-analysis sandbox (ADR-0031 §2/§3) — the UNTRUSTED-pcap parser, hardened
  # in lockstep with the Helm `packet-analysis` Deployment. tshark's C dissectors
  # carry parsing CVEs and the pcap bytes are remote-attacker-controlled, so this
  # service runs with the SAME OS-isolation profile as the K8s analysis pod:
  #   - seccomp: the deny-by-default Localhost profile, byte-for-byte the file the
  #     chart references (seccomp lockstep, ADR-0031 §3).
  #   - cap_drop:[ALL], no add — the parser holds zero Linux capabilities (NO NET_RAW).
  #   - read_only root filesystem + a single bounded tmpfs scratch at the pyshark
  #     temp path (the K8s `emptyDir` scratch equivalent).
  #   - non-root, no-new-privileges (allowPrivilegeEscalation:false equivalent).
  #   - pcap volume mounted READ-ONLY (parser cannot alter/delete evidence).
  #   - mem/cpu limits so an adversarial capture is OOM/CPU-bound, not node-exhausting.
  packet-analysis:
    # OPT-IN (compose profile "packet") — excluded from the default `docker compose
    # up` so the core quickstart (api/worker/frontend/postgres/redis/neo4j) comes up
    # clean. Start it explicitly with `docker compose --profile packet up -d`.
    #
    # WHY opt-in: the hardened analysis sandbox (ADR-0031 §3) denies socket() by
    # design — the pcap parser must never open a network path. But this service is
    # a Celery worker that must reach the Redis broker over TCP, so a container-level
    # no-socket seccomp profile and a broker-connected worker are mutually exclusive
    # (glibc getaddrinfo cannot even open a DNS socket → "Temporary failure in name
    # resolution"), and tshark is spawned by plain subprocess.run with no
    # subprocess-level seccomp to split the two. Resolving it — nested seccomp on the
    # tshark child (worker keeps its socket), or an ADR-0031 §3 amendment allowing
    # client sockets and relying on the §4 default-deny egress NetworkPolicy — is
    # deferred design work. Everything else in this service (mount-API + link/linkat
    # seccomp allowances, TMPDIR on the read-only rootfs) is fixed and correct.
    profiles: ["packet"]
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    image: netops-backend:dev
    command: celery -A app.workers.celery_app worker -Q packet_analysis
    env_file: ../../.env
    # read_only rootfs (below) leaves every default tempfile location (/tmp,
    # /var/tmp, CWD=/srv/netops) unwritable, so Python/celery/tshark/pyshark
    # tempfile.gettempdir() finds nothing usable and the worker crash-loops
    # ("No usable temporary directory found"). Point them at the one bounded
    # tmpfs scratch (ADR-0031 §2). Lockstep with the chart's TMPDIR env.
    environment:
      TMPDIR: /tmp/pyshark
    # Seccomp lockstep with the Helm chart (ADR-0031 §3): same JSON, two targets.
    # Compose resolves a `seccomp=` RELATIVE path against the PROJECT DIRECTORY
    # (the dir of the first `-f` compose file, i.e. deploy/docker/ by default) —
    # NOT the client CWD (that CWD-relative rule is `docker run --security-opt`,
    # a different tool). So the value must be compose-file-relative: `./seccomp/...`
    # resolves to deploy/docker/seccomp/... from ANY CWD, because the project dir
    # keys off this file's location, not where compose was invoked. Do NOT prefix
    # it with deploy/docker/ — that doubles the path. An air-gapped mirror can
    # override NETOPS_SECCOMP_PROFILE with an ABSOLUTE path. Keep the JSON
    # byte-for-byte in lockstep with the chart profile.
    security_opt:
      - "no-new-privileges:true"
      - "seccomp=${NETOPS_SECCOMP_PROFILE:-./seccomp/packet-analysis-seccomp.json}"
    cap_drop:
      - ALL
    user: "10001:10001"
    read_only: true
    volumes:
      # Read-ONLY pcap volume: the parser reads bytes, never writes/deletes them.
      - pcaps:/data/pcaps:ro
    tmpfs:
      # The SINGLE bounded writable scratch — the tshark/pyshark temp path.
      # mode=1777 so the non-root parser (uid 10001) can create temp files here.
      - /tmp/pyshark:size=512m,mode=1777
    mem_limit: 1g
    cpus: 2.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3

  # nginx serving the Vite SPA on 8080; proxies /api/ to the api service
  # (deploy/docker/nginx.conf).
  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
    image: netops-frontend:dev
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # System of record + pgvector embeddings (ADR-0004). Credentials match the
  # NETOPS_DATABASE_URL default (postgresql+asyncpg://netops:netops@postgres:5432/netops);
  # change both together if you customize them.
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: netops
      POSTGRES_PASSWORD: netops
      POSTGRES_DB: netops
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netops -d netops"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 12
    restart: unless-stopped
    # ports: ["5432:5432"]  # dev debugging only

  # Topology / knowledge graph (ADR-0005). Auth is wired from NETOPS_NEO4J_*
  # via compose interpolation. NOTE: the neo4j image REJECTS the default
  # password "neo4j" (and any password shorter than 8 characters) - set
  # NETOPS_NEO4J_PASSWORD in .env and pass `--env-file .env` (or export the
  # variables) so the value reaches this container. See deploy/docker/README.md.
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NETOPS_NEO4J_USER:-neo4j}/${NETOPS_NEO4J_PASSWORD:-neo4j}
    volumes:
      - neo4jdata:/data
    healthcheck:
      # Unauthenticated HTTP discovery endpoint - probes process readiness
      # without coupling the healthcheck to credentials.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 12
    restart: unless-stopped
    # ports: ["7474:7474", "7687:7687"]  # dev debugging only

  # Celery broker/result backend + cache (ADR-0008).
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # Local-first LLM inference (ADR-0009 profile "local"). Optional:
  #   docker compose -f deploy/docker/docker-compose.yml --profile local-llm up -d
  # Without this profile, configure an external provider via NETOPS_LLM_PROFILE.
  ollama:
    image: ollama/ollama
    profiles: ["local-llm"]
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    restart: unless-stopped

# Named volumes per ADR-0013 §3.
volumes:
  pgdata:
  neo4jdata:
  redisdata:
  ollama-models:
  # pcap capture artifacts (ADR-0023): written by the capture worker, read by
  # the API for downloads, purged by the retention beat.
  pcaps:
