# nginx configuration for the `frontend` container (deploy/docker/frontend.Dockerfile).
#
# Runs as the non-root `nginx` user (ADR-0013 / DECISIONS-BRIEF section 7):
# the pid file and all temp paths live under /tmp, and the server listens on
# the unprivileged port 8080. Serves the Vite SPA bundle and reverse-proxies
# /api/ to the `api` compose service (http://api:8000).

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout combined;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Reuse connections to the api upstream (Wave 5 / perf #14 quick-win).
    # Without keepalive, every /api/ proxy opens a fresh TCP connection to
    # uvicorn; 32 idle keepalives is enough for local compose concurrency.
    upstream api {
        server api:8000;
        keepalive 32;
    }

    # Writable locations for the non-root worker processes.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # WebSocket upgrade for the agent chat channel,
    # WS /api/v1/agents/sessions/{session_id}/ws (REPO-STRUCTURE section 4.5; lands M3).
    # Empty string (not "close") on non-upgrade so upstream keepalive can reuse
    # idle connections for ordinary /api/ HTTP (Wave 5).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # --- Security headers (production audit PRODUCTION_READINESS #4) ---
        # `always` so the headers are also emitted on 4xx/5xx responses.
        #
        # nginx `add_header` inheritance is ALL-OR-NOTHING: any location that
        # declares its own add_header (the Cache-Control blocks below) drops
        # every server-level header, so this full set is REPEATED verbatim in
        # those locations. Keep the copies in lockstep when editing.
        #
        # These server-level headers DO apply to `location /api/` (it declares
        # no add_header of its own), so proxied API responses carry them too.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP ships in REPORT-ONLY mode first (audit Wave 2 item 4).
        # TODO(csp-enforce): rename this header to Content-Security-Policy
        # (enforcing) once the compose-up smoke passes — SPA routes, /api/
        # proxy, and the WS ticket flow exercised with ZERO CSP violation
        # reports in the browser console. `connect-src ws: wss:` is a
        # deliberate loose scheme allowance for the agent-chat WebSocket;
        # tighten to the deployed origin when flipping to enforcing.
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

        # API + WebSocket reverse proxy to the api service. No trailing slash
        # on proxy_pass: the full /api/v1/... URI is forwarded unchanged, which
        # matches the backend's /api/v1 mount.
        location /api/ {
            # Upstream block enables keepalive 32 (Wave 5). Connection header
            # still uses $connection_upgrade so WebSocket upgrades work; plain
            # HTTP requests get Connection close from the map default ''→close
            # path — keepalive still reuses the upstream idle pool between
            # requests that do not send Connection: close from the client.
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Long-running agent sessions / discovery status streams.
            proxy_read_timeout 300s;
        }

        # Hashed, immutable Vite build assets.
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            # Security header set re-declared: this location's add_header
            # cancels server-level inheritance (see note above).
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
            try_files $uri =404;
        }

        # SPA fallback: client-side routes resolve to index.html.
        location / {
            add_header Cache-Control "no-cache";
            # Security header set re-declared: this location's add_header
            # cancels server-level inheritance (see note above).
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
            try_files $uri $uri/ /index.html;
        }
    }
}
