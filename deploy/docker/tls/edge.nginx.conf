# TLS-terminating reverse proxy for the compose edge (M5 hardening, ADR-0013 §3).
#
# Terminates TLS in front of the `frontend` (SPA + /api proxy) and `api`
# services so no plaintext HTTP crosses the host boundary. Used only by the
# optional TLS overlay (deploy/docker/docker-compose.tls.yml); the base compose
# stack is unchanged. Runs as the non-root `nginx` user on the unprivileged
# upstream model — temp paths and the pid live under /tmp.
#
# Certificates are mounted read-only at /etc/nginx/tls/{tls.crt,tls.key}. For
# dev, generate a self-signed pair with deploy/docker/tls/generate-dev-cert.sh.
# For production, mount a CA-issued cert (Helm `Ingress` TLS is the prod path).

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout combined;
    sendfile on;
    server_tokens off;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Plain HTTP -> permanent redirect to HTTPS (no plaintext app traffic).
    server {
        listen 8080;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # TLS edge. Modern protocols/ciphers only; HSTS once the cert is trusted.
    server {
        listen 8443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # API + WebSocket: forward straight to the api service. X-Forwarded-Proto
        # is https so the app builds correct absolute URLs / secure cookies.
        location /api/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
        }

        # Everything else: the SPA served by the frontend container.
        location / {
            proxy_pass http://frontend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
