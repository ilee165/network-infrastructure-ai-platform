# Neo4j rebuild-drill — Compose one-shot (W5-T3, ADR-0030 §2/§5.2, ADR-0005 D5).
#
# WHAT IT PROVES: Neo4j has NO backup — DR is a full RE-PROJECTION from Postgres,
# not a restore of a graph dump (ADR-0005 D5 / ADR-0030 §2, Alt #2). Restoring a
# stale `neo4j-admin dump` could reintroduce a projection that DISAGREES with the
# authoritative Postgres — forbidden by D5. This one-shot service:
#   (1) drops/recreates the projected graph + re-projects the WHOLE Postgres
#       inventory via the EXISTING engines/topology full-rebuild path
#       (topology_rebuild.run_drill → app.engines.topology.metrics.timed_rebuild),
#       which times the wall-clock and records `topology_rebuild_seconds` +
#       topology_rebuild_nodes/_edges onto Prometheus (the topology-RTO; G-REL/G-OBS);
#   (2) asserts the rebuilt node/edge counts MATCH the pre-wipe projection within
#       tolerance — turning "rebuildable" into a checkable invariant (ADR-0005
#       contract). A mismatch is a FAILED drill (ADR-0030 Negative);
#   (3) asserts `topology_rebuild_seconds` < the PROPOSED topology-RTO and emits:
#       `DRILL neo4j_rebuild seconds=<n> nodes=<n> edges=<n> result=PASS|FAIL`
#       for the W5-T5 G-REL evidence collector.
#
# MIRRORS the K8s neo4j-rebuild-drill-job.yaml container spec exactly: same image,
# same env surface (TOPOLOGY_RTO_SECONDS, TOPOLOGY_COUNT_TOLERANCE,
# TOPOLOGY_DUMP_ENABLED), same PYTHONPATH (/app:/app/drills), same command (L3/L5
# guards: set -euo pipefail + test -s non-empty guard on the result stream).
#
# BUILT P1, RUN P2 (ADR-0030 §5.2 / P1-PLAN.md §6): the P1 gate is a green
# dry-run over the seeded fixture (no hardware). P2 points it at restored/live
# Postgres + Neo4j. `restart: no` so docker compose up exits immediately after the
# drill completes (one-shot semantics — not a daemon).
#
# SECRETS: Postgres password + Neo4j auth come from the root .env as env-var REFS
# (NETOPS_POSTGRES_PASSWORD, NETOPS_NEO4J_AUTH) — NEVER inlined in this file
# (ADR-0030 §1 / ADR-0029 §6).
#
# Run (from repo root):
#   docker compose \
#     -f deploy/docker/docker-compose.yml \
#     -f deploy/docker/docker-compose.neo4j-rebuild-drill.yml \
#     --profile drills --env-file .env \
#     run --rm neo4j-rebuild-drill

services:
  neo4j-rebuild-drill:
    image: ghcr.io/netops/netops-backend:p1
    profiles: ["drills"]
    # ONE sh -c script (L3: env vars expand HERE; a raw exec argv would NOT do
    # $(VAR) substitution). set -o pipefail + a `test -s` non-empty guard (L5) so
    # a silently-empty rebuild stream FAILS the job (never "succeeds").
    command:
      - sh
      - -c
      - |
        set -euo pipefail
        mkdir -p /tmp/drill
        echo "[neo4j-rebuild-drill] re-projecting topology from Postgres -> clean Neo4j (RTO budget ${TOPOLOGY_RTO_SECONDS}s)"
        python -m topology_rebuild.run_drill \
          --rto-seconds "${TOPOLOGY_RTO_SECONDS}" \
          --count-tolerance "${TOPOLOGY_COUNT_TOLERANCE}" \
          | tee /tmp/drill/result.txt
        echo "[neo4j-rebuild-drill] assert the drill produced a NON-EMPTY result stream (L5)"
        test -s /tmp/drill/result.txt
        grep -q "DRILL neo4j_rebuild .* result=PASS" /tmp/drill/result.txt
        echo "[neo4j-rebuild-drill] PASS (P2 executes this quarterly; P1 seeded dry-run)"
    environment:
      # PROPOSED topology-RTO target in seconds (ADR-0030 §2/§6, < 30 min at 5,000
      # devices). PARAMETERIZED — override via .env or shell env so it re-bases on
      # the Consultant §12 answer from ONE source of truth. 1800 = 30 min default.
      TOPOLOGY_RTO_SECONDS: ${TOPOLOGY_RTO_SECONDS:-1800}
      # Allowed absolute node/edge count drift vs the pre-wipe projection (0 = exact).
      TOPOLOGY_COUNT_TOLERANCE: ${TOPOLOGY_COUNT_TOLERANCE:-0}
      # `neo4j-admin dump` fast-start: OPT-IN, OFF by default (true to D5 — the
      # projection is disposable; a stale dump could disagree with Postgres, which
      # D5 forbids). When enabled it is validated AGAINST the rebuild, never
      # authoritative. Surfaced so the harness can branch in P2.
      TOPOLOGY_DUMP_ENABLED: ${TOPOLOGY_DUMP_ENABLED:-false}
      PYTHONPATH: "/app:/app/drills"
      # --- connection coordinates: NON-secret env (hosts/URIs/users). ---
      NETOPS_POSTGRES_HOST: ${NETOPS_POSTGRES_HOST:-postgres}
      NETOPS_POSTGRES_PORT: ${NETOPS_POSTGRES_PORT:-5432}
      NETOPS_POSTGRES_DB: ${NETOPS_POSTGRES_DB:-netops}
      NETOPS_POSTGRES_USER: ${NETOPS_POSTGRES_USER:-netops}
      NETOPS_NEO4J_URI: ${NETOPS_NEO4J_URI:-bolt://neo4j:7687}
      NETOPS_NEO4J_USER: ${NETOPS_NEO4J_USER:-neo4j}
      # --- credentials: env REFS from .env ONLY; NEVER inlined (ADR-0029 §6). ---
      NETOPS_POSTGRES_PASSWORD: ${NETOPS_POSTGRES_PASSWORD:?set NETOPS_POSTGRES_PASSWORD in .env}
      NETOPS_NEO4J_AUTH: ${NETOPS_NEO4J_AUTH:?set NETOPS_NEO4J_AUTH in .env}
    # readOnlyRootFilesystem parity with the K8s Job: only /tmp/drill is writable
    # (tmpfs scratch torn down when the container exits).
    read_only: true
    tmpfs:
      - /tmp/drill:size=64m
      - /tmp:size=128m
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    # One-shot: exit immediately after the drill completes (never restart).
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
