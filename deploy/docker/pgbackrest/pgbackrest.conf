# pgBackRest stanza config — Compose host-cron parity (W5-T1, ADR-0030 §1/§4).
#
# Compose parity for the single-node target: this is the BYTE-FOR-BYTE analogue
# of the Helm `netops-pgbackrest-config` ConfigMap (deploy/kubernetes/netops/
# templates/backup/pgbackrest-configmap.yaml). It holds NON-SECRET coordinates
# ONLY. The repo cipher PASSPHRASE and the object-store key/secret are NEVER here
# — they are supplied to the pgbackrest container as PGBACKREST_REPO1_CIPHER_PASS
# / PGBACKREST_REPO1_S3_KEY / PGBACKREST_REPO1_S3_KEY_SECRET env from the root
# .env (see .env.example), so the repo and its key are never co-located in the
# config (ADR-0011 §4). The same conftest secret-surface guard that protects the
# chart applies in spirit here: no cipher-pass / s3-key literal in this file.

[global]
# MinIO/S3 object-store repo. Endpoint + bucket are non-secret; the credential is
# env-supplied. Least-privilege: the credential is write-to-`/pgbackrest`-prefix
# only (pcaps/ is reserved for W5-T4).
repo1-type=s3
repo1-path=/pgbackrest
repo1-s3-bucket=netops-backups
repo1-s3-endpoint=minio:9000
repo1-s3-region=us-east-1
repo1-s3-uri-style=path
# Dev MinIO commonly serves plaintext; set y once TLS is fronted.
repo1-storage-verify-tls=n
# Repo encryption — aes-256-cbc, INDEPENDENT of object-store SSE (ADR-0030 §1 /
# Alt #3). The PASSPHRASE is PGBACKREST_REPO1_CIPHER_PASS env, never inlined.
repo1-cipher-type=aes-256-cbc
# Retention (ADR-0030 §1 table) — repo retention is the operational restore
# window; it does NOT override the 7-year audit-data retention (PRODUCTION.md §7).
repo1-retention-full=5
repo1-retention-diff=6
repo1-retention-archive-type=full
log-level-console=info
log-level-file=off
compress-type=zst

[netops]
# The postgres service this stanza backs up.
pg1-host=postgres
pg1-port=5432
pg1-path=/var/lib/postgresql/data
pg1-database=netops
pg1-user=netops
