# SLO recording rules — one rule per PRODUCTION.md §6 SLI (P3 W3-T2, ADR-0046 §1).
#
# WHY THIS FILE EXISTS
# --------------------
# PRODUCTION.md §6 fixes nine observability SLIs; §11 G-OBS makes each one a
# release criterion (a recording rule + a multi-window burn-rate alert + a
# runbook). ADR-0046 §1 ratifies the contract this file implements: ONE Prometheus
# recording rule per §6 SLI, named per the canonical `level:metric:operation` form
# (the `slo:` prefix marks an SLI series; the middle segment NAMES the SLI / §6
# row; the suffix names the window/operation), pre-computing the SLI's
# ratio / quantile / lag so the W3-T3 burn-rate alert and the W3-T4 dashboard both
# read the SAME derived series — never two divergent ad-hoc PromQL expressions for
# the "same" SLI (ADR-0046 §1, alternative 3).
#
# The base series are the EXISTING ADR-0015 `netops_*` metrics
# (backend/app/core/metrics.py), the ADR-0030 topology-freshness gauge
# (backend/app/engines/topology/auto_rebuild.py), and the ADR-0045 export-lag gauge
# (W3-T1). This file DERIVES SLIs from them; it introduces NO new instrumentation
# (ADR-0046 §1: "the recording rules derive SLIs from them, they do not introduce
# new instrumentation"). A renamed base metric breaks the rule lint here, by design.
#
# CARDINALITY DISCIPLINE (ADR-0046 §1 §90 / ADR-0015 §2)
# ------------------------------------------------------
# Each SLI rule aggregates to the SLO's reporting dimension ONLY — global for API
# availability/latency, per-`profile` for first-token latency, per-`status` rolled
# to a global success ratio for discovery — and aggregates AWAY high-cardinality
# labels (`route`, `method`, `model`, `device_id`, raw path). No high-cardinality
# label leaks into an SLI series.
#
# 1:1 ROW <-> RULE, AND THE THREE FLAGGED GAPS (do NOT fabricate)
# ---------------------------------------------------------------
# Six of the nine §6 rows have a backing Prometheus series after W3-T0/W3-T1 and get
# a recording rule below. THREE rows are "reconciliation-job" SLIs — their §6
# "measured by" column is a daily reconciliation JOB (a COUNT of CRs vs. audit
# entries / a trace-orphan scan / a config-backup-miss check), NOT a `/metrics`
# series — so there is NO Prometheus base series to record yet:
#
#   * §6 row 5  Scheduled config-backup completeness  — "config queue job metrics":
#               no backup-completeness / miss counter is emitted today (a
#               `config_backup_runs` TABLE exists, migration 0013, but no Prometheus
#               series). FLAGGED to the config-backup metric owner.
#   * §6 row 6  ChangeRequest exec -> audit completeness — "Daily reconciliation job":
#               no reconciliation-result series is emitted. FLAGGED.
#   * §6 row 9  Reasoning-trace persistence — "Reconciliation job (M3 invariant)":
#               no trace-orphan-count series is emitted. FLAGGED.
#
# Per ADR-0046 §1 + the W3-T2 task contract, a §6 SLI with no backing series is a
# FLAGGED gap, NOT a fabricated rule reading a non-existent series (that would be
# the exact P1-W4 false-green: a rule green at setup that evaluates to nothing on a
# real regression). Closing these three needs the owning job to EXPORT a Prometheus
# series (e.g. `netops_config_backup_runs_total{result}`,
# `netops_cr_audit_reconcile_total{result}`,
# `netops_reasoning_trace_orphans`); that instrumentation is out of W3-T2 scope
# (the task forbids inventing a metric here) and is named-deferred to the
# reconciliation-job owners. When those series land, this file gains the three
# remaining rules and the 1:1 row<->rule mapping is complete.
#
# GATE
# ----
# `promtool check rules` + `promtool test rules` over slo-recording.rules.test.yaml
# (this dir) are W3-T2's gates. The FIRING (burn-rate alert) proof is W3-T3.

groups:
  # ---------------------------------------------------------------------------
  # §6 row 1 — API availability (non-5xx on /api/v1/*), SLO >=99.9% / 30 days.
  # Error budget = 1 - 0.999 = 0.1% of requests. The SLI is the GOOD (non-5xx)
  # request ratio over a 5 m window; the W3-T3 burn-rate alert reads this series.
  # `route`/`method` are aggregated away (global availability is the §6 reporting
  # dimension); `status_class` is consumed by the non-5xx numerator only.
  # ---------------------------------------------------------------------------
  - name: netops-slo-api-availability
    rules:
      - record: slo:netops_api_availability:ratio_rate5m
        expr: |
          sum(rate(netops_http_requests_total{status_class!="5xx"}[5m]))
          /
          sum(rate(netops_http_requests_total[5m]))

  # ---------------------------------------------------------------------------
  # §6 row 2 — API read latency, SLO p95 < 300 ms AND p99 < 1 s.
  # Quantiles over the FastAPI duration histogram, aggregated to the global
  # le-bucket distribution (route/method aggregated away — the §6 SLO is a global
  # read-latency objective). Two operations (p95, p99) for the one §6 row's two
  # objectives; both derive from the single `netops_http_request_duration_seconds`
  # histogram so the alert and dashboard read one series per quantile.
  # ---------------------------------------------------------------------------
  - name: netops-slo-api-read-latency
    rules:
      - record: slo:netops_api_read_latency:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(netops_http_request_duration_seconds_bucket[5m]))
          )
      - record: slo:netops_api_read_latency:p99_5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(netops_http_request_duration_seconds_bucket[5m]))
          )

  # ---------------------------------------------------------------------------
  # §6 row 3 — Agent chat first-token latency, SLO p95 < 5 s (local profile) /
  # < 3 s (external). The objective differs BY PROFILE, so the SLI is kept
  # per-`profile` (the SLO's reporting dimension — NOT aggregated to global, which
  # would erase the local-vs-external distinction the §6 target draws). `profile`
  # is bounded (the ADR-0009 profile enum), so this is cardinality-safe.
  # ---------------------------------------------------------------------------
  - name: netops-slo-agent-first-token-latency
    rules:
      - record: slo:netops_agent_first_token_latency:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, profile) (rate(netops_agent_first_token_seconds_bucket[5m]))
          )

  # ---------------------------------------------------------------------------
  # §6 row 4 — Discovery job success rate, SLO >=99% of device tasks succeed
  # (after retries) per run. The SLI is the succeeded-run ratio over a run-rate
  # window; `partial` and `failed` are the budget-consuming terminal states.
  # `status` is consumed by the numerator (succeeded) only — the result is a global
  # success ratio (the §6 reporting dimension), no high-cardinality label.
  # ---------------------------------------------------------------------------
  - name: netops-slo-discovery-success
    rules:
      - record: slo:netops_discovery_success:ratio_rate_run
        expr: |
          sum(rate(netops_discovery_runs_total{status="succeeded"}[1h]))
          /
          sum(rate(netops_discovery_runs_total[1h]))

  # ---------------------------------------------------------------------------
  # §6 row 7 — Topology projection freshness, SLO projection lag after a discovery
  # run < 5 min (300 s). Base series: `topology_graph_age_seconds`, the scrapable
  # node_exporter textfile gauge the auto-rebuild reconcile emits (ADR-0030, "the
  # topology-freshness SLO input; G-OBS"). No window function — it is already an
  # instantaneous freshness gauge; the rule re-publishes it under the SLI name so
  # the alert/dashboard read the canonical `slo:` series. No labels to aggregate.
  # ---------------------------------------------------------------------------
  - name: netops-slo-topology-projection-lag
    rules:
      - record: slo:netops_topology_projection_lag:seconds
        expr: topology_graph_age_seconds

  # ---------------------------------------------------------------------------
  # §6 row 8 — Audit -> SIEM export lag, SLO p95 < 60 s (ADR-0045 §3). Base series:
  # `audit_export_lag_seconds`, the export-pipeline gauge (W3-T1). It is a single
  # global gauge (no per-row labels — the export is a single durable `seq` cursor),
  # so the SLI is the gauge itself, re-published under the canonical `slo:` name.
  # The W3-T3 burn-rate alert trips when this lag breaches 60 s over the fast+slow
  # window pair.
  # ---------------------------------------------------------------------------
  - name: netops-slo-audit-siem-export-lag
    rules:
      - record: slo:netops_audit_siem_export_lag:seconds
        expr: audit_export_lag_seconds
