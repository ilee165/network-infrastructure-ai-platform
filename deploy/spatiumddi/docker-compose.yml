# SpatiumDDI lab stack — for the opt-in LIVE DDI golden-path test (T6).
#
# This is a LAB / TEST-ONLY convenience profile. It stands up a self-hosted
# SpatiumDDI (an open-source FastAPI DDI backend, github.com/spatiumddi/spatiumddi)
# so the env-guarded live test
# (backend/tests/agents/eval/test_spatiumddi_live_golden_path.py) has a real REST
# surface to drive: discover -> ChangeRequest -> four-eyes approve -> Automation
# executes -> verify -> audit, against a genuine appliance.
#
# It is NOT part of the NetOps `name: netops` stack and is NOT used in CI. Run it
# only on a lab host when you want to execute the live test. The canonical source
# of truth for SpatiumDDI's own services/versions is their upstream compose at
# https://github.com/spatiumddi/spatiumddi — this file is a thin, pinnable wrapper
# documenting the minimum surface our test needs. See README.md for the full
# runbook (bring up -> mint a least-privilege token -> export env -> run test).
#
# Usage (from this directory):
#   cp .env.example .env            # set SPATIUMDDI_IMAGE tag + a lab admin secret
#   docker compose up -d
#   # then follow README.md "Mint a least-privilege token" before running the test.

name: spatiumddi-lab

services:
  # SpatiumDDI API (FastAPI; serves /api/v1). Pin SPATIUMDDI_IMAGE to a known tag
  # in .env — do NOT float :latest for a reproducible lab. If upstream ships a
  # different image name/topology, prefer cloning their repo and using their
  # compose directly (README.md "Option B"); this service is the minimal stand-in.
  spatiumddi:
    image: ${SPATIUMDDI_IMAGE:-ghcr.io/spatiumddi/spatiumddi:v0.1.0}
    environment:
      # SpatiumDDI bootstrap admin — a LAB secret, supplied from .env (never
      # committed). Used ONCE to log in and mint the resource-scoped API token
      # the live test actually authenticates with (see README.md).
      SPATIUMDDI_ADMIN_EMAIL: ${SPATIUMDDI_ADMIN_EMAIL:-admin@spatiumddi.lab}
      SPATIUMDDI_ADMIN_PASSWORD: ${SPATIUMDDI_ADMIN_PASSWORD:?set a lab admin password in .env}
      # Discrete DB credentials — NOT spliced into a URI so passwords containing
      # '@', ':', '/' or '#' do not break the connection string (Finding #7).
      # SpatiumDDI assembles its own DSN from these vars server-side.
      SPATIUMDDI_DB_HOST: db
      SPATIUMDDI_DB_PORT: "5432"
      SPATIUMDDI_DB_NAME: ${SPATIUMDDI_DB_NAME:-spatiumddi}
      SPATIUMDDI_DB_USER: ${SPATIUMDDI_DB_USER:-spatium}
      SPATIUMDDI_DB_PASSWORD: ${SPATIUMDDI_DB_PASSWORD:?set a lab db password in .env}
    ports:
      # Published on the host so the live test (and you) can reach it. Lab-only;
      # bind to 127.0.0.1 to avoid exposing the appliance beyond the host.
      - "127.0.0.1:8088:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${SPATIUMDDI_DB_USER:-spatium}
      POSTGRES_PASSWORD: ${SPATIUMDDI_DB_PASSWORD:?set a lab db password in .env}
      POSTGRES_DB: ${SPATIUMDDI_DB_NAME:-spatiumddi}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPATIUMDDI_DB_USER:-spatium} -d ${SPATIUMDDI_DB_NAME:-spatiumddi}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - spatiumddi-db:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  spatiumddi-db:
