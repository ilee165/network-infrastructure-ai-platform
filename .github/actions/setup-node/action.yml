name: Set up Node 22
description: Install the pinned Node toolchain with the frontend npm cache.

runs:
  using: composite
  steps:
    - name: Set up Node 22
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: frontend/package-lock.json
