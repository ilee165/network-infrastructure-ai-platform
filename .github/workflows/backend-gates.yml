name: Backend gates

on:
  workflow_call:

permissions:
  contents: read

# Workflow-level env does not propagate through reusable-workflow calls.
# Keep one wrapper attempt equal to one package-manager network attempt.
env:
  PIP_RETRIES: "0"
  NPM_CONFIG_FETCH_RETRIES: "0"
  UV_HTTP_RETRIES: "0"

jobs:
  backend:
    name: backend (ruff, mypy, import-linter, pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python
        with:
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, dev extras)
        run: bash "${GITHUB_WORKSPACE}/ci/scripts/retry-egress.sh" --timeout-seconds 300 -- pip install -e "./backend[dev]"

      - name: Install report PDF native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libharfbuzz-subset0 \
            fontconfig \
            fonts-dejavu-core

      # Dependency-vulnerability gate (P1 W6-T4, ADR-0016 §, PRODUCTION.md §5).
      # pip-audit audits the RESOLVED backend environment (the editable install
      # above + dev extras) against the OSV/PyPI advisory DB and FAILS the job on
      # any known-vulnerable dependency — a RED gate, not advisory.
      #   - Pinned: pip-audit==2.7.3 (deterministic; the scan is not itself a
      #     supply-chain risk, ADR-0016 §5).
      #   - Reviewed, EXPIRING allowlist: backend/.pip-audit-allowlist.txt — each
      #     accepted advisory ID is one line with a justification + re-review date
      #     (mirrors the .trivyignore convention). Currently empty (no accepted
      #     vulns); a populated line becomes a `--ignore-vuln` flag below.
      #   - Advisory-DB fetch: pip-audit pulls OSV/PyPI advisories at run time.
      #     In an air-gapped self-hosted fork, point it at a mirror via
      #     PIP_AUDIT_* / --index-url (see docs/security/supply-chain-scanning.md).
      - name: Install pip-audit (pinned)
        run: bash "${GITHUB_WORKSPACE}/ci/scripts/retry-egress.sh" --timeout-seconds 300 -- pip install "pip-audit==2.7.3"

      - name: Dependency audit (pip-audit) — RED gate
        shell: bash
        run: |
          set -o pipefail
          ignore_flags=()
          while IFS= read -r line; do
            line="${line%%#*}"
            line="$(echo "$line" | tr -d '[:space:]')"
            [ -z "$line" ] && continue
            ignore_flags+=(--ignore-vuln "$line")
          done < backend/.pip-audit-allowlist.txt
          # Audit the RESOLVED third-party dependency set (no lockfile in repo).
          # We cannot scan the live environment directly: it contains the local
          # first-party project installed editable (netops-backend), which is not
          # on PyPI. `--skip-editable` does NOT help under `--strict` — strict
          # promotes the skip itself to a fatal ("distribution marked as editable",
          # the PR #62 backend failure). Instead snapshot the environment with
          # `pip freeze --exclude-editable` (every third-party dep, pinned; the
          # editable first-party package omitted) and audit THAT under --strict.
          # The gate is undiminished: all third-party deps are still audited and
          # --strict still fails on any dep pip-audit cannot resolve. The excluded
          # package is first-party with no PyPI advisory surface.
          pip freeze --exclude-editable > /tmp/pip-audit-reqs.txt
          bash "${GITHUB_WORKSPACE}/ci/scripts/retry-egress.sh" --timeout-seconds 300 -- pip-audit --strict --requirement /tmp/pip-audit-reqs.txt --progress-spinner off "${ignore_flags[@]}"

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff format)
        working-directory: backend
        run: ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: mypy

      # Module-boundary contracts from backend/pyproject.toml [tool.importlinter]
      # (REPO-STRUCTURE.md section 3.3; blocking per ADR-0016).
      - name: Module boundaries (import-linter)
        working-directory: backend
        run: lint-imports

      # pytest runs FROM backend/ (testpaths = ["tests"]). No external services:
      # the suite is unit-only by design. The raw, context-labelled data joins
      # the PG + graph layers in coverage-combined, the sole headline >=90% gate.
      # -n 4 (pytest-xdist) matches the 4-vCPU public ubuntu-latest runner; the
      # suite is parallel-safe by construction; pytest-cov consolidates worker
      # data into the .coverage.unit* artifact before upload.
      - name: Test (pytest + coverage)
        working-directory: backend
        shell: bash
        env:
          COVERAGE_CONTEXT: unit
          COVERAGE_FILE: .coverage.unit
          NETOPS_REQUIRE_REPORT_PDF_EVAL: "1"
        run: |
          set -o pipefail
          pytest -n 4 --cov=app --cov-report=term -q | tee pytest-output.txt
          {
            echo "## Backend tests (pytest, unit-only)"
            echo ""
            echo '```text'
            tail -n 30 pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit raw coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-coverage-unit-raw
          path: backend/.coverage.unit*
          if-no-files-found: error
          include-hidden-files: true

  # Postgres-backed test layer (P2 W5-T0). The offline backend job runs the unit
  # suite on in-memory aiosqlite, which silently passes code that is wrong under
  # PostgreSQL (the four documented W4 false-PASSes — NULLS FIRST ordering, a
  # unique index on a partitioned table, REVOKE UPDATE append-only, and the
  # prev_hash chain walk). THIS job re-asserts the W4 audit-hash-chain + credential
  # rotation controls against a REAL Postgres so the W5-T3 gate flip does not rest
  # on a backend that hides the bug it gates.
  #
  #   - `services: postgres` uses the pgvector/pgvector image (migration 0006 needs
  #     the `vector` extension); a stock postgres image would fail `alembic upgrade
  #     head`. The CI-native service is health-gated before the tests run (no
  #     Docker-in-test, L1).
  #   - The harness skips CLEANLY off-CI (no reachable Postgres) and BITES here on a
  #     regressed W4 control. `tests/pg/` is the marker-`integration` PG layer; it is
  #     NOT in the default SQLite smoke (separate job, additive).
  #   - `set -o pipefail` + `test -s` on the piped step (L5) so a broken PG step
  #     cannot mask its exit code as green.
  pg-integration:
    name: pg-integration (real PostgreSQL — W4 controls under PG)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No `needs`: runs in wave 1 (t=0). Merge-blocking is enforced by the
    # caller's `backend-gates` result; the PG layer shares no
    # artifacts with the unit-suite backend job (it installs and runs from
    # source), so the old `needs: [backend]` edge was pure scheduling.
    services:
      postgres:
        # pgvector image: the migration chain's `CREATE EXTENSION vector`
        # (migration 0006) requires it; a stock postgres would fail upgrade head.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: netops
          POSTGRES_PASSWORD: netops
          POSTGRES_DB: netops_test
        ports:
          - 5432:5432
        # Health-gate the service so the tests never race the boot (L1): the job
        # does not start steps until pg_isready reports healthy.
        options: >-
          --health-cmd "pg_isready -U netops -d netops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python
        with:
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, dev extras)
        run: bash "${GITHUB_WORKSPACE}/ci/scripts/retry-egress.sh" --timeout-seconds 300 -- pip install -e "./backend[dev]"

      # The PG layer re-asserts the W4 controls against the real service. pipefail
      # + `test -s` (L5) so a broken PG step cannot read as green through the tee
      # pipe; an EMPTY pytest output (the binary never ran) also fails the gate.
      # NETOPS_TEST_DATABASE_URL points the harness's connection probe + alembic
      # upgrade head at the service; `-m integration` selects exactly this layer.
      - name: PG test layer (alembic upgrade head + W4 controls) — RED gate
        working-directory: backend
        shell: bash
        env:
          NETOPS_TEST_DATABASE_URL: postgresql+asyncpg://netops:netops@127.0.0.1:5432/netops_test
          NETOPS_ADMIN_PASSWORD: pg-ci-throwaway
          COVERAGE_CONTEXT: pg-integration
          COVERAGE_FILE: .coverage.pg-integration
        run: |
          set -o pipefail
          pytest tests/pg/ -m integration --cov=app --cov-report= -v | tee pg-pytest-output.txt
          # Guard against a silent no-collection green (the harness skips off-CI;
          # here Postgres IS reachable, so the tests MUST actually run, not skip).
          test -s pg-pytest-output.txt
          if grep -qE '([1-9][0-9]* skipped)|no tests ran' pg-pytest-output.txt; then
            echo "::error::PG layer skipped or collected nothing — the service was not reachable; this gate must RUN and BITE."
            exit 1
          fi
          # Silent-drop guard (F1, 2026-07-10 testing review): a tests/pg/ file
          # missing `pytestmark = pytest.mark.integration` is DESELECTED here and
          # then runs in NO job at all (the unit job skips all of tests/pg/ via
          # the PG-unreachable collection hook). Deselection is a red gate.
          if grep -qE '[1-9][0-9]* deselected' pg-pytest-output.txt; then
            echo "::error::PG layer deselected tests — a tests/pg/ file is missing 'pytestmark = pytest.mark.integration' and would run in NO CI job."
            exit 1
          fi
          {
            echo "## PG-backed W4-control tests (real PostgreSQL)"
            echo ""
            echo '```text'
            tail -n 30 pg-pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pg-integration raw coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-coverage-pg-integration-raw
          path: backend/.coverage.pg-integration*
          if-no-files-found: error
          include-hidden-files: true

  # Wave 7 T2 — the formerly self-skipping topology/impact tests now run as a
  # merge-blocking exact set against all three real stores they exercise.  The
  # manifest + collect/JUnit guards make dropped markers, silent deselection,
  # collection drift, and selected skips red rather than false-green.
  graph-integration:
    name: graph-integration (PostgreSQL + Neo4j + Redis)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # No `needs`: this source-only integration layer runs in wave 1.  The
    # caller's merge-blocking `backend-gates` result covers this job.
    env:
      NETOPS_DATABASE_URL: postgresql+asyncpg://netops:netops@127.0.0.1:5432/netops_test
      NETOPS_TEST_DATABASE_URL: postgresql+asyncpg://netops:netops@127.0.0.1:5432/netops_test
      NETOPS_ADMIN_PASSWORD: graph-ci-throwaway
      NETOPS_NEO4J_URI: bolt://127.0.0.1:7687
      NETOPS_NEO4J_USER: neo4j
      NETOPS_NEO4J_PASSWORD: graph-ci-password
      NETOPS_REDIS_URL: redis://127.0.0.1:6379/15
    services:
      postgres:
        image: pgvector/pgvector:pg16@sha256:ad2e18408bf447f62092a8a5259e7df10505c5a0360bd1a1853ac8b8b0763da2
        env:
          POSTGRES_USER: netops
          POSTGRES_PASSWORD: netops
          POSTGRES_DB: netops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netops -d netops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      neo4j:
        image: neo4j:5-community@sha256:4bae36aff76271e27fd6a6ed0835413f86a284cd179cfb1cb7d188f5f7533aca
        env:
          NEO4J_AUTH: neo4j/graph-ci-password
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p graph-ci-password 'RETURN 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python
        with:
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, dev extras)
        run: bash "${GITHUB_WORKSPACE}/ci/scripts/retry-egress.sh" --timeout-seconds 300 -- pip install -e "./backend[dev]"

      - name: Apply PostgreSQL migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Exact graph integration layer — RED gate
        working-directory: backend
        shell: bash
        env:
          COVERAGE_CONTEXT: graph-integration
          COVERAGE_FILE: .coverage.graph-integration
        run: |
          set -euo pipefail
          marker='integration and (neo4j or redis)'
          manifest='../ci/manifests/graph-integration-nodes.txt'

          pytest --collect-only --strict-markers -q -m "${marker}" \
            > graph-integration-collect.txt
          awk '/^tests.*::/ { print }' graph-integration-collect.txt \
            | sed 's#\\#/#g' | LC_ALL=C sort \
            > graph-integration-collected-nodes.txt
          if [ ! -s graph-integration-collected-nodes.txt ]; then
            echo "::error::graph-integration collected no selected node IDs."
            exit 1
          fi
          python ../ci/scripts/check-graph-integration-selection.py \
            --expected "${manifest}" \
            --collected graph-integration-collected-nodes.txt

          mapfile -t graph_nodes < graph-integration-collected-nodes.txt
          set +e
          pytest "${graph_nodes[@]}" --strict-markers -vv --cov=app --cov-report= \
            --junitxml=graph-integration-junit.xml \
            | tee graph-integration-pytest-output.txt
          pytest_status=${PIPESTATUS[0]}
          set -e

          guard_status=0
          python ../ci/scripts/check-graph-integration-junit.py \
            --manifest graph-integration-collected-nodes.txt \
            --junit graph-integration-junit.xml || guard_status=$?
          test -s graph-integration-pytest-output.txt
          {
            echo "## Graph integration tests (real PostgreSQL + Neo4j + Redis)"
            echo ""
            echo '```text'
            tail -n 30 graph-integration-pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${pytest_status}" -ne 0 ]; then
            exit "${pytest_status}"
          fi
          exit "${guard_status}"

      - name: Upload graph-integration raw coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-coverage-graph-integration-raw
          path: backend/.coverage.graph-integration*
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload graph-integration JUnit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: graph-integration-junit
          path: backend/graph-integration-junit.xml
          if-no-files-found: warn
          retention-days: 14

  # Wave 7 F8 — one honest backend headline from all service tiers. The three
  # upstream jobs retain their test-gate identity and diagnostic output; only
  # this job reports/enforces the branch-aware >=90% coverage ratchet. The floor
  # is the measured 2026-07-16 unit-only branch baseline (90%); integration data
  # adds hits over the same source=["app"] denominator and cannot lower it.
  coverage-combined:
    name: coverage-combined (unit + PostgreSQL + Neo4j/Redis)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, pg-integration, graph-integration]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python

      - name: Install coverage (pinned)
        run: bash "${GITHUB_WORKSPACE}/ci/scripts/retry-egress.sh" --timeout-seconds 300 -- pip install "coverage==7.14.3"

      - name: Download unit raw coverage
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: backend-coverage-unit-raw
          path: backend/.coverage-input/unit

      - name: Download pg-integration raw coverage
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: backend-coverage-pg-integration-raw
          path: backend/.coverage-input/pg-integration

      - name: Download graph-integration raw coverage
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: backend-coverage-graph-integration-raw
          path: backend/.coverage-input/graph-integration

      - name: Combine coverage and enforce headline floor
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          for raw in \
            '.coverage-input/unit/.coverage.unit*' \
            '.coverage-input/pg-integration/.coverage.pg-integration*' \
            '.coverage-input/graph-integration/.coverage.graph-integration*'
          do
            if ! compgen -G "${raw}" > /dev/null; then
              echo "::error::missing raw coverage input matching ${raw}"
              exit 1
            fi
          done

          coverage combine --keep \
            .coverage-input/unit \
            .coverage-input/pg-integration \
            .coverage-input/graph-integration

          python - <<'PY'
          from coverage import CoverageData

          expected = {"unit", "pg-integration", "graph-integration"}
          data = CoverageData(basename=".coverage")
          data.read()
          measured = set(data.measured_contexts())
          missing = expected - measured
          if missing:
              raise SystemExit(f"missing coverage contexts: {sorted(missing)}")
          print(f"combined coverage contexts: {sorted(measured)}")
          PY

          coverage xml -o coverage.xml
          coverage report --show-missing --fail-under=90 | tee coverage-summary.txt
          {
            echo "## Combined backend coverage (unit + PG + graph)"
            echo ""
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined coverage XML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: error
