# CI pipeline (D16 / ADR-0016): lint -> typecheck -> test -> build images -> Trivy scan.
#
# The backend job is unit-only BY DESIGN: tests under backend/tests/ run without
# Postgres/Neo4j/Redis/network (fakes + monkeypatching). Compose-backed integration
# tests (@pytest.mark.integration) land with M1+ in a dedicated job.
#
# NOTE: paths-ignore skips this workflow for docs-only changes (docs/**, root *.md).
# With branch protection requiring these checks, docs-only PRs need the checks
# marked as not-required or a path-filtered required-checks strategy.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff, mypy, import-linter, pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, dev extras)
        run: pip install -e "./backend[dev]"

      # Dependency-vulnerability gate (P1 W6-T4, ADR-0016 §, PRODUCTION.md §5).
      # pip-audit audits the RESOLVED backend environment (the editable install
      # above + dev extras) against the OSV/PyPI advisory DB and FAILS the job on
      # any known-vulnerable dependency — a RED gate, not advisory.
      #   - Pinned: pip-audit==2.7.3 (deterministic; the scan is not itself a
      #     supply-chain risk, ADR-0016 §5).
      #   - Reviewed, EXPIRING allowlist: backend/.pip-audit-allowlist.txt — each
      #     accepted advisory ID is one line with a justification + re-review date
      #     (mirrors the .trivyignore convention). Currently empty (no accepted
      #     vulns); a populated line becomes a `--ignore-vuln` flag below.
      #   - Advisory-DB fetch: pip-audit pulls OSV/PyPI advisories at run time.
      #     In an air-gapped self-hosted fork, point it at a mirror via
      #     PIP_AUDIT_* / --index-url (see docs/security/supply-chain-scanning.md).
      - name: Install pip-audit (pinned)
        run: pip install "pip-audit==2.7.3"

      - name: Dependency audit (pip-audit) — RED gate
        shell: bash
        run: |
          set -o pipefail
          ignore_flags=()
          while IFS= read -r line; do
            line="${line%%#*}"
            line="$(echo "$line" | tr -d '[:space:]')"
            [ -z "$line" ] && continue
            ignore_flags+=(--ignore-vuln "$line")
          done < backend/.pip-audit-allowlist.txt
          # Audit the installed environment (no lockfile in repo); --strict so a
          # dependency pip-audit cannot resolve is an error, not a silent skip.
          pip-audit --strict --progress-spinner off "${ignore_flags[@]}"

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff format)
        working-directory: backend
        run: ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: mypy

      # Module-boundary contracts from backend/pyproject.toml [tool.importlinter]
      # (REPO-STRUCTURE.md section 3.3; blocking per ADR-0016).
      - name: Module boundaries (import-linter)
        working-directory: backend
        run: lint-imports

      # pytest runs FROM backend/ (testpaths = ["tests"]). No external services:
      # the suite is unit-only by design. shell: bash enables pipefail so a
      # pytest failure is not masked by the tee pipe. --cov-fail-under enforces
      # the D16/ADR-0016 coverage gate (>=80%).
      - name: Test (pytest + coverage)
        working-directory: backend
        shell: bash
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term --cov-fail-under=80 -q | tee pytest-output.txt
          {
            echo "## Backend tests (pytest, unit-only)"
            echo ""
            echo '```text'
            tail -n 30 pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: error

  frontend:
    name: frontend (eslint, tsc, vitest, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Dependency-vulnerability gate (P1 W6-T4, ADR-0016 §, PRODUCTION.md §5).
      # npm has no native ignore file, so CI pipes `npm audit --json` through
      # scripts/npm-audit-gate.mjs, which FAILS on any advisory at/above the
      # `high` floor (aligned with the Trivy CRITICAL,HIGH posture) NOT covered by
      # a non-expired entry in .npm-audit-allowlist.json. RED gate, not advisory.
      #   - Reviewed, EXPIRING allowlist; an expired or stale entry fails the gate
      #     so the allowlist cannot rot open (mirrors .trivyignore).
      #   - `npm audit` itself returns non-zero when vulns exist, so `|| true`
      #     hands the JSON to the gate which is the authoritative pass/fail.
      #   - Advisory-DB fetch: npm audit queries the configured registry; an
      #     air-gapped fork points `npm config set registry` at a mirror
      #     (docs/security/supply-chain-scanning.md).
      - name: Dependency audit (npm audit) — RED gate
        shell: bash
        run: |
          set -o pipefail
          npm audit --json > npm-audit.json || true
          node scripts/npm-audit-gate.mjs < npm-audit.json

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Test (vitest run)
        run: npm test

      - name: Build (vite)
        run: npm run build

  # Secret-scanning gate (P1 W6-T4, ADR-0011 §6 no-secret posture, PRODUCTION.md
  # §5). gitleaks scans the WORKING TREE *and the full git HISTORY* — a secret
  # committed earlier and later removed is still exposed in history (G-SEC
  # credential-leak posture), so HEAD-only scanning is insufficient. A finding
  # FAILS the job (RED gate, not advisory).
  #
  #   - History: `actions/checkout` with fetch-depth 0 fetches all commits;
  #     `gitleaks detect` (NOT --no-git) walks the full commit graph by default.
  #   - Reviewed allowlist: .gitleaks.toml extends the upstream default rule set
  #     and adds only PATH-SCOPED allowances for known false-positive surfaces
  #     (test-fixture sentinels, the generated lockfile). It never disables a rule
  #     globally and never allowlists by secret-shaped regex — a real secret in
  #     app/config/CI code still fails. (Mirrors the .trivyignore convention.)
  #   - Offline/self-hosted-fork-friendly: the gitleaks binary is installed by
  #     PINNED version via direct download (same pattern as the infra job's
  #     kubeconform/kube-linter/conftest), not the marketplace action (which can
  #     require a license key for orgs). No advisory-DB fetch — gitleaks is rule-
  #     based, fully offline.
  security-scan:
    name: security-scan (gitleaks — tree + history)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `needs` couples this gate into the graph so it cannot start before the main
    # jobs and so the `all-gates` aggregator below transitively depends on it.
    # Without this, security-scan was an orphan parallel job: a gitleaks failure
    # only blocked merge if the repo admin had manually added it to the
    # branch-protection required-checks list — i.e. advisory-in-practice. The
    # single required check is now `all-gates` (see below), which enforces every
    # gate atomically (P1 W6-T4: "a finding is a red gate, not advisory").
    needs: [backend, frontend]
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          # fetch-depth 0 = all history; gitleaks must see every commit, not just
          # HEAD, to catch a secret that was committed and later removed.
          fetch-depth: 0

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          # Pin BOTH the version AND the SHA-256 of the release tarball so the
          # supply-chain scanner is not itself a supply-chain risk (ADR-0016 §5):
          # a MITM/CDN substitution of the binary that scans the repo's full
          # history is caught here before it ever runs. The expected digest is the
          # gitleaks_8.21.2_linux_x64.tar.gz line from the upstream checksums file
          # https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_checksums.txt
          GITLEAKS_SHA256="5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks detect (working tree + full history) — RED gate
        run: |
          # `detect` (no --no-git) scans the whole commit history; the working
          # tree is covered because HEAD's tree is part of that graph and any
          # uncommitted change in a PR build is already committed on the PR ref.
          # --redact keeps any matched secret OUT of the CI log (ADR-0011 §6 — no
          # secret material in logs). exit-code 1 (gitleaks default) fails the job.
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1

  docker:
    name: docker (build images + Trivy scan)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Images are built but never pushed from CI (push: false, load: true);
      # registry publishing is a release-workflow concern (ADR-0016).
      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: false
          load: true
          tags: netops-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: false
          load: true
          tags: netops-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: netops-backend:ci
          format: table
          severity: CRITICAL,HIGH
          # Fail only on CVEs that have a fix available; base-image OS packages
          # with no upstream patch (Debian fix_deferred/affected) are out of our
          # control and would otherwise wedge the gate. See
          # docs/security/2026-06-14-trivy-baseimage-cves.md.
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan (frontend image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: netops-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  # Chart-validation + policy-as-test for the K8s/Helm declarative half (P1 W4 GA
  # chart, ADR-0029 §3/§5 + ADR-0031). This job is the G-SEC K8s-posture evidence:
  # it renders the GA chart and asserts every OS-isolation / hardening control on
  # the rendered manifests (helm lint → render → kubeconform → kube-linter →
  # conftest → trivy config). It runs independently of the image jobs (no `needs`)
  # — the manifests do not depend on built images. trivy config GATES on fixable
  # HIGH/CRIT IaC misconfig (exit-code 1, ignore-unfixed) without duplicating
  # conftest's policy semantics; cosign is W6 (no new image refs here — the packet
  # + per-service workloads reuse netops-backend/-frontend).
  infra:
    name: infra (helm lint, kubeconform, kube-linter, conftest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Install kube-linter
        run: |
          curl -sSL -o /tmp/kube-linter.tar.gz \
            https://github.com/stackrox/kube-linter/releases/download/v0.7.1/kube-linter-linux.tar.gz
          tar -xzf /tmp/kube-linter.tar.gz -C /usr/local/bin kube-linter
          kube-linter version

      - name: Install conftest
        run: |
          curl -sSL -o /tmp/conftest.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar -xzf /tmp/conftest.tar.gz -C /usr/local/bin conftest
          conftest --version

      - name: Helm lint
        run: helm lint deploy/kubernetes/netops

      - name: Render chart
        run: |
          # pipefail so a `helm template` failure propagates through the `| tr`
          # pipe instead of being masked by tr's exit 0 (a false-green gate);
          # `test -s` then guards an empty render.
          set -o pipefail
          # Strip any CR bytes: conftest's multi-doc YAML splitter collapses a
          # CRLF render to a SINGLE evaluated document, silently passing every
          # deny rule (a false-green gate). Normalizing to LF keeps each rendered
          # document evaluated independently (ADR-0029 §5).
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 | tr -d '\r' > rendered.yaml
          test -s rendered.yaml
          echo "## Rendered chart objects" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^kind:' rendered.yaml | sort | uniq -c >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Schema-validate core resources strictly; the Kyverno ClusterPolicy is a
      # CRD (no built-in schema) so it is skipped, not failed.
      - name: kubeconform (strict)
        run: |
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy \
            rendered.yaml

      # kube-linter's curated default (security) check set; the single
      # documented packet-capture NET_RAW deviation is suppressed at the object
      # level (annotation) — the parser is still guarded.
      - name: kube-linter
        run: kube-linter lint rendered.yaml --config deploy/kubernetes/.kube-linter.yaml

      # The policy-as-test gate: every ADR-0031 / ADR-0029 control asserted on
      # the rendered manifests. Fails the build on any violation.
      #
      # --all-namespaces evaluates EVERY rego package found under the policy dir
      # unambiguously; the prior `--namespace netops.hardening --all-namespaces`
      # pair was contradictory (a single explicit namespace AND "all"). The rego
      # lives in one package (netops.hardening), so --all-namespaces runs it and
      # any future package without an edit here (W4-T6 deferred-minor cleanup).
      - name: conftest (OPA policy-as-test)
        run: |
          conftest test rendered.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces

      # IaC misconfiguration scan (Trivy `config` target). GATING on its OWN
      # findings: exit-code 1 on fixable HIGH/CRITICAL misconfig, mirroring the
      # image-scan posture (ignore-unfixed). Scoped to IaC misconfig
      # (scan-type: config) and does NOT duplicate conftest — conftest asserts
      # our ADR-0029/0031 policy semantics; Trivy checks generic IaC
      # best-practice misconfig.
      #
      # SCOPE (W4-T6 fix): the scan-ref is the RENDERED manifest this task
      # hardens, NOT the raw chart dir. Trivy's Helm parser renders templates
      # with empty/default values and flags HIGH/CRIT (missing securityContext /
      # resource limits) that the chart actually mitigates at render time via
      # _helpers.tpl — gating over `deploy/` (un-rendered templates +
      # deploy/spatiumddi/, neither this task's artifact) is a false-positive
      # CI-regression risk. We gate the rendered.yaml the rest of the job
      # validated, plus deploy/docker (real compose + Dockerfile IaC this task
      # touches). No new image refs in W3/W4, so trivy image / cosign are N/A.
      # SANCTIONED-DEVIATION SUPPRESSION: deploy/kubernetes/.trivyignore lists the
      # ADR-0031 exceptions (seccomp-installer root/host-path, packet-capture
      # NET_RAW) that conftest already guards in a resource-scoped way. Trivy's
      # generic IaC rules cannot encode those exceptions, so they are suppressed
      # for THIS misconfig scan only (env scope) — the gate still fails on any
      # NEW/unexpected HIGH/CRITICAL misconfig.
      - name: Trivy config scan (rendered chart manifest)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/kubernetes/.trivyignore
        with:
          scan-type: config
          scan-ref: rendered.yaml
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy config scan (docker compose + Dockerfiles)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/docker
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

  # Single required-check aggregator (P1 W6-T4). Branch protection should require
  # ONLY this job; it transitively depends on every gate, so a failure or skip of
  # ANY upstream job (dependency audits, secret scan, image/Trivy, chart/policy)
  # blocks merge atomically — no per-job required-checks list to keep in sync and
  # no orphan gate that is advisory-in-practice. `if: always()` makes this job run
  # even when a dependency fails; it then inspects the `needs.*.result` values and
  # FAILS unless every one is "success", so a failed OR skipped gate is a red gate.
  all-gates:
    name: all-gates (required-check aggregator)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [backend, frontend, security-scan, docker, infra]
    steps:
      - name: Assert every gate succeeded
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          echo "Upstream gate results: ${RESULTS}"
          IFS=',' read -ra results <<< "${RESULTS}"
          failed=0
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "::error::a required gate did not succeed (result=${r})"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "all-gates: FAIL — one or more required gates did not succeed."
            exit 1
          fi
          echo "all-gates: PASS — every required gate succeeded."
