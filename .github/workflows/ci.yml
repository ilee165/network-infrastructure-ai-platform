# CI pipeline (D16 / ADR-0016): lint -> typecheck -> test -> build images -> Trivy scan.
#
# The backend job is unit-only BY DESIGN: tests under backend/tests/ run without
# Postgres/Neo4j/Redis/network (fakes + monkeypatching). Compose-backed integration
# tests (@pytest.mark.integration) land with M1+ in a dedicated job.
#
# NOTE: paths-ignore skips this workflow for docs-only changes (docs/**, root *.md).
# With branch protection requiring these checks, docs-only PRs need the checks
# marked as not-required or a path-filtered required-checks strategy.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
  # Manual trigger for the opt-in live kind jobs (kind-harness / kind-harness-ha),
  # which are silenced on ordinary PRs (audit-W2 T7 — ADR-0048 Rejected).
  workflow_dispatch:

permissions:
  contents: read

# The outer retry helper owns the complete three-attempt budget. Disable each
# package manager's nested retries so one wrapper attempt is one network attempt.
env:
  PIP_RETRIES: "0"
  NPM_CONFIG_FETCH_RETRIES: "0"
  UV_HTTP_RETRIES: "0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-gates:
    name: backend gates
    permissions:
      contents: read
    uses: ./.github/workflows/backend-gates.yml

  frontend:
    name: frontend (eslint, tsc, vitest, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Node 22
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: bash "${GITHUB_WORKSPACE}/ci/scripts/retry-egress.sh" --timeout-seconds 300 -- npm ci

      # Dependency-vulnerability gate (P1 W6-T4, ADR-0016 §, PRODUCTION.md §5).
      # npm has no native ignore file, so CI pipes `npm audit --json` through
      # scripts/npm-audit-gate.mjs, which FAILS on any advisory at/above the
      # `high` floor (aligned with the Trivy CRITICAL,HIGH posture) NOT covered by
      # a non-expired entry in .npm-audit-allowlist.json. RED gate, not advisory.
      #   - Reviewed, EXPIRING allowlist; an expired or stale entry fails the gate
      #     so the allowlist cannot rot open (mirrors .trivyignore).
      #   - `fetch-npm-audit.sh` distinguishes a completed vulnerability report
      #     from a transient registry failure; the local gate remains authoritative.
      #   - Advisory-DB fetch: npm audit queries the configured registry; an
      #     air-gapped fork points `npm config set registry` at a mirror
      #     (docs/security/supply-chain-scanning.md).
      - name: Fetch dependency audit (npm audit, retryable egress)
        shell: bash
        run: bash "${GITHUB_WORKSPACE}/ci/scripts/fetch-npm-audit.sh" npm-audit.json

      - name: Dependency audit (npm audit) — RED gate
        shell: bash
        run: node scripts/npm-audit-gate.mjs < npm-audit.json

      - name: Lint (eslint)
        run: npm run lint

      - name: Shared platform-pattern count ratchet (bite self-test)
        run: npm run check:patterns

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Test (vitest run)
        run: npm test

      - name: Build (vite)
        run: npm run build

      # Wave 5 / perf #5: prove route-level code-splitting still emits ≥2 JS
      # chunks (bite: a single-bundle regression fails this step).
      - name: Assert multi-chunk JS split
        run: npm run check:chunks

  # Secret-scanning gate (P1 W6-T4, ADR-0011 §6 no-secret posture, PRODUCTION.md
  # §5). gitleaks scans the WORKING TREE *and the full git HISTORY* — a secret
  # committed earlier and later removed is still exposed in history (G-SEC
  # credential-leak posture), so HEAD-only scanning is insufficient. A finding
  # FAILS the job (RED gate, not advisory).
  #
  #   - History: `actions/checkout` with fetch-depth 0 fetches all commits;
  #     `gitleaks detect` (NOT --no-git) walks the full commit graph by default.
  #   - Reviewed allowlist: .gitleaks.toml extends the upstream default rule set
  #     and adds only PATH-SCOPED allowances for known false-positive surfaces
  #     (test-fixture sentinels, the generated lockfile). It never disables a rule
  #     globally and never allowlists by secret-shaped regex — a real secret in
  #     app/config/CI code still fails. (Mirrors the .trivyignore convention.)
  #   - Offline/self-hosted-fork-friendly: the gitleaks binary is installed by
  #     PINNED version via direct download (same pattern as the infra job's
  #     kubeconform/kube-linter/conftest), not the marketplace action (which can
  #     require a license key for orgs). No advisory-DB fetch — gitleaks is rule-
  #     based, fully offline.
  security-scan:
    name: security-scan (gitleaks — tree + history)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No `needs`: this job runs in wave 1 (t=0) so a leaked secret is reported
    # within ~1 minute instead of after the longest upstream job. It is NOT an
    # orphan/advisory gate: the `all-gates` aggregator (the single required
    # check) lists security-scan directly in its `needs` and fails on any
    # non-success result, so a gitleaks finding still blocks merge atomically
    # (P1 W6-T4: "a finding is a red gate, not advisory"). The job consumes
    # nothing from backend/frontend — the old edges were pure scheduling.
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          # fetch-depth 0 = all history; gitleaks must see every commit, not just
          # HEAD, to catch a secret that was committed and later removed.
          fetch-depth: 0

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          # Pin BOTH the version AND the SHA-256 of the release tarball so the
          # supply-chain scanner is not itself a supply-chain risk (ADR-0016 §5):
          # a MITM/CDN substitution of the binary that scans the repo's full
          # history is caught here before it ever runs. The expected digest is the
          # gitleaks_8.21.2_linux_x64.tar.gz line from the upstream checksums file
          # https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_checksums.txt
          GITLEAKS_SHA256="5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks detect (working tree + full history) — RED gate
        run: |
          # `detect` (no --no-git) scans the whole commit history; the working
          # tree is covered because HEAD's tree is part of that graph and any
          # uncommitted change in a PR build is already committed on the PR ref.
          # --redact keeps any matched secret OUT of the CI log (ADR-0011 §6 — no
          # secret material in logs). exit-code 1 (gitleaks default) fails the job.
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1

  # Split job (CI critical-path): `docker` is the every-event validation half —
  # build the images locally (load:true, never push), SBOM + Trivy scan them,
  # and dry-run the cosign identity chain. No `needs`: it consumes nothing from
  # backend/frontend, and merge-blocking is enforced by the all-gates
  # aggregator's direct entry — so image-build/CVE feedback lands in ~3 minutes
  # instead of after the longest upstream job. The publish half (push + keyless
  # sign + verify, main/tags only) is the `docker-publish` job below, which
  # DOES gate on backend-gates + frontend + this job so a test-failing or CVE-failing
  # image is never pushed or signed.
  docker:
    name: docker (build + SBOM + Trivy — every-event validation)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Least privilege (P1 W6-T5): this job never pushes or signs, so the
    # default contents:read token suffices. The identity-chain dry-run reads a
    # public GHCR image + the public Fulcio/Rekor chain anonymously (unchanged:
    # the pre-split combined job also ran that step without a registry login).
    permissions:
      contents: read
    env:
      # Registry + image coordinates. GHCR by default; a self-hosted fork points
      # REGISTRY at its own registry. The repository owner is lower-cased per
      # GHCR's naming rule. No secret material here.
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      # Pinned supply-chain tooling (ADR-0016 §5 — the signer/SBOM generator must
      # not itself be a supply-chain risk). syft + cosign are installed at a
      # pinned version via their official actions, themselves pinned to a release.
      - name: Install syft (SBOM, pinned)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          syft-version: v1.18.1

      - name: Install cosign (pinned)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Compute image base
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${REGISTRY}/${owner}/netops-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${owner}/netops-frontend" >> "$GITHUB_OUTPUT"

      # Local-only build (load:true, never push): the :ci tags feed the syft +
      # trivy daemon scans below. The gha layer cache scopes are shared with
      # docker-publish, so its push build is a near-free cache replay.
      - name: Build backend image
        id: build_backend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: false
          load: true
          tags: netops-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        id: build_frontend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: false
          load: true
          tags: netops-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # SBOM (syft) per image — retained as a build artifact (PRODUCTION.md §5 /
      # G-SEC). SPDX-JSON is the portable format consumed by downstream
      # attestation/audit tooling. The images are in the local docker daemon
      # (load:true above), so syft scans the :ci tags; docker-publish re-scans
      # the PUSHED registry images by digest and uploads its own artifact.
      - name: SBOM (syft) — backend
        run: syft scan docker:netops-backend:ci -o spdx-json > sbom-backend.spdx.json

      - name: SBOM (syft) — frontend
        run: syft scan docker:netops-frontend:ci -o spdx-json > sbom-frontend.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: image-sboms
          path: |
            sbom-backend.spdx.json
            sbom-frontend.spdx.json
          if-no-files-found: error

      # Trivy image-CVE gate — RAISED to CRITICAL + HIGH at release (PRODUCTION.md
      # §5 / ADR-0016). Accepted findings flow ONLY through the reviewed
      # deploy/docker/.trivyignore-image (justification + expiry per line);
      # ignore-unfixed keeps un-patchable base-OS CVEs from wedging the gate
      # (docs/security/2026-06-14-trivy-baseimage-cves.md). The gate is NOT
      # lowered — only sanctioned, expiring findings are suppressed. Scans the
      # locally-loaded :ci tags; docker-publish re-scans the PUSHED images by
      # digest before anything is signed.
      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/docker/.trivyignore-image
        with:
          image-ref: netops-backend:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan (frontend image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/docker/.trivyignore-image
        with:
          image-ref: netops-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      # Identity-chain dry-run (spec test+gate plan: "cosign sign step runs on
      # the main/tags path (dry-run/verify on PRs)"). This job cannot push or
      # sign (no packages/id-token scope), so it VERIFIES the last-published
      # :main image against the SAME pinned identity the admission policy
      # enforces. This proves the cosign toolchain + identity-chain regex are
      # wired correctly on every run — a forged/unsigned image or a broken
      # identity regex fails here, before merge, with no registry push.
      # docker-publish pushes the moving :main tag on every main build, so once
      # a :main image exists this check verifies a real signature (it is not a
      # permanent bootstrap skip).
      #
      # Bootstrap tolerance: before the first :main publish, the tag does not
      # exist. A MISSING image (manifest/tag unknown) is treated as a skip so
      # PRs are not wedged; ANY signature-verification failure (unsigned image
      # present, or identity/issuer mismatch) is FATAL.
      - name: cosign verify last-published image (identity-chain dry-run)
        env:
          BACKEND_MAIN: "${{ steps.meta.outputs.backend_image }}:main"
          FRONTEND_MAIN: "${{ steps.meta.outputs.frontend_image }}:main"
        run: |
          set -euo pipefail
          status=0
          for img in "${BACKEND_MAIN}" "${FRONTEND_MAIN}"; do
            echo "::group::cosign verify (PR) ${img}"
            out="$(cosign verify \
              --certificate-identity-regexp "^https://github\.com/ilee165/network-infrastructure-ai-platform/\.github/workflows/ci\.yml@refs/.+$" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${img}" 2>&1)" && rc=0 || rc=$?
            echo "${out}"
            if [ "${rc}" -ne 0 ]; then
              # Image not yet published (bootstrap) -> skip, not fail. GHCR does
              # not return a clean "manifest unknown" for an absent package: for a
              # never-published (hence private/nonexistent) repo path it answers the
              # token request with "DENIED: requested access to the resource is
              # denied" / 401 unauthorized. Treat those as the bootstrap window too,
              # so the first PR (before any :main image exists) is not wedged. This
              # is a validation-only dry-run; the real sign+verify lives in the
              # docker-publish job, as does in-cluster admission enforcement.
              if echo "${out}" | grep -Eqi 'manifest unknown|not found|MANIFEST_UNKNOWN|name unknown|no such (manifest|host|image)|error: image .* not found|denied|unauthorized|access to the resource is denied'; then
                echo "::notice::${img} not yet published to :main — skipping PR verify (bootstrap window). The chain wiring is still asserted once a :main image exists."
              else
                echo "::error::cosign verify FAILED for ${img} (unsigned or identity/issuer mismatch) — the signing/admission chain is misconfigured."
                status=1
              fi
            fi
            echo "::endgroup::"
          done
          exit "${status}"

  # Publish half of the split docker job (main/tags only): push the images,
  # re-scan the PUSHED artifacts by immutable digest, then keyless-sign and
  # verify them. Gated on backend + frontend + docker so a test-failing or
  # CVE-failing image is never pushed or signed (the same ordering the
  # pre-split combined job enforced with in-job `if`s — the needs edges cost
  # nothing here because publish runs are not latency-sensitive).
  # NOT in the all-gates aggregator BY DESIGN: it only runs on push/tag events,
  # and all-gates (the PR-facing required check) fails on skipped jobs — adding
  # a push-only job would wedge every PR. A docker-publish failure still turns
  # the main/tag run red.
  docker-publish:
    name: docker-publish (push + cosign sign/verify — main/tags)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
    needs: [backend-gates, frontend, docker]
    # Per-job permissions (P1 W6-T5). Default workflow token is contents:read.
    #   - packages: write  — push the built images to GHCR (ADR-0016 "push to
    #     registry on main/tags").
    #   - id-token: write   — KEYLESS cosign signing: GitHub mints a short-lived
    #     OIDC token, cosign exchanges it at Fulcio for an ephemeral cert. There
    #     is NO long-lived private signing key anywhere in the repo or secrets
    #     (ADR-0029 §6 secrets-by-reference) — the signing identity IS the
    #     workflow's OIDC identity, recorded in the Rekor transparency log.
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      # Registry + image coordinates — must match the `docker` job.
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      # Pinned supply-chain tooling (ADR-0016 §5 — the signer/SBOM generator must
      # not itself be a supply-chain risk). syft + cosign are installed at a
      # pinned version via their official actions, themselves pinned to a release.
      - name: Install syft (SBOM, pinned)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          syft-version: v1.18.1

      - name: Install cosign (pinned)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Compute image base
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${REGISTRY}/${owner}/netops-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${owner}/netops-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN with packages:write — short-lived, scoped to this run;
          # never a long-lived PAT inlined in the workflow (ADR-0011 §6).
          password: ${{ secrets.GITHUB_TOKEN }}

      # push:true — the buildx docker-container driver exports to the registry;
      # the immutable digest output feeds the SBOM/Trivy/cosign steps below. The
      # gha layer cache is shared with the `docker` job (same scopes), so this
      # build is a near-free cache replay of the images that job just validated.
      # A bare (non-registry) tag MUST NOT appear here: with push:true it would
      # resolve to docker.io/library/… and fail with 401 insufficient scopes.
      # Only the immutable :<sha> tag is pushed here. The moving :main tag —
      # what the identity-chain dry-run in the `docker` job verifies — is NOT
      # set in this build step: it is retagged to the signed digest AFTER cosign
      # sign+verify below (see "Retag :main to signed digest"). Pushing :main
      # here would expose it unsigned during the ~90s push→sign window, red-
      # flagging every concurrent PR's cosign dry-run. Retagging post-sign means
      # :main is never observable in an unsigned state; both tags still share one
      # digest, so the one signature covers both.
      - name: Build + push backend image
        id: build_backend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ format('{0}:{1}', steps.meta.outputs.backend_image, github.sha) }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build + push frontend image
        id: build_frontend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ format('{0}:{1}', steps.meta.outputs.frontend_image, github.sha) }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # SBOM of the PUSHED registry image by digest — the exact artifact that is
      # about to be signed, not the local rebuild the `docker` job scanned.
      - name: SBOM (syft) — backend (by digest)
        run: syft scan "registry:${{ steps.meta.outputs.backend_image }}@${{ steps.build_backend.outputs.digest }}" -o spdx-json > sbom-backend.spdx.json

      - name: SBOM (syft) — frontend (by digest)
        run: syft scan "registry:${{ steps.meta.outputs.frontend_image }}@${{ steps.build_frontend.outputs.digest }}" -o spdx-json > sbom-frontend.spdx.json

      # Distinct artifact name: on push runs both docker jobs run and v7
      # artifacts are immutable — reusing `image-sboms` would collide.
      - name: Upload SBOM artifacts (published images)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: image-sboms-published
          path: |
            sbom-backend.spdx.json
            sbom-frontend.spdx.json
          if-no-files-found: error

      # Trivy over the pushed digests — the LAST gate before signing, so a
      # CVE-failing image is never signed. Same severity floor + reviewed,
      # expiring ignorefile as the `docker` job scans; the gate is NOT lowered.
      - name: Trivy scan (backend image, by digest)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/docker/.trivyignore-image
        with:
          image-ref: ${{ steps.meta.outputs.backend_image }}@${{ steps.build_backend.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan (frontend image, by digest)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/docker/.trivyignore-image
        with:
          image-ref: ${{ steps.meta.outputs.frontend_image }}@${{ steps.build_frontend.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      # cosign KEYLESS signing — AFTER Trivy passes, so a CVE-failing image is
      # never signed. We sign the pushed-by-digest image (cosign resolves the
      # tag→digest), and attach the SBOM as a cosign attestation so provenance
      # travels with the image (PRODUCTION.md §5). The identity token is the
      # workflow OIDC — no key.
      - name: cosign sign + attest
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for pair in \
            "${{ steps.meta.outputs.backend_image }}:${{ github.sha }}|sbom-backend.spdx.json" \
            "${{ steps.meta.outputs.frontend_image }}:${{ github.sha }}|sbom-frontend.spdx.json"; do
            img="${pair%%|*}"; sbom="${pair##*|}"
            echo "::group::cosign sign ${img}"
            cosign sign --recursive "${img}"
            cosign attest --recursive --type spdxjson --predicate "${sbom}" "${img}"
            echo "::endgroup::"
          done

      # Prove the signature chain (PRODUCTION.md §5 "cosign verify proves the
      # chain"): verify the just-signed images against the SAME keyless identity
      # the admission policy enforces (issuer + workflow-subject regex), so a
      # forged/unsigned image would fail here exactly as it is rejected at
      # admission.
      - name: cosign verify signed images
        run: |
          set -euo pipefail
          for img in \
            "${{ steps.meta.outputs.backend_image }}:${{ github.sha }}" \
            "${{ steps.meta.outputs.frontend_image }}:${{ github.sha }}"; do
            echo "::group::cosign verify ${img}"
            cosign verify \
              --certificate-identity-regexp "^https://github\.com/ilee165/network-infrastructure-ai-platform/\.github/workflows/ci\.yml@refs/.+$" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${img}"
            echo "::endgroup::"
          done

      # Only NOW, after sign+verify has proven the digest, point the moving :main
      # tag at that same signed digest. This is the ONLY place :main is set on a
      # main build. `imagetools create` is a registry-side manifest copy (no
      # rebuild, no digest change), so the signature made above already covers
      # :main. Consequence: the PR identity-chain dry-run in the `docker` job can
      # never observe :main unsigned — closing the push→sign race that reddened
      # concurrent PRs when several main merges landed in quick succession. A run
      # cancelled by concurrency before this step simply leaves :main pointing at
      # the previous (already-signed) digest — never at an unsigned one.
      - name: Retag :main to signed digest (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          for pair in \
            "${{ steps.meta.outputs.backend_image }}|${{ steps.build_backend.outputs.digest }}" \
            "${{ steps.meta.outputs.frontend_image }}|${{ steps.build_frontend.outputs.digest }}"; do
            image="${pair%%|*}"; digest="${pair##*|}"
            echo "::group::retag ${image}:main -> ${digest}"
            # --prefer-index=false copies the single-platform manifest verbatim so
            # :main resolves to the SAME signed ${digest}. The default wraps the
            # source in a fresh image-index with a NEW digest that carries no
            # signature, which would make `cosign verify :main` fail — the very
            # race this change closes.
            docker buildx imagetools create --prefer-index=false \
              --tag "${image}:main" "${image}@${digest}"
            # Prove :main now resolves to the signed digest, failing the main build
            # loudly here instead of silently breaking every PR's :main dry-run.
            cosign verify \
              --certificate-identity-regexp "^https://github\.com/ilee165/network-infrastructure-ai-platform/\.github/workflows/ci\.yml@refs/.+$" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${image}:main"
            echo "::endgroup::"
          done
  platform-gates:
    name: platform gates
    permissions:
      contents: read
    uses: ./.github/workflows/platform-gates.yml

  # Ephemeral kind cluster harness (P2 W4-T3, ADR-0039 §6 / ADR-0041 §2/§3). This
  # is the "kind for cheap" enforcement validation the two W4 enforcement tasks
  # assert against: it creates a throwaway kind cluster with an ENFORCING CNI
  # (Calico — kindnet ADMITS but does NOT enforce NetworkPolicy, ADR-0041 §2),
  # runs a CNI SELF-TEST (a harness default-deny MUST block a known egress, else
  # the run FAILS — the L1 false-green guard), applies the chart, runs the
  # assertion-runner (W4-T4 mTLS handshake + W4-T5 egress-deny checks plug in),
  # and tears the cluster down on exit (success OR failure) via a trap.
  #
  # NOT YET A BLOCKING GATE — promotion is AUTHORED but HELD pending the ADR-0048 §4
  # bite proof. This job is deliberately ABSENT from the `all-gates` aggregator
  # `needs` list below and its live `kind-harness.sh` step stays `continue-on-error`,
  # so the two live assertions run for SIGNAL only. It was NON-blocking at P2
  # (P1-W4-LESSONS L1: a new gating CI tool must be validated before it is required,
  # and the kind/CNI live path could not run on the P2 Windows authoring host — that
  # is still true on the W4 authoring host). ADR-0048 §4 (Prerequisite B,
  # "non-negotiable") requires both live assertions be SHOWN to turn the gate RED on
  # a planted regression, then reverted — on a CI ubuntu runner — BEFORE
  # `continue-on-error` is dropped and BEFORE this job joins `all-gates`; Alternative
  # 2 ("Promote without the bite proof") is Rejected. Prerequisite A (the reliable
  # enforcing-CNI W4-T1 HA topology) IS in place; only Prerequisite B (the EXECUTED
  # bite) is outstanding — it has NOT run on any runner (L1). Promoting now would be a
  # false-green blocking gate (the ADR-0048 Risk "worse than continue-on-error"), so
  # the promotion is held until a runner records the observed red→green. The STATIC
  # validator step (validate-harness.sh) + the assertion-library self-tests +
  # extract_secret.py tests stay blocking within the job regardless.
  kind-harness:
    name: kind-harness (enforcing-CNI self-test + mTLS/collector assertions — signal-only, opt-in; ADR-0048 Rejected, not promoted)
    # audit-W2 T7 (2026-07-03): NOT promoted — ADR-0048 Rejected. This LIVE kind path
    # applies the whole chart into a bare kind cluster (heavy; the platform's own
    # images are not loaded, so it cannot reach green without booting a slice of the
    # whole platform) and is NOT merge-blocking (absent from all-gates). To avoid
    # warning noise + ~20 min of runtime on unrelated PRs it runs ONLY on manual
    # dispatch or when a PR carries the `ci-kind` label. Blocking static coverage
    # (validate-harness.sh, the render + conftest gates, drill-bite-proofs) runs on
    # EVERY PR regardless — this gate is signal-only.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci-kind')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      # Static validator — no cluster needed. Asserts the harness artifacts carry
      # every load-bearing invariant (enforcing CNI install, disableDefaultCNI,
      # the self-test failure-on-no-block, pipefail, the teardown trap, the
      # runner's non-zero-on-failure contract). This step BITES on a silently
      # weakened harness and is reliable on any runner, so it is NOT
      # continue-on-error.
      - name: Validate harness invariants (static, no cluster)
        run: bash ci/kind/selftest/validate-harness.sh

      # Empirical self-tests for the assertion library (no cluster). These RUN
      # lib.sh as a real check subprocess and assert observable behaviour:
      #  - assert-trap-bite.sh: a recorded ASSERT_FAIL bites THROUGH a registered
      #    cleanup (N1 trap-clobber) and survives a leaked ASSERT_LIB_NO_TRAP (N5);
      #  - egress-probe-tristate.sh: a broken probe (nc missing / exec error) never
      #    reads as a confirmed deny (N4) and the deny retry polls correctly (N3).
      # Both carry negative controls, so they BITE if the fix regresses. Blocking.
      - name: Assertion-library self-tests (trap-bite + egress tristate, no cluster)
        run: |
          bash ci/kind/selftest/assert-trap-bite.sh
          bash ci/kind/selftest/egress-probe-tristate.sh

      # extract_secret.py hardening tests (N9 metadata-scoped name + N10 strict
      # base64). Stdlib-only; runs as a plain script so no pip install is needed.
      - name: mTLS extract_secret.py tests (no cluster)
        run: python3 ci/mtls/test_extract_secret.py

      - name: Set up Helm
        uses: ./.github/actions/setup-tools

      # kind brings up the throwaway cluster on the Docker backend the GH runner
      # already provides. The action installs the kind binary; the harness drives
      # create/CNI/self-test/apply/assert/teardown.
      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          install_only: true
          version: v0.24.0

      # The live enforcement run — NOT YET BLOCKING (continue-on-error: true).
      # W4-T2 was AUTHORED to promote this to blocking, but ADR-0048 §4 (Prerequisite
      # B, "non-negotiable") requires the two live assertions be SHOWN to turn the
      # gate RED on a planted regression — plant → red → revert → green — on a CI
      # ubuntu runner BEFORE `continue-on-error` is dropped and BEFORE this job joins
      # `all-gates`. Alternative 2 ("Promote without the bite proof") is explicitly
      # Rejected. Per P1-W4-LESSONS L1, kind CANNOT run on the authoring host (Windows,
      # no Docker/Linux kind), so that observed red→green run has NOT been executed
      # yet; until it is (and its run URL / planted→red→reverted commit pair is
      # recorded in docs/runbooks/kind-harness.md "Prove-it-bites"), promoting to
      # blocking would be a false-green blocking gate — the exact ADR-0048 Risk
      # ("worse than continue-on-error"). So this step stays SIGNAL-ONLY.
      # Prerequisite A (the reliable enforcing-CNI W4-T1 HA topology) IS in place;
      # only Prerequisite B (the executed bite) is outstanding. The static layers
      # above stay blocking within the job. Promotion is a deliberate later step once
      # a runner has produced the observed bite. Teardown is inside the harness trap,
      # so a failure here still deletes the cluster.
      - name: Run kind harness (create → CNI self-test → apply → assert → teardown)
        id: harness
        continue-on-error: true
        run: bash ci/kind/kind-harness.sh

      # Surface the live-run result in the job summary. The harness step is
      # continue-on-error (SIGNAL-ONLY — not yet blocking, ADR-0048 §4 bite proof
      # outstanding), so a non-success outcome does NOT fail the job; `if: always()`
      # keeps the summary line regardless. This step is informational only — it does
      # not (and must not) re-fail the job, or it would silently re-promote the gate
      # to blocking without the executed bite.
      - name: Report kind harness outcome
        if: always()
        run: |
          set -euo pipefail
          outcome='${{ steps.harness.outcome }}'
          echo "kind harness live-run outcome: ${outcome} (SIGNAL-ONLY — not yet blocking, ADR-0048 §4 bite proof pending)" >> "$GITHUB_STEP_SUMMARY"
          if [ "${outcome}" != "success" ]; then
            echo "::warning::kind-harness live run did not succeed (outcome=${outcome}) —" \
                 "this is currently SIGNAL-ONLY (not in all-gates needs). Promotion to a" \
                 "blocking gate awaits the ADR-0048 §4 planted-regression bite proof on a CI runner."
          fi

  # Ephemeral HA kind topology (P3 W4-T1, ADR-0047 / ADR-0048 §3). This job stands
  # up the reduced-scale HA substrate the W4 drills (T3–T8) + the gate promotion
  # (T2) run against: the SAME enforcing-CNI kind harness as the P2 kind-harness
  # job, EXTENDED (HA=1) with the CloudNativePG operator + KEDA (pinned versions),
  # then the netops chart applied via the values-kind-ha.yaml overlay at REDUCED
  # SCALE — CNPG 1 primary + 2 replicas, Redis Sentinel 1+2 with 3 Sentinels (2-of-3
  # quorum), KEDA per-queue worker ScaledObjects, api HPA floor 2 — and gated on HA
  # readiness (a half-up topology must NOT read ready, L5 / ADR-0048 §3). The P2
  # mTLS + collector-egress assertions run UNCHANGED alongside (this job does not
  # touch the P2 kind-harness job, its continue-on-error, or the all-gates omission).
  #
  # NOT YET A BLOCKING GATE — deliberately ABSENT from `all-gates` `needs`, same as
  # the P2 kind-harness job. P1-W4-LESSONS L1: kind cannot run on the W4-T1 authoring
  # host (Windows, no Docker/Linux kind), so the LIVE HA bring-up is validated only
  # on this CI ubuntu runner, not locally. The RELIABILITY of this bring-up is the
  # explicit ADR-0048 §3 Prerequisite A for W4-T2 gate promotion; until W4-T2 has
  # exercised it green and dropped continue-on-error, this job runs for SIGNAL only.
  # The STATIC layers (validate-harness.sh HA invariants + validate-ha-overlay.sh) and
  # the drill negative-control bite proofs need no cluster and are BLOCKING within the
  # job — a fail-fast guard before the expensive live bring-up. Their AUTHORITATIVE
  # merge gate is the separate `drill-bite-proofs` job (in all-gates `needs`); the live
  # `HA=1 kind-harness.sh` step is continue-on-error.
  kind-harness-ha:
    name: kind-harness-ha (reduced-scale HA topology — CNPG + KEDA + Sentinel; signal-only, opt-in)
    # audit-W2 T7 (2026-07-03): same opt-in gate as kind-harness — signal-only, NOT
    # merge-blocking, silenced on unrelated PRs (runs on manual dispatch or the
    # `ci-kind` label). See ADR-0048 (Rejected) + docs/runbooks/kind-harness.md.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci-kind')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          # This job runs the same repo-controlled bite/harness scripts post-checkout
          # and needs no git auth — do NOT persist the token (least privilege).
          persist-credentials: false

      # Static harness invariants — includes the W4-T1 HA add-on checks (pinned
      # operators, idempotent+retried install, readiness gating, reduced-scale
      # counts). No cluster; BITES on a silently weakened HA path. Blocking.
      - name: Validate harness invariants incl. HA add-on (static, no cluster)
        run: bash ci/kind/selftest/validate-harness.sh

      - name: Set up Helm and promtool
        uses: ./.github/actions/setup-tools
        with:
          install-promtool: "true"

      # Static HA-overlay bite — renders the reduced-scale HA overlay + asserts the
      # stated counts / mutual exclusion / mTLS-preserved / no-:latest. No cluster.
      # Blocking (a scale drift or a broken overlay fails the job here, before the
      # live run). Uses helm only (kubeconform/kube-linter/conftest run over this
      # same overlay in the `infra` job's HA-render step — not duplicated here).
      - name: Validate reduced-scale HA overlay (render + counts, static)
        run: bash ci/kind/ha/validate-ha-overlay.sh

      # W4-T3 Postgres failover drill — NEGATIVE-CONTROL BITE PROOF (no cluster).
      # ADR-0047 §2 requires every drill's negative control be SHOWN to bite
      # (plant → red → revert), not merely asserted. The LIVE failover drill runs
      # only on the kind CNPG cluster (below, signal-only), which cannot run on the
      # authoring host (L1) — so this self-test earns the bite proof WITHOUT a
      # cluster: it runs the REAL pg-failover.sh check against a fake kubectl and
      # asserts the polarity — GREEN when every committed row survives, RED when the
      # async last row is LOST (the negative control), RED on no-promotion / slow
      # RTO. This step is BLOCKING within the job (it needs no cluster and BITES on a
      # drill that stopped biting); it is the hardware-free proof the drill is a real
      # gate, not green-at-setup (P1-W4 false-green).
      - name: W4-T3 failover drill negative-control bite proof (static, no cluster)
        run: bash ci/kind/selftest/pg-failover-bite.sh

      # W4-T4 Neo4j destroy-and-rebuild drill — NEGATIVE-CONTROL BITE PROOF (no
      # cluster). ADR-0047 §2 requires every drill's negative control be SHOWN to
      # bite (plant → red → revert), not merely asserted. The LIVE rebuild drill
      # runs only on the kind cluster (below, signal-only), which cannot run on the
      # authoring host (L1) — so this self-test earns the bite proof WITHOUT a
      # cluster: it runs the REAL neo4j-rebuild.sh check against a fake kubectl and
      # asserts the polarity — GREEN when the destroyed graph is fully re-projected
      # from Postgres (counts match the source of record), RED when the rebuild is
      # DISABLED (the negative control → graph never re-projected) or a PARTIAL
      # projection leaves fewer nodes/edges than Postgres holds. This step is
      # BLOCKING within the job (it needs no cluster and BITES on a drill that
      # stopped biting); it is the hardware-free proof the drill is a real gate, not
      # green-at-setup (P1-W4 false-green; ADR-0005 D5 rebuild-from-Postgres).
      - name: W4-T4 Neo4j rebuild drill negative-control bite proof (static, no cluster)
        run: bash ci/kind/selftest/neo4j-rebuild-bite.sh

      # W4-T5 worker-kill idempotency drill — NEGATIVE-CONTROL BITE PROOF (no
      # cluster). ADR-0047 §2 requires every drill's negative control be SHOWN to
      # bite (plant → red → revert), not merely asserted. The LIVE worker-kill drill
      # runs only on the kind cluster (below, signal-only), which cannot run on the
      # authoring host (L1) — so this self-test earns the bite proof WITHOUT a
      # cluster: it runs the REAL worker-kill-idempotency.sh check against a fake
      # kubectl and asserts the polarity — GREEN when a killed worker's task is
      # redelivered and completes EXACTLY-ONCE (1 snapshot / 1 audit row / 1 CR
      # transition, success >= 99%), RED when the idempotency guard is DISABLED (the
      # negative control → the redelivery DOUBLE-WRITES and the success rate
      # collapses), RED when the four-eyes gate would be bypassed or the CR
      # double-executes. This step is BLOCKING within the job (it needs no cluster
      # and BITES on a drill that stopped biting); it is the hardware-free proof the
      # drill is a real gate, not green-at-setup (P1-W4 false-green; ADR-0008
      # acks_late; ADR-0020 four-eyes). Real-PG-only exactly-once is corroborated on
      # the live kind CNPG cluster below (also asserted in backend/tests/pg/ behind
      # the blocking pg-integration job).
      - name: W4-T5 worker-kill idempotency drill negative-control bite proof (static, no cluster)
        run: bash ci/kind/selftest/worker-kill-idempotency-bite.sh

      # W4-T6 queue-burst KEDA + reduced-scale API load + PgBouncer budget drill —
      # NEGATIVE-CONTROL BITE PROOF (no cluster). ADR-0047 §2 requires every drill's
      # negative control be SHOWN to bite (plant → red → revert), not merely asserted.
      # The LIVE queue-burst/load drill runs only on the kind cluster (below,
      # signal-only), which cannot run on the authoring host (L1) — so this self-test
      # earns the bite proof WITHOUT a cluster: it runs the REAL queue-burst-load.sh
      # check against a fake kubectl and asserts the polarity — GREEN when a 10x
      # `discovery` burst scales the discovery Deployment OUT (its replica count
      # actually changes) then scales IN, siblings are NOT starved, the API p95 holds
      # with a 1->2-replica improvement + zero 5xx, and the PgBouncer pooler shows no
      # connection exhaustion; RED when the negative control emulates a SHARED scaler
      # that STARVES a sibling and overruns the PgBouncer budget (isolation + §330 +
      # §327 assertions bite), and RED when the burst never moves the replica count (a
      # burst that never scales out — the spec's false-green risk). This step is
      # BLOCKING within the job (it needs no cluster and BITES on a drill that stopped
      # biting); it is the hardware-free proof the drill is a real gate, not
      # green-at-setup (P1-W4 false-green; ADR-0043 §3 per-queue isolation; ADR-0042 §4
      # connection budget). Executed on the authoring host: 0 failure(s), drill exit 4
      # under the negative control, exit 1 on no-scale-out, exit 0 on the positive path.
      - name: W4-T6 queue-burst + API load + PgBouncer budget drill negative-control bite proof (static, no cluster)
        run: bash ci/kind/selftest/queue-burst-load-bite.sh

      # promtool — needed by the W4-T7 compressed-soak bite proof below, whose
      # LOAD-BEARING layer runs a REAL `promtool test rules` over the W3-T2 recording
      # rules + W3-T3 burn-rate alerts to prove the soak's "§6 SLOs held / no
      # burn-rate alert fires" assertion bites cluster-free. Same pin as the
      # `observability` job (2.53.2). pipefail so a masked fetch cannot read green (L5).

      # W4-T7 compressed-soak drill — NEGATIVE-CONTROL BITE PROOF (no cluster).
      # ADR-0047 §2 requires every drill's negative control be SHOWN to bite (plant →
      # red → revert), not merely asserted. The LIVE soak drill runs only on the kind
      # HA cluster (below, signal-only), which cannot run on the authoring host (L1) —
      # so this self-test earns the bite proof WITHOUT a cluster in TWO layers:
      #  (1) the LOAD-BEARING layer runs a REAL `promtool test rules` over the ACTUAL
      #      W3-T2 recording rules + W3-T3 burn-rate alerts
      #      (deploy/observability/slo-compressed-soak.test.yaml): a HEALTHY
      #      compressed-soak-shaped window fires NO burn-rate alert (the §6 SLOs HELD),
      #      and the injected error-rate + latency perturbation the drill applies with
      #      the negative control DOES fire the burn-rate alert (a burn-rate breach →
      #      RED). This proves the soak's core assertion ("no burn-rate alert fires
      #      over the window") bites against the same rules Prometheus loads.
      #  (2) it runs the REAL compressed-soak.sh check against a fake kubectl and
      #      asserts the polarity — GREEN when the §6 SLIs stay within budget over the
      #      window + resources bounded, RED when the negative control injects an SLO
      #      regression (availability + latency budget breach over the window) AND a
      #      monotone resource leak (connection/RSS/queue-depth trend) → the SLO-held
      #      + bounded-trend assertions bite.
      # This step is BLOCKING within the job (it needs no cluster and BITES on a drill
      # that stopped biting); it is the hardware-free proof the drill is a real gate,
      # not green-at-setup (P1-W4 false-green; ADR-0046 §2/§6 SLOs/burn-rate; G-REL
      # §315 compressed). Executed on the authoring host: 0 failure(s) — promtool
      # SUCCESS (healthy silent + injected regression fires), drill exit 0 positive /
      # exit 8 under the negative control. The 30-day CALENDAR soak is NAMED
      # deferred-accepted → GA (ADR-0047 §4).
      - name: W4-T7 compressed-soak drill negative-control bite proof (real promtool + fake-kubectl, no cluster)
        run: bash ci/kind/selftest/compressed-soak-bite.sh
      - name: W4-T8 N-2 -> N upgrade rehearsal drill negative-control bite proof (fake-kubectl, no cluster)
        run: bash ci/kind/selftest/n2-upgrade-rehearsal-bite.sh

      # kind brings up the throwaway cluster on the Docker backend the GH runner
      # provides; the HA harness path installs the CNPG operator + KEDA on top.
      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          install_only: true
          version: v0.24.0

      # The LIVE reduced-scale HA bring-up. Stays continue-on-error / non-blocking:
      # W4-T2 scopes its (currently HELD) promotion to only the P2 `kind-harness`
      # G-SEC assertions (mTLS + collector egress), NOT this HA job. The reliable HA
      # substrate is ADR-0048 §3 Prerequisite A *for that* promotion; promoting these
      # G-REL/G-SCA HA drills to blocking is a deliberate later step (W5/GA). L1 —
      # not locally validated on the Windows authoring host; runs live only on this
      # runner. Teardown is inside the harness trap, so a failure here still deletes
      # the cluster (no leak).
      #
      # W4-T3 (ADR-0042 §2/§3/§7, G-REL §316): the assertion-runner this harness
      # invokes auto-discovers ci/kind/assertions/checks/pg-failover.sh — the live
      # Postgres FAILOVER drill (seed hash-chain-valid audit rows → KILL the CNPG
      # primary → assert AUTOMATED promotion + write service ≤60s from kill + ZERO
      # committed-audit loss on the promoted primary: COUNT + last-row present + no
      # seq gap + hash-chain intact). It runs on real PG (the kind CNPG cluster),
      # at REDUCED scale (CNPG instances=3 quorum minimum, ~25 seeded rows), and is
      # part of this SIGNAL-ONLY live run — the drill's blocking-promotion to
      # all-gates is a deliberate later step (W5/GA), NOT W4-T3. Its negative control
      # is proven to bite by the static step above.
      #
      # W4-T4 (ADR-0005 D5/§3, ADR-0030 §1, ADR-0047 §2/§3, G-REL §317): the same
      # assertion-runner also auto-discovers ci/kind/assertions/checks/neo4j-rebuild.sh
      # — the live Neo4j DESTROY-and-REBUILD drill (seed a fixed reduced-scale
      # topology into Postgres → destroy Neo4j pod + data PVC → re-project the WHOLE
      # inventory FROM POSTGRES via the W1-T3 auto-rebuild path → assert the rebuilt
      # node/edge counts MATCH the Postgres source of record within the MEASURED
      # topology-RTO; a partial/disabled rebuild fails). It runs on real PG + real
      # Neo4j (the kind cluster), at REDUCED scale, and is part of this SIGNAL-ONLY
      # live run — its blocking-promotion is a deliberate later step (W5/GA), NOT
      # W4-T4. Its negative control (disabled rebuild → topology mismatch) is proven
      # to bite by the W4-T4 static step above. The certified-scale topology-RTO
      # (< 30 min @ 5,000 devices) is NAMED deferred-accepted → GA (ADR-0047 §4).
      #
      # W4-T5 (ADR-0008 acks_late, ADR-0043 §6, ADR-0020 four-eyes, ADR-0047
      # §2/§3/§5, G-REL §319/§320): the same assertion-runner also auto-discovers
      # ci/kind/assertions/checks/worker-kill-idempotency.sh — the live WORKER-KILL
      # idempotency + Celery ≥99% drill (seed a fixed drill fixture into Postgres →
      # force-KILL a worker pod mid-run (acks_late redelivery) → drive the SAME
      # side-effecting tasks a second time on a surviving worker via the real W2-T4
      # code path → assert each completes EXACTLY-ONCE with no duplicate side effect
      # (1 snapshot / 1 audit row / 1 CR execution transition), the CR four-eyes gate
      # is not bypassed or double-executed, and Celery success ≥ 99% over the
      # compressed window). It runs on real PG (the kind CNPG cluster), at REDUCED
      # scale, and is part of this SIGNAL-ONLY live run — its blocking-promotion is a
      # deliberate later step (W5/GA), NOT W4-T5. Its negative control (idempotency
      # guard off → double-write / success collapse) is proven to bite by the W4-T5
      # static step above; the same exactly-once property is asserted on real PG in
      # backend/tests/pg/test_worker_idempotency_pg.py behind the blocking
      # pg-integration job. The certified-scale soak success (30-day calendar window)
      # is NAMED deferred-accepted → GA (ADR-0047 §4).
      #
      # W4-T6 (ADR-0043 §2/§3, ADR-0042 §4, ADR-0047 §1/§2/§3/§4, G-SCA §326–§330):
      # the same assertion-runner also auto-discovers
      # ci/kind/assertions/checks/queue-burst-load.sh — the live QUEUE-BURST KEDA +
      # reduced-scale API load + PgBouncer budget drill (LPUSH a 10x-normal `discovery`
      # depth into the REAL Redis list the KEDA scaler reads → assert the discovery
      # worker Deployment SCALES OUT (replica count actually changes) then SCALES IN
      # after the burst drains, WITHOUT starving config/docs/packet siblings (per-queue
      # isolation, §329); run a reduced-concurrency HTTP load (bash /dev/tcp, no
      # k6/locust dep) against the api Service and assert p95 held + a 1->2-replica
      # improvement + zero 5xx (§327); open concurrent connections through the
      # transaction-mode PgBouncer Pooler and assert NO connection exhaustion (§330,
      # ADR-0042 §4)). It runs on the kind HA cluster (real KEDA/HPA/PgBouncer), at
      # REDUCED scale (10x listLength burst, api floor 2/ceiling 4, tens of VUs), and
      # is part of this SIGNAL-ONLY live run — its blocking-promotion is a deliberate
      # later step (W5/GA), NOT W4-T6. Its negative control (shared scaler → sibling
      # starvation / connection-budget breach; a burst that never scales out) is proven
      # to bite by the W4-T6 static step above. The certified-scale G-SCA numbers
      # (500-device ≤60 min §326, 100-user p95<300 ms + 2->4 linearity §327, 5,000-device
      # projection §328) are NAMED deferred-accepted → GA (ADR-0047 §4).
      #
      # W4-T7 (ADR-0046 §1/§2/§6 SLOs/burn-rate, ADR-0047 §1/§2/§3/§4, G-REL §315
      # compressed): the same assertion-runner also auto-discovers
      # ci/kind/assertions/checks/compressed-soak.sh — the live COMPRESSED-SOAK drill
      # (drive STEADY mixed synthetic load — API reads via bash /dev/tcp + a steady
      # discovery/config/docs queue-job trickle — over a COMPRESSED window (minutes,
      # stated; representative of the SLO-held + no-slow-leak MECHANISM, NOT the 30-day
      # calendar SLA), sampling the §6 SLIs the W3-T2 recording rules derive MANY times
      # across the window → assert every SLI stayed WITHIN its error budget over the
      # SUSTAINED window (so NO W3-T3 burn-rate alert would fire — the SLOs HELD) AND
      # assert NO slow resource regression (PgBouncer server connections, worker RSS,
      # and queue depth stay BOUNDED START→END — a leak that would surface over
      # calendar time shows as a monotone upward trend → fail)). It runs on the kind HA
      # cluster (real api/workers/PgBouncer/Redis), at REDUCED scale (compressed
      # window, tens of VUs + a steady queue trickle), and is part of this SIGNAL-ONLY
      # live run — its blocking-promotion is a deliberate later step (W5/GA), NOT
      # W4-T7. Its negative control (an injected error-rate + latency perturbation → a
      # burn-rate breach over the window, plus a monotone resource leak) is proven to
      # bite by the W4-T7 static step above — which ALSO runs a real `promtool test
      # rules` over the actual W3-T2/W3-T3 rules (healthy window silent, injected
      # regression fires). The certified-scale G-REL §315 ceiling (the 30-day CALENDAR
      # soak meeting all §6 SLOs) is NAMED deferred-accepted → GA (ADR-0047 §4
      # promotion path: a 30-day staging window on a sized cluster; run the calendar
      # soak, assert §6 SLOs).
      - name: Run HA kind harness (create → CNI self-test → operators → apply → HA-ready → assert → teardown)
        id: ha-harness
        continue-on-error: true
        env:
          HA: "1"
        run: bash ci/kind/kind-harness.sh

      # Surface the live HA-run result in the job summary without flipping any
      # required aggregator. This HA job stays non-blocking (W4-T2 scopes its held
      # promotion to only the P2 kind-harness G-SEC assertions); a future W5/GA step
      # may drop continue-on-error above and add this job to the all-gates `needs` list.
      - name: Report HA kind harness outcome
        if: always()
        run: |
          set -euo pipefail
          outcome='${{ steps.ha-harness.outcome }}'
          echo "kind HA harness live-run outcome: ${outcome}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${outcome}" != "success" ]; then
            echo "::warning::kind-harness-ha live run did not succeed (outcome=${outcome}) —" \
                 "this job is NON-BLOCKING (L1: not locally validated on the authoring host;" \
                 "reduced-scale HA reliability is the ADR-0048 §3 prerequisite for W4-T2" \
                 "promotion). Investigate before promoting it to a required gate in W4-T2."
          fi

  # KMS-emulator integration gate (P1 W6-T2, ADR-0032 §2/§148). The offline
  # backend job drives the providers via in-memory doubles + contract tests; THIS
  # job is the real integration gate — it brings up the backend-shaped emulators
  # (LocalStack KMS + dev Vault Transit), installs the cloud SDK extras, creates
  # the keys, and exercises the REAL boto3/hvac adapters end-to-end. Azure has no
  # first-party local wrapKey/unwrapKey emulator (documented exception): its real
  # call shape is pinned by the contract test and a real Key Vault is lab-deferred.
  kms-emulators:
    name: kms-emulators (LocalStack KMS + dev Vault — provider integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python

      - name: Install backend + KMS extras (aws + vault)
        run: bash "${GITHUB_WORKSPACE}/ci/scripts/retry-egress.sh" --timeout-seconds 300 -- pip install -e "./backend[dev,kms-aws,kms-vault]"

      # Bring up the emulators with a BOUNDED RETRY around the image pull + boot
      # (#7). A transient registry blip on `docker compose pull`/`up` (image-pull
      # 5xx, slow CDN) must not flake this REQUIRED gate — but the gate stays
      # required and blocking: after the retry budget is exhausted we exit non-zero
      # so a genuine boot failure still fails the job (never made non-blocking).
      #   - `pull` is retried separately so an image-pull blip is recovered before
      #     `up` even starts.
      #   - `up -d --wait` blocks until every service with a healthcheck reports
      #     healthy (localstack-kms + vault-transit define healthchecks in the
      #     compose file), replacing the prior fixed curl-poll loop with a
      #     healthcheck-gated wait. `--wait-timeout` bounds each attempt.
      - name: Bring up KMS emulators (retry pull + healthcheck-gated up)
        shell: bash
        run: |
          set -euo pipefail
          compose=(docker compose -f deploy/docker/docker-compose.kms-emulators.yml)
          attempts=3
          n=0
          until [ "$n" -ge "$attempts" ]; do
            n=$((n + 1))
            echo "::group::emulator bring-up attempt ${n}/${attempts}"
            if "${compose[@]}" pull --quiet && "${compose[@]}" up -d --wait --wait-timeout 120; then
              echo "emulators healthy"; echo "::endgroup::"; exit 0
            fi
            echo "bring-up attempt ${n} failed; dumping status + tearing down before retry"
            "${compose[@]}" ps || true
            "${compose[@]}" down -v || true
            echo "::endgroup::"
            # backoff between attempts; `|| true` so the final no-sleep branch does
            # not trip `set -e` when n == attempts.
            [ "$n" -lt "$attempts" ] && sleep $((n * 5)) || true
          done
          echo "::error::KMS emulators failed to come up healthy after ${attempts} attempts"
          exit 1

      # Belt-and-suspenders readiness assert on the two API surfaces the providers
      # call (LocalStack KMS health + Vault sys/health). `up --wait` already gated
      # on container health; this confirms the HTTP endpoints answer before the
      # provider exercise step.
      - name: Confirm LocalStack KMS + dev Vault endpoints answer
        shell: bash
        run: |
          set -euo pipefail
          curl -sf http://localhost:4566/_localstack/health >/dev/null
          curl -sf http://localhost:8200/v1/sys/health >/dev/null

      - name: Provision a LocalStack KMS key
        id: kms
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          ARN=$(aws --endpoint-url=http://localhost:4566 kms create-key \
            --query 'KeyMetadata.Arn' --output text)
          echo "key_arn=${ARN}" >> "$GITHUB_OUTPUT"

      - name: Provision the dev Vault Transit key
        shell: bash
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dev-only-root-token
        run: |
          set -euo pipefail
          curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" -X POST \
            "${VAULT_ADDR}/v1/sys/mounts/transit" \
            -d '{"type":"transit"}' || true   # already mounted is fine
          curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" -X POST \
            "${VAULT_ADDR}/v1/transit/keys/netops-kek" \
            -d '{"type":"aes256-gcm96","derived":true}'

      - name: Exercise AWS + Vault providers against the emulators (RED gate)
        working-directory: backend
        env:
          KMS_EMULATOR_TEST: "1"
          LOCALSTACK_KMS_ENDPOINT: http://localhost:4566
          KMS_KEY_ARN: ${{ steps.kms.outputs.key_arn }}
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dev-only-root-token
          VAULT_TRANSIT_KEY: netops-kek
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: pytest tests/integration/test_kms_emulators.py -v

      - name: Tear down emulators
        if: always()
        run: docker compose -f deploy/docker/docker-compose.kms-emulators.yml down -v

  # Packet-analysis executor-split bite-proof (ADR-0049 §Acceptance). This is the
  # RE-ENABLE gate: ADR-0049 flips the service back on by default (compose profile
  # removed, Helm packet.analysis.enabled=true) only in the SAME PR this job is
  # green at HEAD. It builds the `packet-analysis` image (--target packet-analysis:
  # tshark + libseccomp) and runs the REAL `python -m app.engines.packet.executor`
  # under the REAL deployment posture (cap_drop ALL, non-root 10001, read-only
  # rootfs, the committed dispatcher seccomp profile). Four required legs:
  #   GREEN    — a real 1-packet pcap through the fully confined executor returns a
  #              schema-valid PacketFindings (packet_count>=1).
  #   DISPATCH — the REAL dispatcher seam (sandbox.run_executor/_spawn_and_reap,
  #              start_new_session=True) spawns+reaps the confined child UNDER the
  #              committed DISPATCHER profile (NOT unconfined) over a real pcap.
  #              Added for review F2: GREEN runs the executor as PID 1 and TIMEOUT
  #              runs unconfined, so no leg covered the dispatcher->child spawn
  #              under the deployed profile — exactly how the setsid omission (F1,
  #              EPERM on every Popen) stayed green. This leg makes that class BITE.
  #   RED      — `--self-test=socket|ptrace` under confinement is DENIED (exit 80,
  #              SELFTEST_DENIED / EPERM), with a NEGATIVE CONTROL: the same probe
  #              UNCONFINED (enforcement off) SUCCEEDS (exit 81, SELFTEST_NOT_CONFINED).
  #              If the negative control does not flip, the gate is not biting → fail.
  #   TIMEOUT  — a wedged executor whose tshark grandchild sleeps past the timeout is
  #              killed with its WHOLE process group (start_new_session + killpg); the
  #              driver asserts no orphan grandchild survives.
  # Linux-only (seccomp filter load is kernel-only): authored + syntax-checked on the
  # Windows dev host, LIVE run verified on this ubuntu runner. No `needs` — wave-1
  # like pg-integration; merge-blocking via the all-gates aggregator's `needs`.
  packet-analysis-bite-proof:
    name: packet-analysis-bite-proof (executor-split seccomp + tshark — Linux, ADR-0049 §Acceptance)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          # Repo-controlled shell + local docker only; no git auth needed.
          persist-credentials: false

      - name: Build packet-analysis image (--target packet-analysis; runs the build-time --self-check)
        run: |
          set -euo pipefail
          # The build also runs the ADR-0049 blocker-7 `executor --self-check`
          # (import pyseccomp + compile the packaged strict filter) — a missing
          # wheel/library/profile fails the BUILD here, before any leg below.
          docker build \
            --target packet-analysis \
            -f deploy/docker/backend.Dockerfile \
            -t netops-backend-packet:citest \
            .

      - name: GREEN — a real pcap through the fully confined executor returns PacketFindings
        shell: bash
        run: |
          set -euo pipefail
          fixture="${RUNNER_TEMP:-/tmp}/packet-fixture.pcap"
          python3 ci/packet/gen_fixture_pcap.py "$fixture"
          request='{"pcap_path":"/data/pcaps/tiny.pcap","display_filter":null,"tshark_bin":"tshark","timeout_seconds":30,"top_n":5,"enforced":true}'
          # REAL production posture: the committed DISPATCHER seccomp profile at the
          # container level (what compose/Helm apply); the executor child RE-CONFINES
          # with the strict no-socket profile before opening the pcap. cap_drop ALL +
          # non-root 10001 + read-only rootfs satisfy the executor's ADR-0031 §2
          # posture backstop; the tmpfs is the single writable scratch (TMPDIR).
          out="$(printf '%s' "$request" | docker run --rm -i \
            --security-opt seccomp=deploy/docker/seccomp/packet-analysis-dispatcher-seccomp.json \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --user 10001:10001 \
            --read-only \
            --tmpfs /tmp/pyshark:size=64m,mode=1777 \
            -e TMPDIR=/tmp/pyshark \
            -v "$fixture:/data/pcaps/tiny.pcap:ro" \
            netops-backend-packet:citest \
            python -m app.engines.packet.executor)"
          printf '%s' "$out" | python3 ci/packet/assert_findings.py

      - name: DISPATCH — the real dispatcher spawns+reaps the confined child UNDER the deployed dispatcher profile
        shell: bash
        run: |
          set -euo pipefail
          fixture="${RUNNER_TEMP:-/tmp}/packet-fixture.pcap"
          python3 ci/packet/gen_fixture_pcap.py "$fixture"
          # Review F2: drive the PRODUCTION dispatcher seam — sandbox.run_executor
          # -> _spawn_and_reap (start_new_session=True => CPython calls setsid() in
          # the forked child) — with the COMMITTED dispatcher seccomp profile at the
          # container level, exactly as compose/Helm deploy it. A profile that
          # denies any syscall the spawn path needs (the F1 setsid class) EPERMs
          # the Popen, the driver exits nonzero, and this leg goes RED. The child
          # still self-confines with the strict profile before reading the pcap;
          # the runner-side assert proves the round-trip produced schema-valid
          # PacketFindings from the real fixture.
          out="$(docker run --rm \
            --security-opt seccomp=deploy/docker/seccomp/packet-analysis-dispatcher-seccomp.json \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --user 10001:10001 \
            --read-only \
            --tmpfs /tmp/pyshark:size=64m,mode=1777 \
            -e TMPDIR=/tmp/pyshark \
            -v "$fixture:/data/pcaps/tiny.pcap:ro" \
            -v "$PWD/ci/packet:/ci:ro" \
            netops-backend-packet:citest \
            python /ci/dispatcher_spawn_driver.py)"
          printf '%s' "$out" | python3 ci/packet/assert_findings.py

      - name: RED — self-test probes DENIED under confinement, negative control FLIPS (proves the filter bites)
        shell: bash
        run: |
          set -uo pipefail
          # Run each probe with the CHILD filter as the only seccomp in play
          # (container seccomp=unconfined) so the executor's own strict filter is
          # provably what bites — for BOTH socket and ptrace. Confined (enforced=true)
          # => SELFTEST_DENIED (80); unconfined negative control (enforced=false) =>
          # SELFTEST_NOT_CONFINED (81). Exit codes: backend/app/engines/packet/executor.py.
          run_probe() {  # $1=probe  $2=enforced-json  -> stdout: executor exit code
            printf '{"pcap_path":"/tmp/pyshark/none.pcap","enforced":%s}' "$2" \
              | docker run --rm -i \
                  --security-opt seccomp=unconfined \
                  --security-opt no-new-privileges \
                  --cap-drop ALL \
                  --user 10001:10001 \
                  --read-only \
                  --tmpfs /tmp/pyshark:size=32m,mode=1777 \
                  -e TMPDIR=/tmp/pyshark \
                  netops-backend-packet:citest \
                  python -m app.engines.packet.executor --self-test="$1" \
              >/dev/null 2>&1
            echo $?
          }
          fail=0
          for probe in socket ptrace; do
            confined="$(run_probe "$probe" true)"
            negctl="$(run_probe "$probe" false)"
            echo "probe=$probe confined_exit=$confined negative_control_exit=$negctl"
            if [ "$confined" != "80" ]; then
              echo "::error::RED: $probe NOT denied under confinement (exit $confined, want 80 SELFTEST_DENIED) — child filter did not bite"
              fail=1
            fi
            if [ "$negctl" != "81" ]; then
              echo "::error::RED negative control: unconfined $probe did NOT succeed (exit $negctl, want 81 SELFTEST_NOT_CONFINED) — the gate proves nothing"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - name: TIMEOUT — a wedged executor + tshark grandchild are killed with the whole process group
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ci/packet/wedge_tshark.sh
          # The driver imports the REAL sandbox._spawn_and_reap and drives it with a
          # small outer timeout + large inner timeout so the DISPATCHER's killpg (not
          # the child's self-cleanup) is the reaper under test. --init reaps the
          # SIGKILLed grandchild so /proc reflects it gone.
          docker run --rm --init \
            --security-opt seccomp=unconfined \
            --tmpfs /tmp/pyshark:size=32m,mode=1777 \
            -e TMPDIR=/tmp/pyshark \
            -v "$PWD/ci/packet:/ci:ro" \
            netops-backend-packet:citest \
            python /ci/timeout_reap_driver.py
  drift-gates:
    name: drift gates
    permissions:
      contents: read
    uses: ./.github/workflows/drift-gates.yml

  # Single required-check aggregator (P1 W6-T4). Branch protection should require
  # ONLY this job; it transitively depends on every gate, so a failure or skip of
  # ANY upstream job (dependency audits, secret scan, image/Trivy, chart/policy)
  # blocks merge atomically — no per-job required-checks list to keep in sync and
  # no orphan gate that is advisory-in-practice. `if: always()` makes this job run
  # even when a dependency fails; it then inspects the `needs.*.result` values and
  # FAILS unless every one is "success", so a failed OR skipped gate is a red gate.
  #
  # PROMOTION REJECTED (audit-W2 T7, 2026-07-03 — ADR-0048 Status: Rejected):
  # `kind-harness` is DELIBERATELY NOT in `needs` — permanently, by decision, no longer
  # "held pending a bite". Making the live run green requires booting a slice of the
  # whole hardened platform in a bare kind cluster (the platform's own images are not
  # loaded → ImagePullBackOff across api/worker/frontend/drills; the hardened Postgres
  # StatefulSet never reaches Ready), and the two controls it would gate (mTLS
  # plaintext-refusal, collector default-deny egress) are ALREADY enforced at runtime
  # and protected by BLOCKING static gates — the `infra` render + `conftest pg_hba
  # weak-hostssl` bite, the render-twice L4 guard, and `drill-bite-proofs`. The live
  # promotion added only marginal "the CNI physically enforces" coverage at the cost of
  # a permanent flaky ~20-min blocking gate + ongoing whole-platform-in-kind upkeep —
  # not worth it. So the live `kind-harness` step stays `continue-on-error` AND the job
  # is now opt-in (label `ci-kind` / manual dispatch), silenced on ordinary PRs. See
  # ADR-0048 "Rejection" + docs/runbooks/kind-harness.md "Gate status".
  #
  # DELIBERATE OMISSION (P3 W4-T1): `kind-harness-ha` also remains NOT in `needs`. Its
  # live reduced-scale HA bring-up (CNPG + KEDA + Sentinel) is `continue-on-error`
  # signal-only; promoting the G-REL/G-SCA HA drills to blocking is a deliberate
  # later step (W5/GA), not W4-T2. NOTE: only the LIVE bring-up is omitted — the
  # cluster-free drill negative-control bite proofs (ADR-0047 §2) ARE required via the
  # the reusable `platform-gates` call, so a drill that stops biting blocks merge.
  #
  # DELIBERATE OMISSION (CI split): `docker-publish` is NOT in `needs`. It runs
  # only on push/tag events, and this aggregator fails on skipped results — a
  # push-only job here would wedge every PR. Its gating is upstream instead
  # (docker-publish `needs: [backend-gates, frontend, docker]`), so nothing unsigned
  # or unscanned can publish; a docker-publish failure turns the main/tag run
  # red on its own. The every-event `docker` validation job IS required here.
  # PG-test routing heuristic (audit ARCH_DEBT #2). Flags a diff that adds
  # PostgreSQL-specific SQL/semantics to backend code without a matching
  # backend/tests/pg/ change (the SQLite unit suite is blind to those). ADVISORY
  # FOR NOW: deliberately NOT in the `all-gates` needs below, so a hit surfaces
  # in the checks list without blocking merge — a one-week false-positive soak.
  # PROMOTE TO BLOCKING by adding `pg-test-routing` to the all-gates `needs`
  # (no script change: ci/scripts/check-pg-test-routing.sh already exits non-zero
  # on a violation, proven to bite). See backend/tests/pg/README.md.
  pg-test-routing:
    name: pg-test-routing (SQLite-vs-PG coverage heuristic — advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for merge-base)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check PG-semantic changes ship a tests/pg/ test
        shell: bash
        run: |
          set -euo pipefail
          # PR: judge against the target branch; push: against origin/main.
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags --depth=200 origin "${GITHUB_BASE_REF}" || true
            base="origin/${GITHUB_BASE_REF}"
          else
            base="origin/main"
          fi
          bash ci/scripts/check-pg-test-routing.sh "$base"

  all-gates:
    name: all-gates (required-check aggregator)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [backend-gates, frontend, security-scan, docker, platform-gates, kms-emulators, packet-analysis-bite-proof, drift-gates]
    steps:
      - name: Assert every gate succeeded
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          echo "Upstream gate results: ${RESULTS}"
          IFS=',' read -ra results <<< "${RESULTS}"
          failed=0
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "::error::a required gate did not succeed (result=${r})"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "all-gates: FAIL — one or more required gates did not succeed."
            exit 1
          fi
          echo "all-gates: PASS — every required gate succeeded."
