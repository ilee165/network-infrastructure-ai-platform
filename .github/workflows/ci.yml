# CI pipeline (D16 / ADR-0016): lint -> typecheck -> test -> build images -> Trivy scan.
#
# The backend job is unit-only BY DESIGN: tests under backend/tests/ run without
# Postgres/Neo4j/Redis/network (fakes + monkeypatching). Compose-backed integration
# tests (@pytest.mark.integration) land with M1+ in a dedicated job.
#
# NOTE: paths-ignore skips this workflow for docs-only changes (docs/**, root *.md).
# With branch protection requiring these checks, docs-only PRs need the checks
# marked as not-required or a path-filtered required-checks strategy.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff, mypy, import-linter, pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, dev extras)
        run: pip install -e "./backend[dev]"

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff format)
        working-directory: backend
        run: ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: mypy

      # Module-boundary contracts from backend/pyproject.toml [tool.importlinter]
      # (REPO-STRUCTURE.md section 3.3; blocking per ADR-0016).
      - name: Module boundaries (import-linter)
        working-directory: backend
        run: lint-imports

      # pytest runs FROM backend/ (testpaths = ["tests"]). No external services:
      # the suite is unit-only by design. shell: bash enables pipefail so a
      # pytest failure is not masked by the tee pipe. --cov-fail-under enforces
      # the D16/ADR-0016 coverage gate (>=80%).
      - name: Test (pytest + coverage)
        working-directory: backend
        shell: bash
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term --cov-fail-under=80 -q | tee pytest-output.txt
          {
            echo "## Backend tests (pytest, unit-only)"
            echo ""
            echo '```text'
            tail -n 30 pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: error

  frontend:
    name: frontend (eslint, tsc, vitest, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Test (vitest run)
        run: npm test

      - name: Build (vite)
        run: npm run build

  docker:
    name: docker (build images + Trivy scan)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Images are built but never pushed from CI (push: false, load: true);
      # registry publishing is a release-workflow concern (ADR-0016).
      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: false
          load: true
          tags: netops-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: false
          load: true
          tags: netops-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: netops-backend:ci
          format: table
          severity: CRITICAL,HIGH
          # Fail only on CVEs that have a fix available; base-image OS packages
          # with no upstream patch (Debian fix_deferred/affected) are out of our
          # control and would otherwise wedge the gate. See
          # docs/security/2026-06-14-trivy-baseimage-cves.md.
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan (frontend image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: netops-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  # Chart-validation + policy-as-test for the K8s/Helm declarative half (P1 W4 GA
  # chart, ADR-0029 §3/§5 + ADR-0031). This job is the G-SEC K8s-posture evidence:
  # it renders the GA chart and asserts every OS-isolation / hardening control on
  # the rendered manifests (helm lint → render → kubeconform → kube-linter →
  # conftest → trivy config). It runs independently of the image jobs (no `needs`)
  # — the manifests do not depend on built images. trivy config GATES on fixable
  # HIGH/CRIT IaC misconfig (exit-code 1, ignore-unfixed) without duplicating
  # conftest's policy semantics; cosign is W6 (no new image refs here — the packet
  # + per-service workloads reuse netops-backend/-frontend).
  infra:
    name: infra (helm lint, kubeconform, kube-linter, conftest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Install kube-linter
        run: |
          curl -sSL -o /tmp/kube-linter.tar.gz \
            https://github.com/stackrox/kube-linter/releases/download/v0.7.1/kube-linter-linux.tar.gz
          tar -xzf /tmp/kube-linter.tar.gz -C /usr/local/bin kube-linter
          kube-linter version

      - name: Install conftest
        run: |
          curl -sSL -o /tmp/conftest.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar -xzf /tmp/conftest.tar.gz -C /usr/local/bin conftest
          conftest --version

      - name: Helm lint
        run: helm lint deploy/kubernetes/netops

      - name: Render chart
        run: |
          # Strip any CR bytes: conftest's multi-doc YAML splitter collapses a
          # CRLF render to a SINGLE evaluated document, silently passing every
          # deny rule (a false-green gate). Normalizing to LF keeps each rendered
          # document evaluated independently (ADR-0029 §5).
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 | tr -d '\r' > rendered.yaml
          echo "## Rendered chart objects" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^kind:' rendered.yaml | sort | uniq -c >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Schema-validate core resources strictly; the Kyverno ClusterPolicy is a
      # CRD (no built-in schema) so it is skipped, not failed.
      - name: kubeconform (strict)
        run: |
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy \
            rendered.yaml

      # kube-linter's curated default (security) check set; the single
      # documented packet-capture NET_RAW deviation is suppressed at the object
      # level (annotation) — the parser is still guarded.
      - name: kube-linter
        run: kube-linter lint rendered.yaml --config deploy/kubernetes/.kube-linter.yaml

      # The policy-as-test gate: every ADR-0031 / ADR-0029 control asserted on
      # the rendered manifests. Fails the build on any violation.
      #
      # --all-namespaces evaluates EVERY rego package found under the policy dir
      # unambiguously; the prior `--namespace netops.hardening --all-namespaces`
      # pair was contradictory (a single explicit namespace AND "all"). The rego
      # lives in one package (netops.hardening), so --all-namespaces runs it and
      # any future package without an edit here (W4-T6 deferred-minor cleanup).
      - name: conftest (OPA policy-as-test)
        run: |
          conftest test rendered.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces

      # IaC misconfiguration scan (Trivy `config` target). GATING on its OWN
      # findings: exit-code 1 on fixable HIGH/CRITICAL misconfig, mirroring the
      # image-scan posture (ignore-unfixed). Scoped to IaC misconfig
      # (scan-type: config) and does NOT duplicate conftest — conftest asserts
      # our ADR-0029/0031 policy semantics; Trivy checks generic IaC
      # best-practice misconfig.
      #
      # SCOPE (W4-T6 fix): the scan-ref is the RENDERED manifest this task
      # hardens, NOT the raw chart dir. Trivy's Helm parser renders templates
      # with empty/default values and flags HIGH/CRIT (missing securityContext /
      # resource limits) that the chart actually mitigates at render time via
      # _helpers.tpl — gating over `deploy/` (un-rendered templates +
      # deploy/spatiumddi/, neither this task's artifact) is a false-positive
      # CI-regression risk. We gate the rendered.yaml the rest of the job
      # validated, plus deploy/docker (real compose + Dockerfile IaC this task
      # touches). No new image refs in W3/W4, so trivy image / cosign are N/A.
      # SANCTIONED-DEVIATION SUPPRESSION: deploy/kubernetes/.trivyignore lists the
      # ADR-0031 exceptions (seccomp-installer root/host-path, packet-capture
      # NET_RAW) that conftest already guards in a resource-scoped way. Trivy's
      # generic IaC rules cannot encode those exceptions, so they are suppressed
      # for THIS misconfig scan only (env scope) — the gate still fails on any
      # NEW/unexpected HIGH/CRITICAL misconfig.
      - name: Trivy config scan (rendered chart manifest)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/kubernetes/.trivyignore
        with:
          scan-type: config
          scan-ref: rendered.yaml
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy config scan (docker compose + Dockerfiles)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/docker
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
