# CI pipeline (D16 / ADR-0016): lint -> typecheck -> test -> build images -> Trivy scan.
#
# The backend job is unit-only BY DESIGN: tests under backend/tests/ run without
# Postgres/Neo4j/Redis/network (fakes + monkeypatching). Compose-backed integration
# tests (@pytest.mark.integration) land with M1+ in a dedicated job.
#
# NOTE: paths-ignore skips this workflow for docs-only changes (docs/**, root *.md).
# With branch protection requiring these checks, docs-only PRs need the checks
# marked as not-required or a path-filtered required-checks strategy.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
  # Manual trigger for the opt-in live kind jobs (kind-harness / kind-harness-ha),
  # which are silenced on ordinary PRs (audit-W2 T7 — ADR-0048 Rejected).
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff, mypy, import-linter, pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, dev extras)
        run: pip install -e "./backend[dev]"

      # Dependency-vulnerability gate (P1 W6-T4, ADR-0016 §, PRODUCTION.md §5).
      # pip-audit audits the RESOLVED backend environment (the editable install
      # above + dev extras) against the OSV/PyPI advisory DB and FAILS the job on
      # any known-vulnerable dependency — a RED gate, not advisory.
      #   - Pinned: pip-audit==2.7.3 (deterministic; the scan is not itself a
      #     supply-chain risk, ADR-0016 §5).
      #   - Reviewed, EXPIRING allowlist: backend/.pip-audit-allowlist.txt — each
      #     accepted advisory ID is one line with a justification + re-review date
      #     (mirrors the .trivyignore convention). Currently empty (no accepted
      #     vulns); a populated line becomes a `--ignore-vuln` flag below.
      #   - Advisory-DB fetch: pip-audit pulls OSV/PyPI advisories at run time.
      #     In an air-gapped self-hosted fork, point it at a mirror via
      #     PIP_AUDIT_* / --index-url (see docs/security/supply-chain-scanning.md).
      - name: Install pip-audit (pinned)
        run: pip install "pip-audit==2.7.3"

      - name: Dependency audit (pip-audit) — RED gate
        shell: bash
        run: |
          set -o pipefail
          ignore_flags=()
          while IFS= read -r line; do
            line="${line%%#*}"
            line="$(echo "$line" | tr -d '[:space:]')"
            [ -z "$line" ] && continue
            ignore_flags+=(--ignore-vuln "$line")
          done < backend/.pip-audit-allowlist.txt
          # Audit the RESOLVED third-party dependency set (no lockfile in repo).
          # We cannot scan the live environment directly: it contains the local
          # first-party project installed editable (netops-backend), which is not
          # on PyPI. `--skip-editable` does NOT help under `--strict` — strict
          # promotes the skip itself to a fatal ("distribution marked as editable",
          # the PR #62 backend failure). Instead snapshot the environment with
          # `pip freeze --exclude-editable` (every third-party dep, pinned; the
          # editable first-party package omitted) and audit THAT under --strict.
          # The gate is undiminished: all third-party deps are still audited and
          # --strict still fails on any dep pip-audit cannot resolve. The excluded
          # package is first-party with no PyPI advisory surface.
          pip freeze --exclude-editable > /tmp/pip-audit-reqs.txt
          pip-audit --strict --requirement /tmp/pip-audit-reqs.txt \
            --progress-spinner off "${ignore_flags[@]}"

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff format)
        working-directory: backend
        run: ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: mypy

      # Module-boundary contracts from backend/pyproject.toml [tool.importlinter]
      # (REPO-STRUCTURE.md section 3.3; blocking per ADR-0016).
      - name: Module boundaries (import-linter)
        working-directory: backend
        run: lint-imports

      # pytest runs FROM backend/ (testpaths = ["tests"]). No external services:
      # the suite is unit-only by design. shell: bash enables pipefail so a
      # pytest failure is not masked by the tee pipe. --cov-fail-under enforces
      # the D16/ADR-0016 coverage gate (>=80%).
      # -n 4 (pytest-xdist) matches the 4-vCPU public ubuntu-latest runner; the
      # suite is parallel-safe by construction (per-test in-memory aiosqlite
      # engines, per-test tmp_path for the file-backed engine, no fixed ports).
      # pytest-cov combines per-worker coverage in-process, so the >=80% floor
      # is still evaluated over the WHOLE suite, not per worker.
      - name: Test (pytest + coverage)
        working-directory: backend
        shell: bash
        run: |
          pytest -n 4 --cov=app --cov-report=xml --cov-report=term --cov-fail-under=80 -q | tee pytest-output.txt
          {
            echo "## Backend tests (pytest, unit-only)"
            echo ""
            echo '```text'
            tail -n 30 pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: error

  frontend:
    name: frontend (eslint, tsc, vitest, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Dependency-vulnerability gate (P1 W6-T4, ADR-0016 §, PRODUCTION.md §5).
      # npm has no native ignore file, so CI pipes `npm audit --json` through
      # scripts/npm-audit-gate.mjs, which FAILS on any advisory at/above the
      # `high` floor (aligned with the Trivy CRITICAL,HIGH posture) NOT covered by
      # a non-expired entry in .npm-audit-allowlist.json. RED gate, not advisory.
      #   - Reviewed, EXPIRING allowlist; an expired or stale entry fails the gate
      #     so the allowlist cannot rot open (mirrors .trivyignore).
      #   - `npm audit` itself returns non-zero when vulns exist, so `|| true`
      #     hands the JSON to the gate which is the authoritative pass/fail.
      #   - Advisory-DB fetch: npm audit queries the configured registry; an
      #     air-gapped fork points `npm config set registry` at a mirror
      #     (docs/security/supply-chain-scanning.md).
      - name: Dependency audit (npm audit) — RED gate
        shell: bash
        run: |
          set -o pipefail
          npm audit --json > npm-audit.json || true
          node scripts/npm-audit-gate.mjs < npm-audit.json

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Test (vitest run)
        run: npm test

      - name: Build (vite)
        run: npm run build

  # Secret-scanning gate (P1 W6-T4, ADR-0011 §6 no-secret posture, PRODUCTION.md
  # §5). gitleaks scans the WORKING TREE *and the full git HISTORY* — a secret
  # committed earlier and later removed is still exposed in history (G-SEC
  # credential-leak posture), so HEAD-only scanning is insufficient. A finding
  # FAILS the job (RED gate, not advisory).
  #
  #   - History: `actions/checkout` with fetch-depth 0 fetches all commits;
  #     `gitleaks detect` (NOT --no-git) walks the full commit graph by default.
  #   - Reviewed allowlist: .gitleaks.toml extends the upstream default rule set
  #     and adds only PATH-SCOPED allowances for known false-positive surfaces
  #     (test-fixture sentinels, the generated lockfile). It never disables a rule
  #     globally and never allowlists by secret-shaped regex — a real secret in
  #     app/config/CI code still fails. (Mirrors the .trivyignore convention.)
  #   - Offline/self-hosted-fork-friendly: the gitleaks binary is installed by
  #     PINNED version via direct download (same pattern as the infra job's
  #     kubeconform/kube-linter/conftest), not the marketplace action (which can
  #     require a license key for orgs). No advisory-DB fetch — gitleaks is rule-
  #     based, fully offline.
  security-scan:
    name: security-scan (gitleaks — tree + history)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No `needs`: this job runs in wave 1 (t=0) so a leaked secret is reported
    # within ~1 minute instead of after the longest upstream job. It is NOT an
    # orphan/advisory gate: the `all-gates` aggregator (the single required
    # check) lists security-scan directly in its `needs` and fails on any
    # non-success result, so a gitleaks finding still blocks merge atomically
    # (P1 W6-T4: "a finding is a red gate, not advisory"). The job consumes
    # nothing from backend/frontend — the old edges were pure scheduling.
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          # fetch-depth 0 = all history; gitleaks must see every commit, not just
          # HEAD, to catch a secret that was committed and later removed.
          fetch-depth: 0

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          # Pin BOTH the version AND the SHA-256 of the release tarball so the
          # supply-chain scanner is not itself a supply-chain risk (ADR-0016 §5):
          # a MITM/CDN substitution of the binary that scans the repo's full
          # history is caught here before it ever runs. The expected digest is the
          # gitleaks_8.21.2_linux_x64.tar.gz line from the upstream checksums file
          # https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_checksums.txt
          GITLEAKS_SHA256="5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks detect (working tree + full history) — RED gate
        run: |
          # `detect` (no --no-git) scans the whole commit history; the working
          # tree is covered because HEAD's tree is part of that graph and any
          # uncommitted change in a PR build is already committed on the PR ref.
          # --redact keeps any matched secret OUT of the CI log (ADR-0011 §6 — no
          # secret material in logs). exit-code 1 (gitleaks default) fails the job.
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1

  # Split job (CI critical-path): `docker` is the every-event validation half —
  # build the images locally (load:true, never push), SBOM + Trivy scan them,
  # and dry-run the cosign identity chain. No `needs`: it consumes nothing from
  # backend/frontend, and merge-blocking is enforced by the all-gates
  # aggregator's direct entry — so image-build/CVE feedback lands in ~3 minutes
  # instead of after the longest upstream job. The publish half (push + keyless
  # sign + verify, main/tags only) is the `docker-publish` job below, which
  # DOES gate on backend + frontend + this job so a test-failing or CVE-failing
  # image is never pushed or signed.
  docker:
    name: docker (build + SBOM + Trivy — every-event validation)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Least privilege (P1 W6-T5): this job never pushes or signs, so the
    # default contents:read token suffices. The identity-chain dry-run reads a
    # public GHCR image + the public Fulcio/Rekor chain anonymously (unchanged:
    # the pre-split combined job also ran that step without a registry login).
    permissions:
      contents: read
    env:
      # Registry + image coordinates. GHCR by default; a self-hosted fork points
      # REGISTRY at its own registry. The repository owner is lower-cased per
      # GHCR's naming rule. No secret material here.
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Pinned supply-chain tooling (ADR-0016 §5 — the signer/SBOM generator must
      # not itself be a supply-chain risk). syft + cosign are installed at a
      # pinned version via their official actions, themselves pinned to a release.
      - name: Install syft (SBOM, pinned)
        uses: anchore/sbom-action/download-syft@v0.24.0
        with:
          syft-version: v1.18.1

      - name: Install cosign (pinned)
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Compute image base
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${REGISTRY}/${owner}/netops-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${owner}/netops-frontend" >> "$GITHUB_OUTPUT"

      # Local-only build (load:true, never push): the :ci tags feed the syft +
      # trivy daemon scans below. The gha layer cache scopes are shared with
      # docker-publish, so its push build is a near-free cache replay.
      - name: Build backend image
        id: build_backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: false
          load: true
          tags: netops-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        id: build_frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: false
          load: true
          tags: netops-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # SBOM (syft) per image — retained as a build artifact (PRODUCTION.md §5 /
      # G-SEC). SPDX-JSON is the portable format consumed by downstream
      # attestation/audit tooling. The images are in the local docker daemon
      # (load:true above), so syft scans the :ci tags; docker-publish re-scans
      # the PUSHED registry images by digest and uploads its own artifact.
      - name: SBOM (syft) — backend
        run: syft scan docker:netops-backend:ci -o spdx-json > sbom-backend.spdx.json

      - name: SBOM (syft) — frontend
        run: syft scan docker:netops-frontend:ci -o spdx-json > sbom-frontend.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: image-sboms
          path: |
            sbom-backend.spdx.json
            sbom-frontend.spdx.json
          if-no-files-found: error

      # Trivy image-CVE gate — RAISED to CRITICAL + HIGH at release (PRODUCTION.md
      # §5 / ADR-0016). Accepted findings flow ONLY through the reviewed
      # deploy/docker/.trivyignore-image (justification + expiry per line);
      # ignore-unfixed keeps un-patchable base-OS CVEs from wedging the gate
      # (docs/security/2026-06-14-trivy-baseimage-cves.md). The gate is NOT
      # lowered — only sanctioned, expiring findings are suppressed. Scans the
      # locally-loaded :ci tags; docker-publish re-scans the PUSHED images by
      # digest before anything is signed.
      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/docker/.trivyignore-image
        with:
          image-ref: netops-backend:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan (frontend image)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/docker/.trivyignore-image
        with:
          image-ref: netops-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      # Identity-chain dry-run (spec test+gate plan: "cosign sign step runs on
      # the main/tags path (dry-run/verify on PRs)"). This job cannot push or
      # sign (no packages/id-token scope), so it VERIFIES the last-published
      # :main image against the SAME pinned identity the admission policy
      # enforces. This proves the cosign toolchain + identity-chain regex are
      # wired correctly on every run — a forged/unsigned image or a broken
      # identity regex fails here, before merge, with no registry push.
      # docker-publish pushes the moving :main tag on every main build, so once
      # a :main image exists this check verifies a real signature (it is not a
      # permanent bootstrap skip).
      #
      # Bootstrap tolerance: before the first :main publish, the tag does not
      # exist. A MISSING image (manifest/tag unknown) is treated as a skip so
      # PRs are not wedged; ANY signature-verification failure (unsigned image
      # present, or identity/issuer mismatch) is FATAL.
      - name: cosign verify last-published image (identity-chain dry-run)
        env:
          BACKEND_MAIN: "${{ steps.meta.outputs.backend_image }}:main"
          FRONTEND_MAIN: "${{ steps.meta.outputs.frontend_image }}:main"
        run: |
          set -euo pipefail
          status=0
          for img in "${BACKEND_MAIN}" "${FRONTEND_MAIN}"; do
            echo "::group::cosign verify (PR) ${img}"
            out="$(cosign verify \
              --certificate-identity-regexp "^https://github\.com/ilee165/network-infrastructure-ai-platform/\.github/workflows/ci\.yml@refs/.+$" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${img}" 2>&1)" && rc=0 || rc=$?
            echo "${out}"
            if [ "${rc}" -ne 0 ]; then
              # Image not yet published (bootstrap) -> skip, not fail. GHCR does
              # not return a clean "manifest unknown" for an absent package: for a
              # never-published (hence private/nonexistent) repo path it answers the
              # token request with "DENIED: requested access to the resource is
              # denied" / 401 unauthorized. Treat those as the bootstrap window too,
              # so the first PR (before any :main image exists) is not wedged. This
              # is a validation-only dry-run; the real sign+verify lives in the
              # docker-publish job, as does in-cluster admission enforcement.
              if echo "${out}" | grep -Eqi 'manifest unknown|not found|MANIFEST_UNKNOWN|name unknown|no such (manifest|host|image)|error: image .* not found|denied|unauthorized|access to the resource is denied'; then
                echo "::notice::${img} not yet published to :main — skipping PR verify (bootstrap window). The chain wiring is still asserted once a :main image exists."
              else
                echo "::error::cosign verify FAILED for ${img} (unsigned or identity/issuer mismatch) — the signing/admission chain is misconfigured."
                status=1
              fi
            fi
            echo "::endgroup::"
          done
          exit "${status}"

  # Publish half of the split docker job (main/tags only): push the images,
  # re-scan the PUSHED artifacts by immutable digest, then keyless-sign and
  # verify them. Gated on backend + frontend + docker so a test-failing or
  # CVE-failing image is never pushed or signed (the same ordering the
  # pre-split combined job enforced with in-job `if`s — the needs edges cost
  # nothing here because publish runs are not latency-sensitive).
  # NOT in the all-gates aggregator BY DESIGN: it only runs on push/tag events,
  # and all-gates (the PR-facing required check) fails on skipped jobs — adding
  # a push-only job would wedge every PR. A docker-publish failure still turns
  # the main/tag run red.
  docker-publish:
    name: docker-publish (push + cosign sign/verify — main/tags)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
    needs: [backend, frontend, docker]
    # Per-job permissions (P1 W6-T5). Default workflow token is contents:read.
    #   - packages: write  — push the built images to GHCR (ADR-0016 "push to
    #     registry on main/tags").
    #   - id-token: write   — KEYLESS cosign signing: GitHub mints a short-lived
    #     OIDC token, cosign exchanges it at Fulcio for an ephemeral cert. There
    #     is NO long-lived private signing key anywhere in the repo or secrets
    #     (ADR-0029 §6 secrets-by-reference) — the signing identity IS the
    #     workflow's OIDC identity, recorded in the Rekor transparency log.
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      # Registry + image coordinates — must match the `docker` job.
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Pinned supply-chain tooling (ADR-0016 §5 — the signer/SBOM generator must
      # not itself be a supply-chain risk). syft + cosign are installed at a
      # pinned version via their official actions, themselves pinned to a release.
      - name: Install syft (SBOM, pinned)
        uses: anchore/sbom-action/download-syft@v0.24.0
        with:
          syft-version: v1.18.1

      - name: Install cosign (pinned)
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Compute image base
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${REGISTRY}/${owner}/netops-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${owner}/netops-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN with packages:write — short-lived, scoped to this run;
          # never a long-lived PAT inlined in the workflow (ADR-0011 §6).
          password: ${{ secrets.GITHUB_TOKEN }}

      # push:true — the buildx docker-container driver exports to the registry;
      # the immutable digest output feeds the SBOM/Trivy/cosign steps below. The
      # gha layer cache is shared with the `docker` job (same scopes), so this
      # build is a near-free cache replay of the images that job just validated.
      # A bare (non-registry) tag MUST NOT appear here: with push:true it would
      # resolve to docker.io/library/… and fail with 401 insufficient scopes.
      # The moving :main tag is ALSO pushed on branch-main builds (not tags): it
      # is what the identity-chain dry-run in the `docker` job verifies —
      # without it that dry-run would be a permanent bootstrap skip. Both tags
      # share one digest, so the one signature below covers both.
      - name: Build + push backend image
        id: build_backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ format('{0}:{1}', steps.meta.outputs.backend_image, github.sha) }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:main', steps.meta.outputs.backend_image) || '' }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build + push frontend image
        id: build_frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ format('{0}:{1}', steps.meta.outputs.frontend_image, github.sha) }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:main', steps.meta.outputs.frontend_image) || '' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # SBOM of the PUSHED registry image by digest — the exact artifact that is
      # about to be signed, not the local rebuild the `docker` job scanned.
      - name: SBOM (syft) — backend (by digest)
        run: syft scan "registry:${{ steps.meta.outputs.backend_image }}@${{ steps.build_backend.outputs.digest }}" -o spdx-json > sbom-backend.spdx.json

      - name: SBOM (syft) — frontend (by digest)
        run: syft scan "registry:${{ steps.meta.outputs.frontend_image }}@${{ steps.build_frontend.outputs.digest }}" -o spdx-json > sbom-frontend.spdx.json

      # Distinct artifact name: on push runs both docker jobs run and v7
      # artifacts are immutable — reusing `image-sboms` would collide.
      - name: Upload SBOM artifacts (published images)
        uses: actions/upload-artifact@v7
        with:
          name: image-sboms-published
          path: |
            sbom-backend.spdx.json
            sbom-frontend.spdx.json
          if-no-files-found: error

      # Trivy over the pushed digests — the LAST gate before signing, so a
      # CVE-failing image is never signed. Same severity floor + reviewed,
      # expiring ignorefile as the `docker` job scans; the gate is NOT lowered.
      - name: Trivy scan (backend image, by digest)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/docker/.trivyignore-image
        with:
          image-ref: ${{ steps.meta.outputs.backend_image }}@${{ steps.build_backend.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan (frontend image, by digest)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/docker/.trivyignore-image
        with:
          image-ref: ${{ steps.meta.outputs.frontend_image }}@${{ steps.build_frontend.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      # cosign KEYLESS signing — AFTER Trivy passes, so a CVE-failing image is
      # never signed. We sign the pushed-by-digest image (cosign resolves the
      # tag→digest), and attach the SBOM as a cosign attestation so provenance
      # travels with the image (PRODUCTION.md §5). The identity token is the
      # workflow OIDC — no key.
      - name: cosign sign + attest
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for pair in \
            "${{ steps.meta.outputs.backend_image }}:${{ github.sha }}|sbom-backend.spdx.json" \
            "${{ steps.meta.outputs.frontend_image }}:${{ github.sha }}|sbom-frontend.spdx.json"; do
            img="${pair%%|*}"; sbom="${pair##*|}"
            echo "::group::cosign sign ${img}"
            cosign sign --recursive "${img}"
            cosign attest --recursive --type spdxjson --predicate "${sbom}" "${img}"
            echo "::endgroup::"
          done

      # Prove the signature chain (PRODUCTION.md §5 "cosign verify proves the
      # chain"): verify the just-signed images against the SAME keyless identity
      # the admission policy enforces (issuer + workflow-subject regex), so a
      # forged/unsigned image would fail here exactly as it is rejected at
      # admission.
      - name: cosign verify signed images
        run: |
          set -euo pipefail
          for img in \
            "${{ steps.meta.outputs.backend_image }}:${{ github.sha }}" \
            "${{ steps.meta.outputs.frontend_image }}:${{ github.sha }}"; do
            echo "::group::cosign verify ${img}"
            cosign verify \
              --certificate-identity-regexp "^https://github\.com/ilee165/network-infrastructure-ai-platform/\.github/workflows/ci\.yml@refs/.+$" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${img}"
            echo "::endgroup::"
          done

  # Chart-validation + policy-as-test for the K8s/Helm declarative half (P1 W4 GA
  # chart, ADR-0029 §3/§5 + ADR-0031). This job is the G-SEC K8s-posture evidence:
  # it renders the GA chart and asserts every OS-isolation / hardening control on
  # the rendered manifests (helm lint → render → kubeconform → kube-linter →
  # conftest → trivy config). It runs independently of the image jobs (no `needs`)
  # — the manifests do not depend on built images. trivy config GATES on fixable
  # HIGH/CRIT IaC misconfig (exit-code 1, ignore-unfixed) without duplicating
  # conftest's policy semantics; cosign is W6 (no new image refs here — the packet
  # + per-service workloads reuse netops-backend/-frontend).
  infra:
    name: infra (helm lint, kubeconform, kube-linter, conftest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # ADR-0031 §3 / ADR-0049 blocker 3 require every copy of the packet-analysis
      # seccomp profiles to stay byte-for-byte identical. A one-sided edit — e.g. a
      # syscall added to one copy only — is a silent security drift. Two profiles,
      # each with multiple copies:
      #   STRICT child profile (deny-by-default, no sockets) — THREE copies: the
      #     Compose copy, the Helm chart copy, AND the in-package copy the executor
      #     loads at runtime via importlib.resources (ADR-0049 blocker 3 single
      #     source of truth). All three must match.
      #   DISPATCHER container profile (strict + client sockets + seccomp()/prctl())
      #     — TWO copies (Compose + Helm) the analysis container runs under at
      #     container level (ADR-0049 blocker 5). The child re-confines with the
      #     strict profile above. Both must match.
      # (The copies had already drifted on line endings before this gate existed;
      # .gitattributes now pins every copy eol=lf so the byte cmp is content-only.)
      - name: seccomp profiles byte-identical (ADR-0031 §3 / ADR-0049 blockers 3+5 lockstep) — RED gate
        shell: bash
        run: |
          set -euo pipefail
          strict_docker=deploy/docker/seccomp/packet-analysis-seccomp.json
          strict_helm=deploy/kubernetes/netops/seccomp/packet-analysis-seccomp.json
          strict_pkg=backend/app/engines/packet/seccomp/packet-analysis-seccomp.json
          disp_docker=deploy/docker/seccomp/packet-analysis-dispatcher-seccomp.json
          disp_helm=deploy/kubernetes/netops/seccomp/packet-analysis-dispatcher-seccomp.json
          # Negative controls (P1 W4 L1 "the gate must RUN and BITE"): a planted
          # one-byte divergence in scratch copies MUST make cmp fail; otherwise the
          # check is a false-green. Never touches the committed tree. One control per
          # profile family so BOTH cmp legs are proven to bite.
          tmp=$(mktemp -d)
          cp "$strict_docker" "$tmp/sa"; cp "$strict_helm" "$tmp/sb"; printf '\n' >> "$tmp/sb"
          if cmp -s "$tmp/sa" "$tmp/sb"; then
            echo "::error::negative control failed — cmp did not detect planted STRICT seccomp divergence"
            exit 1
          fi
          cp "$disp_docker" "$tmp/da"; cp "$disp_helm" "$tmp/db"; printf '\n' >> "$tmp/db"
          if cmp -s "$tmp/da" "$tmp/db"; then
            echo "::error::negative control failed — cmp did not detect planted DISPATCHER seccomp divergence"
            exit 1
          fi
          rm -rf "$tmp"
          # Real gate 1: the THREE strict copies are byte-for-byte identical.
          if ! cmp -s "$strict_docker" "$strict_helm" || ! cmp -s "$strict_docker" "$strict_pkg"; then
            echo "::error::strict packet-analysis seccomp profiles diverged (ADR-0031 §3 / ADR-0049 blocker 3 byte-for-byte lockstep across Compose/Helm/in-package). Diffs:"
            diff -u "$strict_docker" "$strict_helm" || true
            diff -u "$strict_docker" "$strict_pkg" || true
            exit 1
          fi
          # Real gate 2: the DISPATCHER pair is byte-for-byte identical.
          if ! cmp -s "$disp_docker" "$disp_helm"; then
            echo "::error::dispatcher packet-analysis seccomp profiles diverged (ADR-0049 blocker 5 byte-for-byte lockstep across Compose/Helm). Diff:"
            diff -u "$disp_docker" "$disp_helm" || true
            exit 1
          fi
          echo "packet-analysis seccomp profiles byte-identical (strict x3 + dispatcher x2; ADR-0031 §3 / ADR-0049 blockers 3+5 lockstep)."

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Install kube-linter
        run: |
          curl -sSL -o /tmp/kube-linter.tar.gz \
            https://github.com/stackrox/kube-linter/releases/download/v0.7.1/kube-linter-linux.tar.gz
          tar -xzf /tmp/kube-linter.tar.gz -C /usr/local/bin kube-linter
          kube-linter version

      - name: Install conftest
        run: |
          curl -sSL -o /tmp/conftest.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar -xzf /tmp/conftest.tar.gz -C /usr/local/bin conftest
          conftest --version

      - name: Helm lint
        run: helm lint deploy/kubernetes/netops

      - name: Render chart
        run: |
          # pipefail so a `helm template` failure propagates through the `| tr`
          # pipe instead of being masked by tr's exit 0 (a false-green gate);
          # `test -s` then guards an empty render.
          set -o pipefail
          # Strip any CR bytes: conftest's multi-doc YAML splitter collapses a
          # CRLF render to a SINGLE evaluated document, silently passing every
          # deny rule (a false-green gate). Normalizing to LF keeps each rendered
          # document evaluated independently (ADR-0029 §5).
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 | tr -d '\r' > rendered.yaml
          test -s rendered.yaml
          echo "## Rendered chart objects" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^kind:' rendered.yaml | sort | uniq -c >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Schema-validate core resources strictly; the Kyverno ClusterPolicy and the
      # CloudNativePG Cluster/Pooler are CRDs (no built-in schema) so they are
      # skipped, not failed (CNPG Cluster/Pooler render only on the opt-in HA tier,
      # validated by the dedicated CNPG step below — W1-T1, ADR-0042).
      - name: kubeconform (strict)
        run: |
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy,Cluster,Pooler \
            rendered.yaml

      # kube-linter's curated default (security) check set; the single
      # documented packet-capture NET_RAW deviation is suppressed at the object
      # level (annotation) — the parser is still guarded.
      - name: kube-linter
        run: kube-linter lint rendered.yaml --config deploy/kubernetes/.kube-linter.yaml

      # The policy-as-test gate: every ADR-0031 / ADR-0029 control asserted on
      # the rendered manifests. Fails the build on any violation.
      #
      # --all-namespaces evaluates EVERY rego package found under the policy dir
      # unambiguously; the prior `--namespace netops.hardening --all-namespaces`
      # pair was contradictory (a single explicit namespace AND "all"). The rego
      # lives in one package (netops.hardening), so --all-namespaces runs it and
      # any future package without an edit here (W4-T6 deferred-minor cleanup).
      - name: conftest (OPA policy-as-test)
        run: |
          conftest test rendered.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces

      # ADR-0049 blocker 3 — packet-analysis tier render + policy validation. The
      # packet-analysis Deployment + its NetworkPolicy are OPT-IN (default OFF,
      # pending the T4 re-enable), so the default `rendered.yaml` above does NOT
      # contain them and EVERY packet-analysis conftest rule (dispatcher seccomp
      # profile, cap_drop:[ALL], no NET_RAW, RO-rootfs, non-root, RO pcap mount,
      # default-deny+Redis egress) passes VACUOUSLY there. This step renders the
      # chart with the analysis tier ENABLED and runs kubeconform + kube-linter +
      # conftest on THAT render, so the executor-split invariant is actually
      # schema/policy-gated in CI — a regression to the strict no-socket profile
      # (which breaks the broker-connected worker) or a dropped hardening control
      # fails the build here, not in production.
      - name: Render + validate packet-analysis tier (ADR-0049 blocker 3)
        run: |
          set -o pipefail
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 \
            --set packet.analysis.enabled=true | tr -d '\r' > rendered-packet-analysis.yaml
          test -s rendered-packet-analysis.yaml
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy,Cluster,Pooler \
            rendered-packet-analysis.yaml
          kube-linter lint rendered-packet-analysis.yaml --config deploy/kubernetes/.kube-linter.yaml
          conftest test rendered-packet-analysis.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces

      # PR#76 round-2 #26/#27/#29 — pg_hba weak-hostssl policy BITE. The conftest
      # gate above proves the chart render PASSES; this proves the rule actually
      # BITES: a NEGATIVE fixture (a weaker `trust clientcert=verify-full` hostssl
      # row sitting BEFORE a strict row — first-match-wins downgrade) is DENIED,
      # while a POSITIVE fixture (strict rows with whitespace/column variation +
      # optional trailing pg_hba options) still PASSES (no false-reject). RED gate.
      - name: conftest pg_hba weak-hostssl bite (negative + positive fixtures)
        run: bash deploy/kubernetes/policy/fixtures/run-pg-hba-bite.sh

      # W2-T1 (ADR-0043 §1) — api HPA + PDB policy BITE. The api HPA + PDB are
      # ON BY DEFAULT (resilient-by-default), so they ARE in the default
      # `rendered.yaml` above and already schema/policy-gated by the conftest +
      # kubeconform + kube-linter steps there (no separate render step needed).
      # This step proves the apiscale.* rules actually BITE: NEGATIVE fixtures
      # (HPA minReplicas 1, CPU-only HPA, no-CPU HPA, PDB minAvailable 0, PDB
      # maxUnavailable-only) are each DENIED, while POSITIVE fixtures (the
      # compliant minReplicas-2 + CPU+request-rate HPA, the minAvailable-1 PDB)
      # still PASS. RED gate.
      - name: conftest api HPA + PDB bite (floor>=2 + CPU+req-rate + PDB minAvailable>=1)
        run: bash deploy/kubernetes/policy/fixtures/run-api-hpa-pdb-bite.sh

      # W2-T1 (ADR-0043 §1) — api HPA requestRate opt-out render + policy validation.
      # requestRate.enabled=false is a DOCUMENTED opt-out for clusters without a
      # Prometheus adapter (values.yaml services.api.autoscaling.requestRate). The
      # template emits netops.ai/requestrate-disabled=true on the HPA; the rego rule
      # suppresses the deny for that annotation. This step renders with the flag OFF
      # and runs conftest to prove the opt-out render is accepted (not vacuously — the
      # HPA IS in the render and the policy runs over it). A CPU-only HPA WITHOUT the
      # annotation (api_hpa_cpu_only_DENY.yaml) is still rejected by the bite above.
      - name: Render + validate api HPA requestRate opt-out (requestRate.enabled=false)
        run: |
          set -o pipefail
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 \
            --set services.api.autoscaling.requestRate.enabled=false | tr -d '\r' > rendered-hpa-optout.yaml
          test -s rendered-hpa-optout.yaml
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy,Cluster,Pooler \
            rendered-hpa-optout.yaml
          kube-linter lint rendered-hpa-optout.yaml --config deploy/kubernetes/.kube-linter.yaml
          conftest test rendered-hpa-optout.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces

      # W1-T1 (ADR-0042) — CloudNativePG HA tier render + policy validation. The
      # CNPG Cluster/Pooler/PriorityClass are OPT-IN (default OFF), so the default
      # `rendered.yaml` above does NOT contain them and the cnpg.* conftest rules
      # pass vacuously there. This step renders the chart with the HA tier ENABLED
      # (services.postgres.enabled=false — mutual exclusion; mtls.postgres off, its
      # own tier) and runs kubeconform + kube-linter + conftest on THAT render, so
      # the HA manifests are actually schema/policy-gated in CI, not just locally.
      - name: Render + validate CloudNativePG HA tier (ADR-0042)
        run: |
          set -o pipefail
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 \
            --set cloudNativePg.enabled=true \
            --set services.postgres.enabled=false \
            --set mtls.postgres.enabled=false | tr -d '\r' > rendered-cnpg.yaml
          test -s rendered-cnpg.yaml
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy,Cluster,Pooler \
            rendered-cnpg.yaml
          kube-linter lint rendered-cnpg.yaml --config deploy/kubernetes/.kube-linter.yaml
          conftest test rendered-cnpg.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces

      # W1-T1 — CloudNativePG sync-quorum + pooler-budget policy BITE (ADR-0042).
      # The conftest gate above proves the COMPLIANT HA render PASSES; this proves
      # the cnpg.* rules actually BITE: NEGATIVE fixtures (async/no-sync,
      # synchronous_commit forced cluster-wide, synchronous_commit UNSET so it
      # inherits the PG default `on`, PgBouncer session-mode, an unbounded pooler)
      # are each DENIED, while POSITIVE fixtures (the compliant ANY 1 Cluster with
      # an explicit `synchronous_commit: local` + transaction-mode Pooler) still
      # PASS. RED gate.
      - name: conftest CloudNativePG HA-tier bite (sync-quorum + pooler budget)
        run: bash deploy/kubernetes/policy/fixtures/run-cnpg-bite.sh

      # W1-T1 L4 idempotency guard for the CNPG superuser/replication credential
      # (ADR-0042 §1 / P1-W4 L4): a `helm upgrade` that REGENERATES the CNPG
      # password would sever every DB connection. Proves the dev-fallback uses the
      # `lookup` reuse-or-generate branch (upgrades reuse, never regenerate) and
      # that the reuse branch is byte-stable + returns the prior verbatim. helm +
      # python3 present on the runner. RED gate (no continue-on-error).
      - name: CNPG render-twice L4 idempotency guard
        run: bash ci/cnpg/render-twice.sh

      # W1-T4 (ADR-0044) — Redis Sentinel HA tier render + policy validation. The
      # Sentinel Redis/Sentinel StatefulSets + Services + config ConfigMap + the
      # Sentinel/Redis NetworkPolicy edges are OPT-IN (default OFF), so the default
      # `rendered.yaml` above does NOT contain them and the redis-sentinel.* conftest
      # rules pass vacuously there. This step renders the chart with the HA tier
      # ENABLED (services.redis.enabled=false — mutual exclusion) and runs
      # kubeconform + kube-linter + conftest on THAT render, so the Sentinel
      # manifests are actually schema/policy-gated in CI, not just locally.
      - name: Render + validate Redis Sentinel HA tier (ADR-0044)
        run: |
          set -o pipefail
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 \
            --set redisSentinel.enabled=true \
            --set services.redis.enabled=false | tr -d '\r' > rendered-redis-sentinel.yaml
          test -s rendered-redis-sentinel.yaml
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy,Cluster,Pooler \
            rendered-redis-sentinel.yaml
          kube-linter lint rendered-redis-sentinel.yaml --config deploy/kubernetes/.kube-linter.yaml
          conftest test rendered-redis-sentinel.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces

      # W1-T4 — Redis Sentinel HA-tier policy BITE (ADR-0044 §1). The conftest gate
      # above proves the COMPLIANT Sentinel render PASSES; this proves the
      # redis-sentinel.* rules actually BITE: NEGATIVE fixtures (AOF disabled, an
      # inlined requirepass / REDIS_PASSWORD literal, a 1-replica shard, a 1-Sentinel
      # quorum, a Sentinel that runs plain redis-server) are each DENIED, while
      # POSITIVE fixtures (compliant AOF config + 3-replica Redis + 3-Sentinel
      # StatefulSets) still PASS. RED gate.
      - name: conftest Redis Sentinel HA-tier bite (AOF + auth-by-ref + quorum + monitor)
        run: bash deploy/kubernetes/policy/fixtures/run-redis-sentinel-bite.sh

      # W1-T4 L4 idempotency guard for the dev Redis password the Sentinel tier
      # consumes by-reference (ADR-0044 §1 / P1-W4 L4): a `helm upgrade` that
      # REGENERATES it would sever every broker/replication/Sentinel-auth connection
      # (the CNPG case, for Redis). Proves the dev-fallback uses the `lookup`
      # reuse-or-generate branch (upgrades reuse, never regenerate), the reuse branch
      # is byte-stable + returns the prior verbatim, and the Sentinel/Redis pods
      # consume the password by-reference (no inline literal). helm + python3 present
      # on the runner. RED gate (no continue-on-error).
      - name: Redis Sentinel render-twice L4 idempotency guard
        run: bash ci/redis-sentinel/render-twice.sh

      # W4-T1 (ADR-0047 / ADR-0048 §3) — reduced-scale kind HA overlay render +
      # policy validation. The ephemeral kind HA topology (CNPG 1+2 + Redis
      # Sentinel 3+3 + KEDA per-queue workers + api HPA floor 2) is driven by the
      # values-kind-ha.yaml overlay the HA harness path (HA=1) layers on. This step
      # renders THAT overlay (the same one the live kind-harness-ha job applies) and
      # runs kubeconform + kube-linter + conftest + a Trivy IaC scan on it, so the
      # reduced-scale HA manifests are STATICALLY gated hard here even though the
      # LIVE bring-up (kind-harness-ha) is continue-on-error until W4-T2 promotes it.
      # ScaledObject/TriggerAuthentication (KEDA CRDs) + Cluster/Pooler (CNPG CRDs)
      # have no built-in schema so they are -skip'd for kubeconform (the conftest
      # cnpg.*/redis-sentinel.*/workerscale.* rules keep them policy-covered) — BUT a
      # policy rule cannot see an UNKNOWN field the live apply would reject (the
      # audit-W2 T7 spec.postgresql.runAsNonRoot rot, S1). So validate-cr-schemas.py
      # strict field-validates those CRs against the VENDORED pinned CRDs right here,
      # closing that gap; the CR-schema bite-proof step below proves it bites. The
      # static validate-ha-overlay.sh asserts the reduced-scale counts + mutual
      # exclusion + secure-by-default inheritance so a scale drift BITES.
      - name: Render + validate reduced-scale kind HA overlay (ADR-0047 / W4-T1)
        run: |
          set -o pipefail
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 \
            -f deploy/kubernetes/netops/values-kind-ha.yaml \
            --set mtls.postgres.enabled=true \
            --set mtls.postgres.certManager.enabled=false | tr -d '\r' > rendered-kind-ha.yaml
          test -s rendered-kind-ha.yaml
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy,Cluster,Pooler,ScaledObject,TriggerAuthentication \
            rendered-kind-ha.yaml
          # S1 (audit-W2 T7): kubeconform -skips the CNPG/KEDA CRs, so strict
          # field-validate them against the vendored pinned CRDs here — an unknown
          # field the live apply would reject (the runAsNonRoot class) fails CI now.
          python3 -c "import yaml" 2>/dev/null || pip install --quiet --disable-pip-version-check pyyaml
          python3 ci/kind/selftest/validate-cr-schemas.py rendered-kind-ha.yaml
          kube-linter lint rendered-kind-ha.yaml --config deploy/kubernetes/.kube-linter.yaml
          conftest test rendered-kind-ha.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces
          # Static HA-overlay invariants (reduced-scale counts stated, mutual
          # exclusion, mTLS preserved, no :latest) — RED gate, bites on scale drift.
          bash ci/kind/ha/validate-ha-overlay.sh

      # S1 (audit-W2 T7) — CR-schema guard NEGATIVE-CONTROL bite proof. Proves the
      # strict field-validation above actually BITES: a planted unknown field under
      # spec.postgresql turns it RED, and a vendored-CRD version drift vs the
      # install-operators pins fails too. No cluster; blocking (this job is in
      # all-gates), so the class that hid the runAsNonRoot rot can never recur silently.
      - name: CR-schema guard bite proof (S1 — CNPG/KEDA unknown-field class)
        run: bash ci/kind/selftest/validate-cr-schemas-bite.sh

      # W4-T1 — Trivy IaC misconfig scan over the reduced-scale HA render. Same
      # posture as the rendered.yaml / CNPG / Redis-Sentinel / KEDA scans (fixable
      # HIGH/CRIT, ignore-unfixed, sanctioned-deviation ignorefile) — the HA overlay
      # is its own object set (reduced counts + resource trims) and must be scanned
      # so a HIGH/CRITICAL misconfig isolated to it fails CI.
      - name: Trivy config scan (rendered kind HA overlay)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/kubernetes/.trivyignore
        with:
          scan-type: config
          scan-ref: rendered-kind-ha.yaml
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # W2-T3 (ADR-0043 §2/§3/§4) — KEDA per-queue worker ScaledObjects render +
      # policy validation. The ScaledObjects + per-queue worker Deployments +
      # TriggerAuthentications are OPT-IN (workerScaling.enabled, default OFF —
      # KEDA is an extra operator + CRDs NOT in the GA baseline), so the default
      # `rendered.yaml` above does NOT contain them and the workerscale.* conftest
      # rules pass vacuously there. This step renders the chart with the tier
      # ENABLED — and because the Sentinel-aware trigger requires a Sentinel to
      # discover (ADR-0043 §2), it enables the Redis Sentinel HA tier too
      # (redisSentinel.enabled=true / services.redis.enabled=false, the chart's
      # fail-fast guard) — then runs kubeconform + kube-linter + conftest on THAT
      # render, so the ScaledObjects are actually schema/policy-gated in CI, not
      # just locally. The ScaledObject + TriggerAuthentication are KEDA CRDs with
      # no built-in schema, so they are ADDED to the kubeconform -skip list FOR
      # THIS STEP ONLY (the workerscale.* conftest rules below keep them
      # policy-covered so the skip cannot hide a structural regression).
      - name: Render + validate KEDA per-queue worker ScaledObjects (ADR-0043)
        run: |
          set -o pipefail
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 \
            --set workerScaling.enabled=true \
            --set redisSentinel.enabled=true \
            --set services.redis.enabled=false | tr -d '\r' > rendered-keda.yaml
          test -s rendered-keda.yaml
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy,Cluster,Pooler,ScaledObject,TriggerAuthentication \
            rendered-keda.yaml
          kube-linter lint rendered-keda.yaml --config deploy/kubernetes/.kube-linter.yaml
          conftest test rendered-keda.yaml \
            --policy deploy/kubernetes/policy/rego \
            --all-namespaces

      # W2-T3 — KEDA ScaledObject policy BITE (ADR-0043 §2/§3/§4). The conftest
      # gate above proves the COMPLIANT render PASSES; this proves the
      # workerscale.* rules actually BITE: NEGATIVE fixtures (a packet SO targeting
      # a general Deployment — sandbox-pool escape; a plain redis scaler with a
      # static host pin — not Sentinel-aware; an inlined Redis password; a missing
      # maxReplicaCount ceiling — per-queue isolation hole) are each DENIED, while
      # the POSITIVE fixture (the compliant sandbox-pinned packet ScaledObject)
      # still PASSES. RED gate.
      - name: conftest KEDA ScaledObject bite (sandbox-pin + Sentinel trigger + cred-by-ref + ceiling)
        run: bash deploy/kubernetes/policy/fixtures/run-keda-scaledobject-bite.sh

      # The opt-in KEDA per-queue worker-scaling tier (rendered-keda.yaml) is its OWN
      # set of objects (per-queue worker Deployments + PDBs + ScaledObjects +
      # TriggerAuthentications) absent from rendered.yaml — kubeconform/kube-linter/
      # conftest gate it above, but the Trivy IaC misconfig gate must ALSO cover it,
      # else a HIGH/CRITICAL misconfig isolated to the KEDA tier (e.g. a missing
      # securityContext on a queue-worker pod, or a future chart addition) would not
      # fail CI. Same posture as the rendered.yaml / CNPG / Redis-Sentinel scans
      # (fixable HIGH/CRIT, ignore-unfixed, sanctioned-deviation ignorefile). F-ci-keda-trivy.
      - name: Trivy config scan (rendered KEDA worker-scaling tier)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/kubernetes/.trivyignore
        with:
          scan-type: config
          scan-ref: rendered-keda.yaml
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # W4-T4 L4 idempotency guard for the api/worker↔postgres mTLS cert material
      # (ADR-0039 §5 / P1-W4-LESSONS L4): a `helm upgrade` that REGENERATES the DB
      # certs would sever every connection. This proves the dev-fallback uses the
      # `lookup` reuse-or-generate branch (so upgrades reuse) and that a fresh
      # render produces internally-consistent, usable cert material. helm + python3
      # + openssl are all present on the runner. RED gate (no continue-on-error).
      - name: mTLS render-twice L4 idempotency guard
        run: bash ci/mtls/render-twice.sh

      # PR#76 round-2 #25 — external-Postgres + mTLS fail-fast guard. When the DB
      # is external (services.postgres.enabled=false) and DB-link mTLS is on, the
      # chart must REFUSE to render (no in-chart server cert / pg_hba) unless the
      # operator attests external mTLS via mtls.postgres.external.enabled=true.
      # Proves: (A) the unattested external combo FAILS fast, (B) the attested one
      # renders with NO in-chart pg_hba, (C) the in-chart pg path still renders.
      # RED gate (needs only helm).
      - name: external-Postgres + mTLS fail-fast guard
        run: bash ci/mtls/external-pg-failfast.sh

      # IaC misconfiguration scan (Trivy `config` target). GATING on its OWN
      # findings: exit-code 1 on fixable HIGH/CRITICAL misconfig, mirroring the
      # image-scan posture (ignore-unfixed). Scoped to IaC misconfig
      # (scan-type: config) and does NOT duplicate conftest — conftest asserts
      # our ADR-0029/0031 policy semantics; Trivy checks generic IaC
      # best-practice misconfig.
      #
      # SCOPE (W4-T6 fix): the scan-ref is the RENDERED manifest this task
      # hardens, NOT the raw chart dir. Trivy's Helm parser renders templates
      # with empty/default values and flags HIGH/CRIT (missing securityContext /
      # resource limits) that the chart actually mitigates at render time via
      # _helpers.tpl — gating over `deploy/` (un-rendered templates +
      # deploy/spatiumddi/, neither this task's artifact) is a false-positive
      # CI-regression risk. We gate the rendered.yaml the rest of the job
      # validated, plus deploy/docker (real compose + Dockerfile IaC this task
      # touches). No new image refs in W3/W4, so trivy image / cosign are N/A.
      # SANCTIONED-DEVIATION SUPPRESSION: deploy/kubernetes/.trivyignore lists the
      # ADR-0031 exceptions (seccomp-installer root/host-path, packet-capture
      # NET_RAW) that conftest already guards in a resource-scoped way. Trivy's
      # generic IaC rules cannot encode those exceptions, so they are suppressed
      # for THIS misconfig scan only (env scope) — the gate still fails on any
      # NEW/unexpected HIGH/CRITICAL misconfig.
      - name: Trivy config scan (rendered chart manifest)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/kubernetes/.trivyignore
        with:
          scan-type: config
          scan-ref: rendered.yaml
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # The opt-in CloudNativePG HA-tier render (rendered-cnpg.yaml) is its OWN set
      # of objects (Cluster/Pooler/PriorityClass/Pooler-NetworkPolicies/smoke Job)
      # absent from rendered.yaml — kubeconform/kube-linter/conftest gate it above,
      # but the Trivy IaC misconfig gate must ALSO cover it, else a HIGH/CRITICAL
      # misconfig isolated to the HA tier would not fail CI. Same posture as the
      # rendered.yaml scan (fixable HIGH/CRIT, ignore-unfixed, sanctioned-deviation
      # ignorefile).
      - name: Trivy config scan (rendered CloudNativePG HA tier)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/kubernetes/.trivyignore
        with:
          scan-type: config
          scan-ref: rendered-cnpg.yaml
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # The opt-in Redis Sentinel HA-tier render (rendered-redis-sentinel.yaml) is its
      # OWN set of objects (Redis + Sentinel StatefulSets / Services / config ConfigMap
      # / Sentinel+Redis NetworkPolicies) absent from rendered.yaml — kubeconform/
      # kube-linter/conftest gate it above, but the Trivy IaC misconfig gate must ALSO
      # cover it, else a HIGH/CRITICAL misconfig isolated to the HA tier would not fail
      # CI. Same posture as the rendered.yaml scan (fixable HIGH/CRIT, ignore-unfixed,
      # sanctioned-deviation ignorefile).
      - name: Trivy config scan (rendered Redis Sentinel HA tier)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IGNOREFILE: deploy/kubernetes/.trivyignore
        with:
          scan-type: config
          scan-ref: rendered-redis-sentinel.yaml
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Trivy config scan (docker compose + Dockerfiles)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/docker
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

  # Ephemeral kind cluster harness (P2 W4-T3, ADR-0039 §6 / ADR-0041 §2/§3). This
  # is the "kind for cheap" enforcement validation the two W4 enforcement tasks
  # assert against: it creates a throwaway kind cluster with an ENFORCING CNI
  # (Calico — kindnet ADMITS but does NOT enforce NetworkPolicy, ADR-0041 §2),
  # runs a CNI SELF-TEST (a harness default-deny MUST block a known egress, else
  # the run FAILS — the L1 false-green guard), applies the chart, runs the
  # assertion-runner (W4-T4 mTLS handshake + W4-T5 egress-deny checks plug in),
  # and tears the cluster down on exit (success OR failure) via a trap.
  #
  # NOT YET A BLOCKING GATE — promotion is AUTHORED but HELD pending the ADR-0048 §4
  # bite proof. This job is deliberately ABSENT from the `all-gates` aggregator
  # `needs` list below and its live `kind-harness.sh` step stays `continue-on-error`,
  # so the two live assertions run for SIGNAL only. It was NON-blocking at P2
  # (P1-W4-LESSONS L1: a new gating CI tool must be validated before it is required,
  # and the kind/CNI live path could not run on the P2 Windows authoring host — that
  # is still true on the W4 authoring host). ADR-0048 §4 (Prerequisite B,
  # "non-negotiable") requires both live assertions be SHOWN to turn the gate RED on
  # a planted regression, then reverted — on a CI ubuntu runner — BEFORE
  # `continue-on-error` is dropped and BEFORE this job joins `all-gates`; Alternative
  # 2 ("Promote without the bite proof") is Rejected. Prerequisite A (the reliable
  # enforcing-CNI W4-T1 HA topology) IS in place; only Prerequisite B (the EXECUTED
  # bite) is outstanding — it has NOT run on any runner (L1). Promoting now would be a
  # false-green blocking gate (the ADR-0048 Risk "worse than continue-on-error"), so
  # the promotion is held until a runner records the observed red→green. The STATIC
  # validator step (validate-harness.sh) + the assertion-library self-tests +
  # extract_secret.py tests stay blocking within the job regardless.
  kind-harness:
    name: kind-harness (enforcing-CNI self-test + mTLS/collector assertions — signal-only, opt-in; ADR-0048 Rejected, not promoted)
    # audit-W2 T7 (2026-07-03): NOT promoted — ADR-0048 Rejected. This LIVE kind path
    # applies the whole chart into a bare kind cluster (heavy; the platform's own
    # images are not loaded, so it cannot reach green without booting a slice of the
    # whole platform) and is NOT merge-blocking (absent from all-gates). To avoid
    # warning noise + ~20 min of runtime on unrelated PRs it runs ONLY on manual
    # dispatch or when a PR carries the `ci-kind` label. Blocking static coverage
    # (validate-harness.sh, the render + conftest gates, drill-bite-proofs) runs on
    # EVERY PR regardless — this gate is signal-only.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci-kind')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Static validator — no cluster needed. Asserts the harness artifacts carry
      # every load-bearing invariant (enforcing CNI install, disableDefaultCNI,
      # the self-test failure-on-no-block, pipefail, the teardown trap, the
      # runner's non-zero-on-failure contract). This step BITES on a silently
      # weakened harness and is reliable on any runner, so it is NOT
      # continue-on-error.
      - name: Validate harness invariants (static, no cluster)
        run: bash ci/kind/selftest/validate-harness.sh

      # Empirical self-tests for the assertion library (no cluster). These RUN
      # lib.sh as a real check subprocess and assert observable behaviour:
      #  - assert-trap-bite.sh: a recorded ASSERT_FAIL bites THROUGH a registered
      #    cleanup (N1 trap-clobber) and survives a leaked ASSERT_LIB_NO_TRAP (N5);
      #  - egress-probe-tristate.sh: a broken probe (nc missing / exec error) never
      #    reads as a confirmed deny (N4) and the deny retry polls correctly (N3).
      # Both carry negative controls, so they BITE if the fix regresses. Blocking.
      - name: Assertion-library self-tests (trap-bite + egress tristate, no cluster)
        run: |
          bash ci/kind/selftest/assert-trap-bite.sh
          bash ci/kind/selftest/egress-probe-tristate.sh

      # extract_secret.py hardening tests (N9 metadata-scoped name + N10 strict
      # base64). Stdlib-only; runs as a plain script so no pip install is needed.
      - name: mTLS extract_secret.py tests (no cluster)
        run: python3 ci/mtls/test_extract_secret.py

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      # kind brings up the throwaway cluster on the Docker backend the GH runner
      # already provides. The action installs the kind binary; the harness drives
      # create/CNI/self-test/apply/assert/teardown.
      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          install_only: true
          version: v0.24.0

      # The live enforcement run — NOT YET BLOCKING (continue-on-error: true).
      # W4-T2 was AUTHORED to promote this to blocking, but ADR-0048 §4 (Prerequisite
      # B, "non-negotiable") requires the two live assertions be SHOWN to turn the
      # gate RED on a planted regression — plant → red → revert → green — on a CI
      # ubuntu runner BEFORE `continue-on-error` is dropped and BEFORE this job joins
      # `all-gates`. Alternative 2 ("Promote without the bite proof") is explicitly
      # Rejected. Per P1-W4-LESSONS L1, kind CANNOT run on the authoring host (Windows,
      # no Docker/Linux kind), so that observed red→green run has NOT been executed
      # yet; until it is (and its run URL / planted→red→reverted commit pair is
      # recorded in docs/runbooks/kind-harness.md "Prove-it-bites"), promoting to
      # blocking would be a false-green blocking gate — the exact ADR-0048 Risk
      # ("worse than continue-on-error"). So this step stays SIGNAL-ONLY.
      # Prerequisite A (the reliable enforcing-CNI W4-T1 HA topology) IS in place;
      # only Prerequisite B (the executed bite) is outstanding. The static layers
      # above stay blocking within the job. Promotion is a deliberate later step once
      # a runner has produced the observed bite. Teardown is inside the harness trap,
      # so a failure here still deletes the cluster.
      - name: Run kind harness (create → CNI self-test → apply → assert → teardown)
        id: harness
        continue-on-error: true
        run: bash ci/kind/kind-harness.sh

      # Surface the live-run result in the job summary. The harness step is
      # continue-on-error (SIGNAL-ONLY — not yet blocking, ADR-0048 §4 bite proof
      # outstanding), so a non-success outcome does NOT fail the job; `if: always()`
      # keeps the summary line regardless. This step is informational only — it does
      # not (and must not) re-fail the job, or it would silently re-promote the gate
      # to blocking without the executed bite.
      - name: Report kind harness outcome
        if: always()
        run: |
          set -euo pipefail
          outcome='${{ steps.harness.outcome }}'
          echo "kind harness live-run outcome: ${outcome} (SIGNAL-ONLY — not yet blocking, ADR-0048 §4 bite proof pending)" >> "$GITHUB_STEP_SUMMARY"
          if [ "${outcome}" != "success" ]; then
            echo "::warning::kind-harness live run did not succeed (outcome=${outcome}) —" \
                 "this is currently SIGNAL-ONLY (not in all-gates needs). Promotion to a" \
                 "blocking gate awaits the ADR-0048 §4 planted-regression bite proof on a CI runner."
          fi

  # Cluster-free drill NEGATIVE-CONTROL bite proofs — the BLOCKING gate (P3 W4, ADR-0047
  # §2). Every W4 drill (T3–T7) ships a hardware-free *-bite.sh self-test that runs the
  # REAL drill against a fake kubectl (+ real promtool for T7) and asserts the negative
  # control turns it RED (plant → red → revert). These proofs need NO cluster and are
  # deterministic, so — unlike the live HA bring-up in kind-harness-ha (signal-only for
  # cluster-reliability reasons, ADR-0048 §3) — nothing prevents them from gating merge.
  # This job runs them as a REQUIRED check (it is in `all-gates` `needs`) so a drill that
  # STOPS BITING blocks merge (ADR-0047 §2 regression protection). The SAME steps also
  # run as a fail-fast guard inside kind-harness-ha before the expensive live kind
  # bring-up; THIS job is their authoritative merge gate. It promotes NO live drill — the
  # G-REL/G-SCA LIVE assertions stay signal-only (a deliberate W5/GA step, ADR-0048 §4).
  drill-bite-proofs:
    name: drill-bite-proofs (cluster-free negative-control bite proofs — blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # The bite-proof / harness scripts run repo-controlled shell right after
          # checkout and need no git auth — do NOT persist the token in .git/config
          # (least privilege; matches the persist-credentials:false job below).
          persist-credentials: false

      # validate-ha-overlay.sh renders the reduced-scale HA overlay → needs helm.
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      # promtool — the W4-T7 compressed-soak bite runs a REAL `promtool test rules` over
      # the W3-T2 recording rules + W3-T3 burn-rate alerts (same pin as the observability
      # job). pipefail so a masked fetch cannot read green (L5).
      - name: Install promtool (Prometheus) — for the W4-T7 compressed-soak SLO-held bite
        run: |
          set -o pipefail
          PROM_VERSION=2.53.2
          # Pin the official release digest (prometheus SHA256SUMS) and verify BEFORE
          # extract/install — a poisoned release asset must not execute as promtool in a
          # required CI gate. Mirrors the gitleaks download-verify pattern above.
          PROM_SHA256=60c126740c9cf1206b1e72150dd17914f1c3309bb7dc78a31d4670197ed4fa69
          curl -sSL -o /tmp/prometheus.tar.gz \
            "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          echo "${PROM_SHA256}  /tmp/prometheus.tar.gz" | sha256sum -c -
          tar -xzf /tmp/prometheus.tar.gz -C /tmp
          install "/tmp/prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool --version

      # Static harness invariants + reduced-scale HA overlay render/counts (no cluster).
      - name: Validate harness invariants incl. HA add-on (static, no cluster)
        run: bash ci/kind/selftest/validate-harness.sh
      - name: Validate reduced-scale HA overlay (render + counts, static)
        run: bash ci/kind/ha/validate-ha-overlay.sh

      # The five W4 drill negative-control bite proofs (plant → red → revert, no cluster).
      # BLOCKING — a drill that stops biting fails this required gate.
      - name: W4-T3 failover drill negative-control bite proof
        run: bash ci/kind/selftest/pg-failover-bite.sh
      - name: W4-T4 Neo4j rebuild drill negative-control bite proof
        run: bash ci/kind/selftest/neo4j-rebuild-bite.sh
      - name: W4-T5 worker-kill idempotency drill negative-control bite proof
        run: bash ci/kind/selftest/worker-kill-idempotency-bite.sh
      - name: W4-T6 queue-burst + API load + PgBouncer budget drill negative-control bite proof
        run: bash ci/kind/selftest/queue-burst-load-bite.sh
      - name: W4-T7 compressed-soak drill negative-control bite proof (real promtool + fake-kubectl)
        run: bash ci/kind/selftest/compressed-soak-bite.sh

  # Ephemeral HA kind topology (P3 W4-T1, ADR-0047 / ADR-0048 §3). This job stands
  # up the reduced-scale HA substrate the W4 drills (T3–T8) + the gate promotion
  # (T2) run against: the SAME enforcing-CNI kind harness as the P2 kind-harness
  # job, EXTENDED (HA=1) with the CloudNativePG operator + KEDA (pinned versions),
  # then the netops chart applied via the values-kind-ha.yaml overlay at REDUCED
  # SCALE — CNPG 1 primary + 2 replicas, Redis Sentinel 1+2 with 3 Sentinels (2-of-3
  # quorum), KEDA per-queue worker ScaledObjects, api HPA floor 2 — and gated on HA
  # readiness (a half-up topology must NOT read ready, L5 / ADR-0048 §3). The P2
  # mTLS + collector-egress assertions run UNCHANGED alongside (this job does not
  # touch the P2 kind-harness job, its continue-on-error, or the all-gates omission).
  #
  # NOT YET A BLOCKING GATE — deliberately ABSENT from `all-gates` `needs`, same as
  # the P2 kind-harness job. P1-W4-LESSONS L1: kind cannot run on the W4-T1 authoring
  # host (Windows, no Docker/Linux kind), so the LIVE HA bring-up is validated only
  # on this CI ubuntu runner, not locally. The RELIABILITY of this bring-up is the
  # explicit ADR-0048 §3 Prerequisite A for W4-T2 gate promotion; until W4-T2 has
  # exercised it green and dropped continue-on-error, this job runs for SIGNAL only.
  # The STATIC layers (validate-harness.sh HA invariants + validate-ha-overlay.sh) and
  # the drill negative-control bite proofs need no cluster and are BLOCKING within the
  # job — a fail-fast guard before the expensive live bring-up. Their AUTHORITATIVE
  # merge gate is the separate `drill-bite-proofs` job (in all-gates `needs`); the live
  # `HA=1 kind-harness.sh` step is continue-on-error.
  kind-harness-ha:
    name: kind-harness-ha (reduced-scale HA topology — CNPG + KEDA + Sentinel; signal-only, opt-in)
    # audit-W2 T7 (2026-07-03): same opt-in gate as kind-harness — signal-only, NOT
    # merge-blocking, silenced on unrelated PRs (runs on manual dispatch or the
    # `ci-kind` label). See ADR-0048 (Rejected) + docs/runbooks/kind-harness.md.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci-kind')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # This job runs the same repo-controlled bite/harness scripts post-checkout
          # and needs no git auth — do NOT persist the token (least privilege).
          persist-credentials: false

      # Static harness invariants — includes the W4-T1 HA add-on checks (pinned
      # operators, idempotent+retried install, readiness gating, reduced-scale
      # counts). No cluster; BITES on a silently weakened HA path. Blocking.
      - name: Validate harness invariants incl. HA add-on (static, no cluster)
        run: bash ci/kind/selftest/validate-harness.sh

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      # Static HA-overlay bite — renders the reduced-scale HA overlay + asserts the
      # stated counts / mutual exclusion / mTLS-preserved / no-:latest. No cluster.
      # Blocking (a scale drift or a broken overlay fails the job here, before the
      # live run). Uses helm only (kubeconform/kube-linter/conftest run over this
      # same overlay in the `infra` job's HA-render step — not duplicated here).
      - name: Validate reduced-scale HA overlay (render + counts, static)
        run: bash ci/kind/ha/validate-ha-overlay.sh

      # W4-T3 Postgres failover drill — NEGATIVE-CONTROL BITE PROOF (no cluster).
      # ADR-0047 §2 requires every drill's negative control be SHOWN to bite
      # (plant → red → revert), not merely asserted. The LIVE failover drill runs
      # only on the kind CNPG cluster (below, signal-only), which cannot run on the
      # authoring host (L1) — so this self-test earns the bite proof WITHOUT a
      # cluster: it runs the REAL pg-failover.sh check against a fake kubectl and
      # asserts the polarity — GREEN when every committed row survives, RED when the
      # async last row is LOST (the negative control), RED on no-promotion / slow
      # RTO. This step is BLOCKING within the job (it needs no cluster and BITES on a
      # drill that stopped biting); it is the hardware-free proof the drill is a real
      # gate, not green-at-setup (P1-W4 false-green).
      - name: W4-T3 failover drill negative-control bite proof (static, no cluster)
        run: bash ci/kind/selftest/pg-failover-bite.sh

      # W4-T4 Neo4j destroy-and-rebuild drill — NEGATIVE-CONTROL BITE PROOF (no
      # cluster). ADR-0047 §2 requires every drill's negative control be SHOWN to
      # bite (plant → red → revert), not merely asserted. The LIVE rebuild drill
      # runs only on the kind cluster (below, signal-only), which cannot run on the
      # authoring host (L1) — so this self-test earns the bite proof WITHOUT a
      # cluster: it runs the REAL neo4j-rebuild.sh check against a fake kubectl and
      # asserts the polarity — GREEN when the destroyed graph is fully re-projected
      # from Postgres (counts match the source of record), RED when the rebuild is
      # DISABLED (the negative control → graph never re-projected) or a PARTIAL
      # projection leaves fewer nodes/edges than Postgres holds. This step is
      # BLOCKING within the job (it needs no cluster and BITES on a drill that
      # stopped biting); it is the hardware-free proof the drill is a real gate, not
      # green-at-setup (P1-W4 false-green; ADR-0005 D5 rebuild-from-Postgres).
      - name: W4-T4 Neo4j rebuild drill negative-control bite proof (static, no cluster)
        run: bash ci/kind/selftest/neo4j-rebuild-bite.sh

      # W4-T5 worker-kill idempotency drill — NEGATIVE-CONTROL BITE PROOF (no
      # cluster). ADR-0047 §2 requires every drill's negative control be SHOWN to
      # bite (plant → red → revert), not merely asserted. The LIVE worker-kill drill
      # runs only on the kind cluster (below, signal-only), which cannot run on the
      # authoring host (L1) — so this self-test earns the bite proof WITHOUT a
      # cluster: it runs the REAL worker-kill-idempotency.sh check against a fake
      # kubectl and asserts the polarity — GREEN when a killed worker's task is
      # redelivered and completes EXACTLY-ONCE (1 snapshot / 1 audit row / 1 CR
      # transition, success >= 99%), RED when the idempotency guard is DISABLED (the
      # negative control → the redelivery DOUBLE-WRITES and the success rate
      # collapses), RED when the four-eyes gate would be bypassed or the CR
      # double-executes. This step is BLOCKING within the job (it needs no cluster
      # and BITES on a drill that stopped biting); it is the hardware-free proof the
      # drill is a real gate, not green-at-setup (P1-W4 false-green; ADR-0008
      # acks_late; ADR-0020 four-eyes). Real-PG-only exactly-once is corroborated on
      # the live kind CNPG cluster below (also asserted in backend/tests/pg/ behind
      # the blocking pg-integration job).
      - name: W4-T5 worker-kill idempotency drill negative-control bite proof (static, no cluster)
        run: bash ci/kind/selftest/worker-kill-idempotency-bite.sh

      # W4-T6 queue-burst KEDA + reduced-scale API load + PgBouncer budget drill —
      # NEGATIVE-CONTROL BITE PROOF (no cluster). ADR-0047 §2 requires every drill's
      # negative control be SHOWN to bite (plant → red → revert), not merely asserted.
      # The LIVE queue-burst/load drill runs only on the kind cluster (below,
      # signal-only), which cannot run on the authoring host (L1) — so this self-test
      # earns the bite proof WITHOUT a cluster: it runs the REAL queue-burst-load.sh
      # check against a fake kubectl and asserts the polarity — GREEN when a 10x
      # `discovery` burst scales the discovery Deployment OUT (its replica count
      # actually changes) then scales IN, siblings are NOT starved, the API p95 holds
      # with a 1->2-replica improvement + zero 5xx, and the PgBouncer pooler shows no
      # connection exhaustion; RED when the negative control emulates a SHARED scaler
      # that STARVES a sibling and overruns the PgBouncer budget (isolation + §330 +
      # §327 assertions bite), and RED when the burst never moves the replica count (a
      # burst that never scales out — the spec's false-green risk). This step is
      # BLOCKING within the job (it needs no cluster and BITES on a drill that stopped
      # biting); it is the hardware-free proof the drill is a real gate, not
      # green-at-setup (P1-W4 false-green; ADR-0043 §3 per-queue isolation; ADR-0042 §4
      # connection budget). Executed on the authoring host: 0 failure(s), drill exit 4
      # under the negative control, exit 1 on no-scale-out, exit 0 on the positive path.
      - name: W4-T6 queue-burst + API load + PgBouncer budget drill negative-control bite proof (static, no cluster)
        run: bash ci/kind/selftest/queue-burst-load-bite.sh

      # promtool — needed by the W4-T7 compressed-soak bite proof below, whose
      # LOAD-BEARING layer runs a REAL `promtool test rules` over the W3-T2 recording
      # rules + W3-T3 burn-rate alerts to prove the soak's "§6 SLOs held / no
      # burn-rate alert fires" assertion bites cluster-free. Same pin as the
      # `observability` job (2.53.2). pipefail so a masked fetch cannot read green (L5).
      - name: Install promtool (Prometheus) — for the W4-T7 compressed-soak SLO-held bite
        run: |
          set -o pipefail
          PROM_VERSION=2.53.2
          # Pin the official release digest (prometheus SHA256SUMS) and verify BEFORE
          # extract/install — a poisoned release asset must not execute as promtool in a
          # required CI gate. Mirrors the gitleaks download-verify pattern above.
          PROM_SHA256=60c126740c9cf1206b1e72150dd17914f1c3309bb7dc78a31d4670197ed4fa69
          curl -sSL -o /tmp/prometheus.tar.gz \
            "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          echo "${PROM_SHA256}  /tmp/prometheus.tar.gz" | sha256sum -c -
          tar -xzf /tmp/prometheus.tar.gz -C /tmp
          install "/tmp/prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool --version

      # W4-T7 compressed-soak drill — NEGATIVE-CONTROL BITE PROOF (no cluster).
      # ADR-0047 §2 requires every drill's negative control be SHOWN to bite (plant →
      # red → revert), not merely asserted. The LIVE soak drill runs only on the kind
      # HA cluster (below, signal-only), which cannot run on the authoring host (L1) —
      # so this self-test earns the bite proof WITHOUT a cluster in TWO layers:
      #  (1) the LOAD-BEARING layer runs a REAL `promtool test rules` over the ACTUAL
      #      W3-T2 recording rules + W3-T3 burn-rate alerts
      #      (deploy/observability/slo-compressed-soak.test.yaml): a HEALTHY
      #      compressed-soak-shaped window fires NO burn-rate alert (the §6 SLOs HELD),
      #      and the injected error-rate + latency perturbation the drill applies with
      #      the negative control DOES fire the burn-rate alert (a burn-rate breach →
      #      RED). This proves the soak's core assertion ("no burn-rate alert fires
      #      over the window") bites against the same rules Prometheus loads.
      #  (2) it runs the REAL compressed-soak.sh check against a fake kubectl and
      #      asserts the polarity — GREEN when the §6 SLIs stay within budget over the
      #      window + resources bounded, RED when the negative control injects an SLO
      #      regression (availability + latency budget breach over the window) AND a
      #      monotone resource leak (connection/RSS/queue-depth trend) → the SLO-held
      #      + bounded-trend assertions bite.
      # This step is BLOCKING within the job (it needs no cluster and BITES on a drill
      # that stopped biting); it is the hardware-free proof the drill is a real gate,
      # not green-at-setup (P1-W4 false-green; ADR-0046 §2/§6 SLOs/burn-rate; G-REL
      # §315 compressed). Executed on the authoring host: 0 failure(s) — promtool
      # SUCCESS (healthy silent + injected regression fires), drill exit 0 positive /
      # exit 8 under the negative control. The 30-day CALENDAR soak is NAMED
      # deferred-accepted → GA (ADR-0047 §4).
      - name: W4-T7 compressed-soak drill negative-control bite proof (real promtool + fake-kubectl, no cluster)
        run: bash ci/kind/selftest/compressed-soak-bite.sh

      # kind brings up the throwaway cluster on the Docker backend the GH runner
      # provides; the HA harness path installs the CNPG operator + KEDA on top.
      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          install_only: true
          version: v0.24.0

      # The LIVE reduced-scale HA bring-up. Stays continue-on-error / non-blocking:
      # W4-T2 scopes its (currently HELD) promotion to only the P2 `kind-harness`
      # G-SEC assertions (mTLS + collector egress), NOT this HA job. The reliable HA
      # substrate is ADR-0048 §3 Prerequisite A *for that* promotion; promoting these
      # G-REL/G-SCA HA drills to blocking is a deliberate later step (W5/GA). L1 —
      # not locally validated on the Windows authoring host; runs live only on this
      # runner. Teardown is inside the harness trap, so a failure here still deletes
      # the cluster (no leak).
      #
      # W4-T3 (ADR-0042 §2/§3/§7, G-REL §316): the assertion-runner this harness
      # invokes auto-discovers ci/kind/assertions/checks/pg-failover.sh — the live
      # Postgres FAILOVER drill (seed hash-chain-valid audit rows → KILL the CNPG
      # primary → assert AUTOMATED promotion + write service ≤60s from kill + ZERO
      # committed-audit loss on the promoted primary: COUNT + last-row present + no
      # seq gap + hash-chain intact). It runs on real PG (the kind CNPG cluster),
      # at REDUCED scale (CNPG instances=3 quorum minimum, ~25 seeded rows), and is
      # part of this SIGNAL-ONLY live run — the drill's blocking-promotion to
      # all-gates is a deliberate later step (W5/GA), NOT W4-T3. Its negative control
      # is proven to bite by the static step above.
      #
      # W4-T4 (ADR-0005 D5/§3, ADR-0030 §1, ADR-0047 §2/§3, G-REL §317): the same
      # assertion-runner also auto-discovers ci/kind/assertions/checks/neo4j-rebuild.sh
      # — the live Neo4j DESTROY-and-REBUILD drill (seed a fixed reduced-scale
      # topology into Postgres → destroy Neo4j pod + data PVC → re-project the WHOLE
      # inventory FROM POSTGRES via the W1-T3 auto-rebuild path → assert the rebuilt
      # node/edge counts MATCH the Postgres source of record within the MEASURED
      # topology-RTO; a partial/disabled rebuild fails). It runs on real PG + real
      # Neo4j (the kind cluster), at REDUCED scale, and is part of this SIGNAL-ONLY
      # live run — its blocking-promotion is a deliberate later step (W5/GA), NOT
      # W4-T4. Its negative control (disabled rebuild → topology mismatch) is proven
      # to bite by the W4-T4 static step above. The certified-scale topology-RTO
      # (< 30 min @ 5,000 devices) is NAMED deferred-accepted → GA (ADR-0047 §4).
      #
      # W4-T5 (ADR-0008 acks_late, ADR-0043 §6, ADR-0020 four-eyes, ADR-0047
      # §2/§3/§5, G-REL §319/§320): the same assertion-runner also auto-discovers
      # ci/kind/assertions/checks/worker-kill-idempotency.sh — the live WORKER-KILL
      # idempotency + Celery ≥99% drill (seed a fixed drill fixture into Postgres →
      # force-KILL a worker pod mid-run (acks_late redelivery) → drive the SAME
      # side-effecting tasks a second time on a surviving worker via the real W2-T4
      # code path → assert each completes EXACTLY-ONCE with no duplicate side effect
      # (1 snapshot / 1 audit row / 1 CR execution transition), the CR four-eyes gate
      # is not bypassed or double-executed, and Celery success ≥ 99% over the
      # compressed window). It runs on real PG (the kind CNPG cluster), at REDUCED
      # scale, and is part of this SIGNAL-ONLY live run — its blocking-promotion is a
      # deliberate later step (W5/GA), NOT W4-T5. Its negative control (idempotency
      # guard off → double-write / success collapse) is proven to bite by the W4-T5
      # static step above; the same exactly-once property is asserted on real PG in
      # backend/tests/pg/test_worker_idempotency_pg.py behind the blocking
      # pg-integration job. The certified-scale soak success (30-day calendar window)
      # is NAMED deferred-accepted → GA (ADR-0047 §4).
      #
      # W4-T6 (ADR-0043 §2/§3, ADR-0042 §4, ADR-0047 §1/§2/§3/§4, G-SCA §326–§330):
      # the same assertion-runner also auto-discovers
      # ci/kind/assertions/checks/queue-burst-load.sh — the live QUEUE-BURST KEDA +
      # reduced-scale API load + PgBouncer budget drill (LPUSH a 10x-normal `discovery`
      # depth into the REAL Redis list the KEDA scaler reads → assert the discovery
      # worker Deployment SCALES OUT (replica count actually changes) then SCALES IN
      # after the burst drains, WITHOUT starving config/docs/packet siblings (per-queue
      # isolation, §329); run a reduced-concurrency HTTP load (bash /dev/tcp, no
      # k6/locust dep) against the api Service and assert p95 held + a 1->2-replica
      # improvement + zero 5xx (§327); open concurrent connections through the
      # transaction-mode PgBouncer Pooler and assert NO connection exhaustion (§330,
      # ADR-0042 §4)). It runs on the kind HA cluster (real KEDA/HPA/PgBouncer), at
      # REDUCED scale (10x listLength burst, api floor 2/ceiling 4, tens of VUs), and
      # is part of this SIGNAL-ONLY live run — its blocking-promotion is a deliberate
      # later step (W5/GA), NOT W4-T6. Its negative control (shared scaler → sibling
      # starvation / connection-budget breach; a burst that never scales out) is proven
      # to bite by the W4-T6 static step above. The certified-scale G-SCA numbers
      # (500-device ≤60 min §326, 100-user p95<300 ms + 2->4 linearity §327, 5,000-device
      # projection §328) are NAMED deferred-accepted → GA (ADR-0047 §4).
      #
      # W4-T7 (ADR-0046 §1/§2/§6 SLOs/burn-rate, ADR-0047 §1/§2/§3/§4, G-REL §315
      # compressed): the same assertion-runner also auto-discovers
      # ci/kind/assertions/checks/compressed-soak.sh — the live COMPRESSED-SOAK drill
      # (drive STEADY mixed synthetic load — API reads via bash /dev/tcp + a steady
      # discovery/config/docs queue-job trickle — over a COMPRESSED window (minutes,
      # stated; representative of the SLO-held + no-slow-leak MECHANISM, NOT the 30-day
      # calendar SLA), sampling the §6 SLIs the W3-T2 recording rules derive MANY times
      # across the window → assert every SLI stayed WITHIN its error budget over the
      # SUSTAINED window (so NO W3-T3 burn-rate alert would fire — the SLOs HELD) AND
      # assert NO slow resource regression (PgBouncer server connections, worker RSS,
      # and queue depth stay BOUNDED START→END — a leak that would surface over
      # calendar time shows as a monotone upward trend → fail)). It runs on the kind HA
      # cluster (real api/workers/PgBouncer/Redis), at REDUCED scale (compressed
      # window, tens of VUs + a steady queue trickle), and is part of this SIGNAL-ONLY
      # live run — its blocking-promotion is a deliberate later step (W5/GA), NOT
      # W4-T7. Its negative control (an injected error-rate + latency perturbation → a
      # burn-rate breach over the window, plus a monotone resource leak) is proven to
      # bite by the W4-T7 static step above — which ALSO runs a real `promtool test
      # rules` over the actual W3-T2/W3-T3 rules (healthy window silent, injected
      # regression fires). The certified-scale G-REL §315 ceiling (the 30-day CALENDAR
      # soak meeting all §6 SLOs) is NAMED deferred-accepted → GA (ADR-0047 §4
      # promotion path: a 30-day staging window on a sized cluster; run the calendar
      # soak, assert §6 SLOs).
      - name: Run HA kind harness (create → CNI self-test → operators → apply → HA-ready → assert → teardown)
        id: ha-harness
        continue-on-error: true
        env:
          HA: "1"
        run: bash ci/kind/kind-harness.sh

      # Surface the live HA-run result in the job summary without flipping any
      # required aggregator. This HA job stays non-blocking (W4-T2 scopes its held
      # promotion to only the P2 kind-harness G-SEC assertions); a future W5/GA step
      # may drop continue-on-error above and add this job to the all-gates `needs` list.
      - name: Report HA kind harness outcome
        if: always()
        run: |
          set -euo pipefail
          outcome='${{ steps.ha-harness.outcome }}'
          echo "kind HA harness live-run outcome: ${outcome}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${outcome}" != "success" ]; then
            echo "::warning::kind-harness-ha live run did not succeed (outcome=${outcome}) —" \
                 "this job is NON-BLOCKING (L1: not locally validated on the authoring host;" \
                 "reduced-scale HA reliability is the ADR-0048 §3 prerequisite for W4-T2" \
                 "promotion). Investigate before promoting it to a required gate in W4-T2."
          fi

  # KMS-emulator integration gate (P1 W6-T2, ADR-0032 §2/§148). The offline
  # backend job drives the providers via in-memory doubles + contract tests; THIS
  # job is the real integration gate — it brings up the backend-shaped emulators
  # (LocalStack KMS + dev Vault Transit), installs the cloud SDK extras, creates
  # the keys, and exercises the REAL boto3/hvac adapters end-to-end. Azure has no
  # first-party local wrapKey/unwrapKey emulator (documented exception): its real
  # call shape is pinned by the contract test and a real Key Vault is lab-deferred.
  kms-emulators:
    name: kms-emulators (LocalStack KMS + dev Vault — provider integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend + KMS extras (aws + vault)
        run: pip install -e "./backend[dev,kms-aws,kms-vault]"

      # Bring up the emulators with a BOUNDED RETRY around the image pull + boot
      # (#7). A transient registry blip on `docker compose pull`/`up` (image-pull
      # 5xx, slow CDN) must not flake this REQUIRED gate — but the gate stays
      # required and blocking: after the retry budget is exhausted we exit non-zero
      # so a genuine boot failure still fails the job (never made non-blocking).
      #   - `pull` is retried separately so an image-pull blip is recovered before
      #     `up` even starts.
      #   - `up -d --wait` blocks until every service with a healthcheck reports
      #     healthy (localstack-kms + vault-transit define healthchecks in the
      #     compose file), replacing the prior fixed curl-poll loop with a
      #     healthcheck-gated wait. `--wait-timeout` bounds each attempt.
      - name: Bring up KMS emulators (retry pull + healthcheck-gated up)
        shell: bash
        run: |
          set -euo pipefail
          compose=(docker compose -f deploy/docker/docker-compose.kms-emulators.yml)
          attempts=3
          n=0
          until [ "$n" -ge "$attempts" ]; do
            n=$((n + 1))
            echo "::group::emulator bring-up attempt ${n}/${attempts}"
            if "${compose[@]}" pull --quiet && "${compose[@]}" up -d --wait --wait-timeout 120; then
              echo "emulators healthy"; echo "::endgroup::"; exit 0
            fi
            echo "bring-up attempt ${n} failed; dumping status + tearing down before retry"
            "${compose[@]}" ps || true
            "${compose[@]}" down -v || true
            echo "::endgroup::"
            # backoff between attempts; `|| true` so the final no-sleep branch does
            # not trip `set -e` when n == attempts.
            [ "$n" -lt "$attempts" ] && sleep $((n * 5)) || true
          done
          echo "::error::KMS emulators failed to come up healthy after ${attempts} attempts"
          exit 1

      # Belt-and-suspenders readiness assert on the two API surfaces the providers
      # call (LocalStack KMS health + Vault sys/health). `up --wait` already gated
      # on container health; this confirms the HTTP endpoints answer before the
      # provider exercise step.
      - name: Confirm LocalStack KMS + dev Vault endpoints answer
        shell: bash
        run: |
          set -euo pipefail
          curl -sf http://localhost:4566/_localstack/health >/dev/null
          curl -sf http://localhost:8200/v1/sys/health >/dev/null

      - name: Provision a LocalStack KMS key
        id: kms
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          ARN=$(aws --endpoint-url=http://localhost:4566 kms create-key \
            --query 'KeyMetadata.Arn' --output text)
          echo "key_arn=${ARN}" >> "$GITHUB_OUTPUT"

      - name: Provision the dev Vault Transit key
        shell: bash
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dev-only-root-token
        run: |
          set -euo pipefail
          curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" -X POST \
            "${VAULT_ADDR}/v1/sys/mounts/transit" \
            -d '{"type":"transit"}' || true   # already mounted is fine
          curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" -X POST \
            "${VAULT_ADDR}/v1/transit/keys/netops-kek" \
            -d '{"type":"aes256-gcm96","derived":true}'

      - name: Exercise AWS + Vault providers against the emulators (RED gate)
        working-directory: backend
        env:
          KMS_EMULATOR_TEST: "1"
          LOCALSTACK_KMS_ENDPOINT: http://localhost:4566
          KMS_KEY_ARN: ${{ steps.kms.outputs.key_arn }}
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dev-only-root-token
          VAULT_TRANSIT_KEY: netops-kek
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: pytest tests/integration/test_kms_emulators.py -v

      - name: Tear down emulators
        if: always()
        run: docker compose -f deploy/docker/docker-compose.kms-emulators.yml down -v

  # Postgres-backed test layer (P2 W5-T0). The offline backend job runs the unit
  # suite on in-memory aiosqlite, which silently passes code that is wrong under
  # PostgreSQL (the four documented W4 false-PASSes — NULLS FIRST ordering, a
  # unique index on a partitioned table, REVOKE UPDATE append-only, and the
  # prev_hash chain walk). THIS job re-asserts the W4 audit-hash-chain + credential
  # rotation controls against a REAL Postgres so the W5-T3 gate flip does not rest
  # on a backend that hides the bug it gates.
  #
  #   - `services: postgres` uses the pgvector/pgvector image (migration 0006 needs
  #     the `vector` extension); a stock postgres image would fail `alembic upgrade
  #     head`. The CI-native service is health-gated before the tests run (no
  #     Docker-in-test, L1).
  #   - The harness skips CLEANLY off-CI (no reachable Postgres) and BITES here on a
  #     regressed W4 control. `tests/pg/` is the marker-`integration` PG layer; it is
  #     NOT in the default SQLite smoke (separate job, additive).
  #   - `set -o pipefail` + `test -s` on the piped step (L5) so a broken PG step
  #     cannot mask its exit code as green.
  pg-integration:
    name: pg-integration (real PostgreSQL — W4 controls under PG)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No `needs`: runs in wave 1 (t=0). Merge-blocking is enforced by the
    # all-gates aggregator's direct `needs` entry; the PG layer shares no
    # artifacts with the unit-suite backend job (it installs and runs from
    # source), so the old `needs: [backend]` edge was pure scheduling.
    services:
      postgres:
        # pgvector image: the migration chain's `CREATE EXTENSION vector`
        # (migration 0006) requires it; a stock postgres would fail upgrade head.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: netops
          POSTGRES_PASSWORD: netops
          POSTGRES_DB: netops_test
        ports:
          - 5432:5432
        # Health-gate the service so the tests never race the boot (L1): the job
        # does not start steps until pg_isready reports healthy.
        options: >-
          --health-cmd "pg_isready -U netops -d netops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, dev extras)
        run: pip install -e "./backend[dev]"

      # The PG layer re-asserts the W4 controls against the real service. pipefail
      # + `test -s` (L5) so a broken PG step cannot read as green through the tee
      # pipe; an EMPTY pytest output (the binary never ran) also fails the gate.
      # NETOPS_TEST_DATABASE_URL points the harness's connection probe + alembic
      # upgrade head at the service; `-m integration` selects exactly this layer.
      - name: PG test layer (alembic upgrade head + W4 controls) — RED gate
        working-directory: backend
        shell: bash
        env:
          NETOPS_TEST_DATABASE_URL: postgresql+asyncpg://netops:netops@127.0.0.1:5432/netops_test
          NETOPS_ADMIN_PASSWORD: pg-ci-throwaway
        run: |
          set -o pipefail
          pytest tests/pg/ -m integration -v | tee pg-pytest-output.txt
          # Guard against a silent no-collection green (the harness skips off-CI;
          # here Postgres IS reachable, so the tests MUST actually run, not skip).
          test -s pg-pytest-output.txt
          if grep -qE '([1-9][0-9]* skipped)|no tests ran' pg-pytest-output.txt; then
            echo "::error::PG layer skipped or collected nothing — the service was not reachable; this gate must RUN and BITE."
            exit 1
          fi
          {
            echo "## PG-backed W4-control tests (real PostgreSQL)"
            echo ""
            echo '```text'
            tail -n 30 pg-pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Packet-analysis executor-split bite-proof (ADR-0049 §Acceptance). This is the
  # RE-ENABLE gate: ADR-0049 flips the service back on by default (compose profile
  # removed, Helm packet.analysis.enabled=true) only in the SAME PR this job is
  # green at HEAD. It builds the `packet-analysis` image (--target packet-analysis:
  # tshark + libseccomp) and runs the REAL `python -m app.engines.packet.executor`
  # under the REAL deployment posture (cap_drop ALL, non-root 10001, read-only
  # rootfs, the committed dispatcher seccomp profile). Four required legs:
  #   GREEN    — a real 1-packet pcap through the fully confined executor returns a
  #              schema-valid PacketFindings (packet_count>=1).
  #   DISPATCH — the REAL dispatcher seam (sandbox.run_executor/_spawn_and_reap,
  #              start_new_session=True) spawns+reaps the confined child UNDER the
  #              committed DISPATCHER profile (NOT unconfined) over a real pcap.
  #              Added for review F2: GREEN runs the executor as PID 1 and TIMEOUT
  #              runs unconfined, so no leg covered the dispatcher->child spawn
  #              under the deployed profile — exactly how the setsid omission (F1,
  #              EPERM on every Popen) stayed green. This leg makes that class BITE.
  #   RED      — `--self-test=socket|ptrace` under confinement is DENIED (exit 80,
  #              SELFTEST_DENIED / EPERM), with a NEGATIVE CONTROL: the same probe
  #              UNCONFINED (enforcement off) SUCCEEDS (exit 81, SELFTEST_NOT_CONFINED).
  #              If the negative control does not flip, the gate is not biting → fail.
  #   TIMEOUT  — a wedged executor whose tshark grandchild sleeps past the timeout is
  #              killed with its WHOLE process group (start_new_session + killpg); the
  #              driver asserts no orphan grandchild survives.
  # Linux-only (seccomp filter load is kernel-only): authored + syntax-checked on the
  # Windows dev host, LIVE run verified on this ubuntu runner. No `needs` — wave-1
  # like pg-integration; merge-blocking via the all-gates aggregator's `needs`.
  packet-analysis-bite-proof:
    name: packet-analysis-bite-proof (executor-split seccomp + tshark — Linux, ADR-0049 §Acceptance)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Repo-controlled shell + local docker only; no git auth needed.
          persist-credentials: false

      - name: Build packet-analysis image (--target packet-analysis; runs the build-time --self-check)
        run: |
          set -euo pipefail
          # The build also runs the ADR-0049 blocker-7 `executor --self-check`
          # (import pyseccomp + compile the packaged strict filter) — a missing
          # wheel/library/profile fails the BUILD here, before any leg below.
          docker build \
            --target packet-analysis \
            -f deploy/docker/backend.Dockerfile \
            -t netops-backend-packet:citest \
            .

      - name: GREEN — a real pcap through the fully confined executor returns PacketFindings
        shell: bash
        run: |
          set -euo pipefail
          fixture="${RUNNER_TEMP:-/tmp}/packet-fixture.pcap"
          python3 ci/packet/gen_fixture_pcap.py "$fixture"
          request='{"pcap_path":"/data/pcaps/tiny.pcap","display_filter":null,"tshark_bin":"tshark","timeout_seconds":30,"top_n":5,"enforced":true}'
          # REAL production posture: the committed DISPATCHER seccomp profile at the
          # container level (what compose/Helm apply); the executor child RE-CONFINES
          # with the strict no-socket profile before opening the pcap. cap_drop ALL +
          # non-root 10001 + read-only rootfs satisfy the executor's ADR-0031 §2
          # posture backstop; the tmpfs is the single writable scratch (TMPDIR).
          out="$(printf '%s' "$request" | docker run --rm -i \
            --security-opt seccomp=deploy/docker/seccomp/packet-analysis-dispatcher-seccomp.json \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --user 10001:10001 \
            --read-only \
            --tmpfs /tmp/pyshark:size=64m,mode=1777 \
            -e TMPDIR=/tmp/pyshark \
            -v "$fixture:/data/pcaps/tiny.pcap:ro" \
            netops-backend-packet:citest \
            python -m app.engines.packet.executor)"
          printf '%s' "$out" | python3 ci/packet/assert_findings.py

      - name: DISPATCH — the real dispatcher spawns+reaps the confined child UNDER the deployed dispatcher profile
        shell: bash
        run: |
          set -euo pipefail
          fixture="${RUNNER_TEMP:-/tmp}/packet-fixture.pcap"
          python3 ci/packet/gen_fixture_pcap.py "$fixture"
          # Review F2: drive the PRODUCTION dispatcher seam — sandbox.run_executor
          # -> _spawn_and_reap (start_new_session=True => CPython calls setsid() in
          # the forked child) — with the COMMITTED dispatcher seccomp profile at the
          # container level, exactly as compose/Helm deploy it. A profile that
          # denies any syscall the spawn path needs (the F1 setsid class) EPERMs
          # the Popen, the driver exits nonzero, and this leg goes RED. The child
          # still self-confines with the strict profile before reading the pcap;
          # the runner-side assert proves the round-trip produced schema-valid
          # PacketFindings from the real fixture.
          out="$(docker run --rm \
            --security-opt seccomp=deploy/docker/seccomp/packet-analysis-dispatcher-seccomp.json \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --user 10001:10001 \
            --read-only \
            --tmpfs /tmp/pyshark:size=64m,mode=1777 \
            -e TMPDIR=/tmp/pyshark \
            -v "$fixture:/data/pcaps/tiny.pcap:ro" \
            -v "$PWD/ci/packet:/ci:ro" \
            netops-backend-packet:citest \
            python /ci/dispatcher_spawn_driver.py)"
          printf '%s' "$out" | python3 ci/packet/assert_findings.py

      - name: RED — self-test probes DENIED under confinement, negative control FLIPS (proves the filter bites)
        shell: bash
        run: |
          set -uo pipefail
          # Run each probe with the CHILD filter as the only seccomp in play
          # (container seccomp=unconfined) so the executor's own strict filter is
          # provably what bites — for BOTH socket and ptrace. Confined (enforced=true)
          # => SELFTEST_DENIED (80); unconfined negative control (enforced=false) =>
          # SELFTEST_NOT_CONFINED (81). Exit codes: backend/app/engines/packet/executor.py.
          run_probe() {  # $1=probe  $2=enforced-json  -> stdout: executor exit code
            printf '{"pcap_path":"/tmp/pyshark/none.pcap","enforced":%s}' "$2" \
              | docker run --rm -i \
                  --security-opt seccomp=unconfined \
                  --security-opt no-new-privileges \
                  --cap-drop ALL \
                  --user 10001:10001 \
                  --read-only \
                  --tmpfs /tmp/pyshark:size=32m,mode=1777 \
                  -e TMPDIR=/tmp/pyshark \
                  netops-backend-packet:citest \
                  python -m app.engines.packet.executor --self-test="$1" \
              >/dev/null 2>&1
            echo $?
          }
          fail=0
          for probe in socket ptrace; do
            confined="$(run_probe "$probe" true)"
            negctl="$(run_probe "$probe" false)"
            echo "probe=$probe confined_exit=$confined negative_control_exit=$negctl"
            if [ "$confined" != "80" ]; then
              echo "::error::RED: $probe NOT denied under confinement (exit $confined, want 80 SELFTEST_DENIED) — child filter did not bite"
              fail=1
            fi
            if [ "$negctl" != "81" ]; then
              echo "::error::RED negative control: unconfined $probe did NOT succeed (exit $negctl, want 81 SELFTEST_NOT_CONFINED) — the gate proves nothing"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - name: TIMEOUT — a wedged executor + tshark grandchild are killed with the whole process group
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ci/packet/wedge_tshark.sh
          # The driver imports the REAL sandbox._spawn_and_reap and drives it with a
          # small outer timeout + large inner timeout so the DISPATCHER's killpg (not
          # the child's self-cleanup) is the reaper under test. --init reaps the
          # SIGKILLed grandchild so /proc reflects it gone.
          docker run --rm --init \
            --security-opt seccomp=unconfined \
            --tmpfs /tmp/pyshark:size=32m,mode=1777 \
            -e TMPDIR=/tmp/pyshark \
            -v "$PWD/ci/packet:/ci:ro" \
            netops-backend-packet:citest \
            python /ci/timeout_reap_driver.py

  # Dependency-lockfile drift gate (P3 W0-T8, closes the P1 systemic TODO "add a
  # dep lockfile — drift bit twice", PRODUCTION.md §10 deps-pinned-per-release /
  # §11 G-MNT no-silent-drift). The P1 `fastapi 0.137 include_router` break had
  # root cause "no lockfile": the manifest declared a range, so a fresh resolve
  # silently floated past the flattening boundary. This job asserts the COMMITTED
  # lockfiles equal a fresh deterministic resolve of the manifests, so a manifest
  # edit without a re-lock (or a hand-edited lock) is RED.
  #
  #   - Backend: backend/requirements.lock.txt is `uv pip compile pyproject.toml
  #     --extra dev --universal --generate-hashes --python-version 3.12`. uv is
  #     PINNED to the exact version the lock was generated with (UV_VERSION); a
  #     different uv version can reorder/re-resolve, so determinism requires the
  #     pin (L1: a new gating tool is pinned and proven). `--universal` emits
  #     platform-marker lines so the lock is host-independent — it recompiles
  #     byte-identically on linux-CI from the Windows authoring host (verified
  #     locally, see docs/security/supply-chain-scanning.md "Dependency lockfiles").
  #   - Frontend: `npm ci` already FAILS when package.json and package-lock.json
  #     are out of sync (it refuses to mutate the lock); the explicit
  #     `git diff --exit-code` after it is belt-and-braces against any in-place
  #     lock rewrite. RED on any drift.
  #   - Negative control (L1, "the gate must RUN and BITE"): the self-test step
  #     plants an out-of-lock edit in a SCRATCH COPY, runs the same recompile/diff
  #     logic, and FAILS THE JOB if that planted drift is NOT detected. It never
  #     touches the committed tree. This proves the gate bites without leaving a
  #     planted negative in the repo.
  lockfile:
    name: lockfile (backend + frontend dependency drift)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Pin uv to the exact version the committed lock was generated with. Bump
      # this AND re-lock together (docs/security/supply-chain-scanning.md).
      UV_VERSION: "0.11.19"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # This job runs `npm ci`, which can execute repo-controlled package
          # lifecycle scripts; don't leave the Actions token in local git config
          # where they could read it (zizmor artipacked / supply-chain hardening).
          persist-credentials: false

      - name: Install uv (pinned)
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Re-resolve the backend manifest and assert it equals the committed lock.
      # Drift (a dep added/changed in pyproject.toml without re-locking, or a
      # hand-edited lock) makes `git diff --exit-code` non-zero — RED gate.
      - name: Backend lockfile in sync with pyproject.toml — RED gate
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          uv pip compile pyproject.toml --extra dev --universal --generate-hashes \
            --python-version 3.12 --output-file requirements.lock.txt
          if ! git diff --exit-code -- requirements.lock.txt; then
            echo "::error::backend/requirements.lock.txt is out of sync with pyproject.toml." \
                 "Re-lock: cd backend && uv pip compile pyproject.toml --extra dev --universal" \
                 "--generate-hashes --python-version 3.12 --output-file requirements.lock.txt" \
                 "(then commit the lock). See docs/security/supply-chain-scanning.md."
            exit 1
          fi
          echo "backend lockfile: in sync."

      # Negative control: prove the recompile-and-compare logic actually BITES on
      # drift. Compile a fresh canonical lock from pyproject ONLY (uv reads no
      # tampered file as preferences, so it is the true canonical resolution),
      # plant a valid-but-wrong pin into a copy of the committed lock, and require
      # the comparison to find them DIFFERENT. If the planted drift is NOT caught,
      # the real gate above is a false-green and THIS step fails the job. The
      # committed tree is never modified.
      - name: Prove backend drift gate bites (planted negative, scratch copy)
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          scratch="$(mktemp -d)"
          cp requirements.lock.txt "$scratch/committed.lock"
          uv pip compile pyproject.toml --extra dev --universal --generate-hashes \
            --python-version 3.12 --output-file "$scratch/fresh.lock"
          # Plant drift: rewrite the fastapi pin to an obvious sentinel (models a
          # stale lock after a manifest bump, or a hand-edit). The match is
          # VERSION-AGNOSTIC (`^fastapi==.*`) so it keeps working across legitimate
          # fastapi pin updates; committed.lock is only diffed here, never re-parsed
          # by uv, so the sentinel need not be a valid version — it only has to
          # differ from the canonical resolution.
          sed -i -E 's/^fastapi==.*/fastapi==0.0.0-PLANTED-DRIFT/' "$scratch/committed.lock"
          # Self-check: if the pin wasn't found the tamper is a no-op and the
          # control would false-green — fail loudly instead.
          grep -q '^fastapi==0.0.0-PLANTED-DRIFT' "$scratch/committed.lock" || {
            echo "::error::negative control could not plant drift (no fastapi== line in lock)"; exit 1; }
          if diff -q "$scratch/fresh.lock" "$scratch/committed.lock" >/dev/null; then
            echo "::error::NEGATIVE CONTROL FAILED — planted lock drift was NOT detected;" \
                 "the drift gate is a false-green. Fix the gate before relying on it."
            exit 1
          fi
          echo "negative control: planted drift correctly detected (gate bites)."

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` itself refuses to run when package.json and package-lock.json are
      # out of sync (it errors instead of mutating the lock), so an unlocked
      # dependency change is already RED here. The `git diff --exit-code` after it
      # is defence-in-depth against any in-place lock rewrite.
      - name: Frontend lockfile in sync with package.json — RED gate
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm ci
          if ! git diff --exit-code -- package-lock.json; then
            echo "::error::frontend/package-lock.json drifted during npm ci." \
                 "Re-lock: cd frontend && npm install (then commit package-lock.json)."
            exit 1
          fi
          echo "frontend lockfile: in sync."

  # Observability SLO gate (P3 W3-T3, ADR-0046 §6; PRODUCTION.md §11 G-OBS §385).
  # Validates the SLO recording rules (W3-T2) AND the multi-window burn-rate alert
  # rules (W3-T3) with `promtool check rules`, runs the `promtool test rules` cases
  # (recording-rule semantics + the alert FIRING/healthy alert-as-test), and runs
  # the alert-as-test BITE proof (a muted, never-firing alert MUST fail its firing
  # test — the anti-false-green control). Cluster-free: promtool over synthetic
  # series, so it bites on every PR (ADR-0046 §0/§6). L5 (pipefail) + `test -s` so a
  # piped promtool invocation cannot mask a non-zero exit (the P1-W4 pipe-masks-exit
  # trap). This job is in the `all-gates` needs list below — a red promtool gate
  # blocks merge.
  observability:
    name: observability (promtool check + test + alert-as-test bite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install promtool (Prometheus)
        run: |
          set -o pipefail
          PROM_VERSION=2.53.2
          # Pin the official release digest (prometheus SHA256SUMS) and verify BEFORE
          # extract/install — a poisoned release asset must not execute as promtool in a
          # required CI gate. Mirrors the gitleaks download-verify pattern above.
          PROM_SHA256=60c126740c9cf1206b1e72150dd17914f1c3309bb7dc78a31d4670197ed4fa69
          curl -sSL -o /tmp/prometheus.tar.gz \
            "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          echo "${PROM_SHA256}  /tmp/prometheus.tar.gz" | sha256sum -c -
          tar -xzf /tmp/prometheus.tar.gz -C /tmp
          install "/tmp/prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool --version

      # `promtool check rules` validates the rule files load (syntax + PromQL parse)
      # for BOTH the W3-T2 recording rules and the W3-T3 burn-rate alerts. pipefail +
      # `test -s` guard so a piped/empty result cannot pass green.
      - name: promtool check rules (recording + burn-rate alerts)
        run: |
          set -o pipefail
          promtool check rules \
            deploy/observability/slo-recording.rules.yaml \
            deploy/observability/api-request-rate.rules.yaml \
            deploy/observability/slo-burn-rate.alerts.yaml | tee /tmp/promtool-check.out
          test -s /tmp/promtool-check.out

      # `promtool test rules` runs the semantic cases: the W3-T2 recording-rule
      # tests (the SLI computes the expected value on healthy + regressed series) and
      # the W3-T3 alert-as-test cases (each alert FIRES on a perturbed series and
      # stays SILENT on a healthy one). A green-at-setup alert that never fires fails
      # here (ADR-0046 §6).
      - name: promtool test rules (recording-rule semantics + alert firing/healthy)
        run: |
          set -o pipefail
          promtool test rules deploy/observability/slo-recording.rules.test.yaml | tee /tmp/promtool-rec.out
          test -s /tmp/promtool-rec.out
          promtool test rules deploy/observability/slo-burn-rate.alerts.test.yaml | tee /tmp/promtool-alert.out
          test -s /tmp/promtool-alert.out

      # BITE proof: the clean rules pass AND a MUTED (never-firing) alert fails its
      # firing test — proves the alert-as-test gate actually catches a false-green
      # alert before it is relied on (ADR-0046 §6; the carry-forward run-and-bite
      # rule). The mutation is on a temp copy; committed rules are untouched.
      - name: promtool alert-as-test bite proof
        run: bash deploy/observability/run-promtool-bite.sh

      # W3-T5 fault-injection MTTD harness (ADR-0046 §5; §386). Drives the three
      # synthetic §386 faults (DB down -> 5xx spike, queue stall -> discovery
      # success drop, LLM-provider failure -> first-token spill) and asserts the
      # corresponding fast/PAGE alert FIRES within MTTD < 5 min (firing at 3 m,
      # strictly < the budget), plus a healthy negative control per scenario that
      # stays silent. The window IS the assertion — not just "fires eventually".
      # Cluster-free: promtool over synthetic series at compressed timestamps; the
      # live-cluster MTTD run is named-deferred to W4/W5 (ADR-0046 §0/§5).
      - name: promtool fault-injection MTTD harness (< 5 min, 3 scenarios + neg controls)
        run: |
          set -o pipefail
          promtool test rules deploy/observability/slo-mttd.faultinjection.test.yaml | tee /tmp/promtool-mttd.out
          test -s /tmp/promtool-mttd.out

      # BITE proof for the MTTD gate (the run-and-bite rule for a NEW gate,
      # ADR-0046 §6): the clean rules detect each fault < 5 min AND fast alerts
      # SLOWED past the budget (for:2m -> for:6m) MUST fail the MTTD assertions —
      # proving the window is load-bearing, not a vacuous "fires eventually" check.
      # Mutation is on a temp copy; committed rules are untouched.
      - name: promtool fault-injection MTTD bite proof
        run: bash deploy/observability/run-mttd-bite.sh

      # W3-T4 golden-signal dashboards-as-code (ADR-0046 §4; §335). Visual
      # rendering is named-deferred (no live Grafana on the host) — the BITING
      # layer is this structural/coverage lint + the provisioning-ConfigMap
      # kubeconform below. The lint asserts all 9 §335 subjects × 4 golden
      # signals exist and every panel target binds to a known slo:/netops_*/
      # exporter series (a renamed base metric breaks the lint, ADR-0046 §4).
      - name: dashboard structural + coverage lint
        run: |
          set -o pipefail
          python3 deploy/observability/dashboards/lint_dashboards.py | tee /tmp/dash-lint.out
          test -s /tmp/dash-lint.out

      # BITE proof for the dashboard gate (the run-and-bite rule for a NEW gate):
      # the committed dashboards pass AND each of {missing golden signal, renamed
      # metric, dropped §335 subject} fails the lint, AND the canonical source ==
      # the chart-vendored copy (no embed drift). Mutations are on a temp copy.
      - name: dashboard-lint bite proof (+ vendor sync)
        run: bash deploy/observability/dashboards/run-dashboard-lint-bite.sh

      # The dashboards provision via the chart as a Grafana-sidecar ConfigMap and
      # are OFF by default (expose-don't-bundle), so the infra job's default render
      # does NOT cover them. Render WITH the flag on and kubeconform-validate the
      # provisioning ConfigMap here (the as-code provisioning is the biting layer,
      # not a live Grafana). pipefail + `test -s` guard a piped/empty render.
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Render + kubeconform the dashboards provisioning ConfigMap
        run: |
          set -o pipefail
          helm template netops deploy/kubernetes/netops \
            --namespace netops --kube-version 1.29.0 \
            --set observability.grafanaDashboards.enabled=true \
            | tr -d '\r' > /tmp/rendered-dashboards.yaml
          test -s /tmp/rendered-dashboards.yaml
          grep -q 'name: netops-grafana-dashboards' /tmp/rendered-dashboards.yaml
          kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -skip ClusterPolicy,Cluster,Pooler \
            /tmp/rendered-dashboards.yaml

  # Single required-check aggregator (P1 W6-T4). Branch protection should require
  # ONLY this job; it transitively depends on every gate, so a failure or skip of
  # ANY upstream job (dependency audits, secret scan, image/Trivy, chart/policy)
  # blocks merge atomically — no per-job required-checks list to keep in sync and
  # no orphan gate that is advisory-in-practice. `if: always()` makes this job run
  # even when a dependency fails; it then inspects the `needs.*.result` values and
  # FAILS unless every one is "success", so a failed OR skipped gate is a red gate.
  #
  # PROMOTION REJECTED (audit-W2 T7, 2026-07-03 — ADR-0048 Status: Rejected):
  # `kind-harness` is DELIBERATELY NOT in `needs` — permanently, by decision, no longer
  # "held pending a bite". Making the live run green requires booting a slice of the
  # whole hardened platform in a bare kind cluster (the platform's own images are not
  # loaded → ImagePullBackOff across api/worker/frontend/drills; the hardened Postgres
  # StatefulSet never reaches Ready), and the two controls it would gate (mTLS
  # plaintext-refusal, collector default-deny egress) are ALREADY enforced at runtime
  # and protected by BLOCKING static gates — the `infra` render + `conftest pg_hba
  # weak-hostssl` bite, the render-twice L4 guard, and `drill-bite-proofs`. The live
  # promotion added only marginal "the CNI physically enforces" coverage at the cost of
  # a permanent flaky ~20-min blocking gate + ongoing whole-platform-in-kind upkeep —
  # not worth it. So the live `kind-harness` step stays `continue-on-error` AND the job
  # is now opt-in (label `ci-kind` / manual dispatch), silenced on ordinary PRs. See
  # ADR-0048 "Rejection" + docs/runbooks/kind-harness.md "Gate status".
  #
  # DELIBERATE OMISSION (P3 W4-T1): `kind-harness-ha` also remains NOT in `needs`. Its
  # live reduced-scale HA bring-up (CNPG + KEDA + Sentinel) is `continue-on-error`
  # signal-only; promoting the G-REL/G-SCA HA drills to blocking is a deliberate
  # later step (W5/GA), not W4-T2. NOTE: only the LIVE bring-up is omitted — the
  # cluster-free drill negative-control bite proofs (ADR-0047 §2) ARE required via the
  # `drill-bite-proofs` job below, so a drill that stops biting blocks merge.
  #
  # DELIBERATE OMISSION (CI split): `docker-publish` is NOT in `needs`. It runs
  # only on push/tag events, and this aggregator fails on skipped results — a
  # push-only job here would wedge every PR. Its gating is upstream instead
  # (docker-publish `needs: [backend, frontend, docker]`), so nothing unsigned
  # or unscanned can publish; a docker-publish failure turns the main/tag run
  # red on its own. The every-event `docker` validation job IS required here.
  # PG-test routing heuristic (audit ARCH_DEBT #2). Flags a diff that adds
  # PostgreSQL-specific SQL/semantics to backend code without a matching
  # backend/tests/pg/ change (the SQLite unit suite is blind to those). ADVISORY
  # FOR NOW: deliberately NOT in the `all-gates` needs below, so a hit surfaces
  # in the checks list without blocking merge — a one-week false-positive soak.
  # PROMOTE TO BLOCKING by adding `pg-test-routing` to the all-gates `needs`
  # (no script change: ci/scripts/check-pg-test-routing.sh already exits non-zero
  # on a violation, proven to bite). See backend/tests/pg/README.md.
  pg-test-routing:
    name: pg-test-routing (SQLite-vs-PG coverage heuristic — advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for merge-base)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check PG-semantic changes ship a tests/pg/ test
        shell: bash
        run: |
          set -euo pipefail
          # PR: judge against the target branch; push: against origin/main.
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags --depth=200 origin "${GITHUB_BASE_REF}" || true
            base="origin/${GITHUB_BASE_REF}"
          else
            base="origin/main"
          fi
          bash ci/scripts/check-pg-test-routing.sh "$base"

  all-gates:
    name: all-gates (required-check aggregator)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [backend, frontend, security-scan, docker, infra, kms-emulators, pg-integration, packet-analysis-bite-proof, lockfile, observability, drill-bite-proofs]
    steps:
      - name: Assert every gate succeeded
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          echo "Upstream gate results: ${RESULTS}"
          IFS=',' read -ra results <<< "${RESULTS}"
          failed=0
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "::error::a required gate did not succeed (result=${r})"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "all-gates: FAIL — one or more required gates did not succeed."
            exit 1
          fi
          echo "all-gates: PASS — every required gate succeeded."
