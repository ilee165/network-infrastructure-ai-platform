# Dependabot configuration (D16 / ADR-0016): weekly dependency updates for every
# package ecosystem in the repo. CI (ci.yml) gates every update PR.
version: 2

updates:
  # Backend Python dependencies (backend/pyproject.toml).
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    labels:
      - dependencies
      - backend

  # Frontend npm dependencies (frontend/package.json + lockfile).
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    labels:
      - dependencies
      - frontend
    # Group interdependent toolchains so peer-linked packages bump together in a
    # single PR (a lone major bump breaks `npm ci` via ERESOLVE — see PR #12, #32,
    # #34, #36). Majors are ignored: they require a coordinated, human-driven
    # migration rather than an automated PR.
    groups:
      frontend-build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@testing-library/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions used by .github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci

  # Base images in deploy/docker/*.Dockerfile.
  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
