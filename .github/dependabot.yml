# Dependabot configuration (D16 / ADR-0016): monthly dependency updates for every
# package ecosystem in the repo. CI (ci.yml) gates every update PR. Monthly
# cadence (was weekly) cuts PR noise after the #143–#151 batch; security updates
# still open off-cycle when GitHub surfaces them. Operators may still open a
# manual bump PR any time.
#
# Cooldown (npm + pip): hold newly published versions 7 days before PRing them —
# most registry supply-chain compromises are caught within days of publish.
# Cooldown applies to VERSION updates only; security updates bypass it.
#
# Pip major ignores (scoped, not "*"): redis / paramiko / websockets majors are
# currently unresolvable under transitive caps (see docs/security/
# supply-chain-scanning.md "Dependabot triage"). A blanket major-ignore would
# suppress security updates — same rationale as the scoped npm ignores below.
version: 2

updates:
  # Backend Python dependencies (backend/pyproject.toml). Dependabot regenerates
  # backend/requirements.lock.txt (uv-compiled, hash-pinned) directly, so update
  # PRs pass the ci.yml lockfile-drift gate when the pin is resolvable (verified:
  # PR #138; counter-examples #146/#149/#151 — see ignore block).
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - backend
    # Majors blocked by transitive upper bounds today — Dependabot lock-only
    # edits fail the lockfile gate (uv recompile reverts). Lift an entry only
    # after upgrading the constraining package first (human PR; see
    # supply-chain-scanning.md).
    ignore:
      - dependency-name: "redis"
        update-types: ["version-update:semver-major"]   # kombu: redis<6.5 (#149)
      - dependency-name: "paramiko"
        update-types: ["version-update:semver-major"]   # netmiko: paramiko<5 (#146)
      - dependency-name: "websockets"
        update-types: ["version-update:semver-major"]   # langgraph-sdk: websockets<16 (#151)

  # Frontend npm dependencies (frontend/package.json + lockfile).
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - frontend
    # Group interdependent toolchains so peer-linked packages bump together in a
    # single PR (a lone major bump breaks `npm ci` via ERESOLVE — see PR #12, #32,
    # #34, #36).
    groups:
      frontend-build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@testing-library/*"
    # Majors for the peer-linked toolchains require a coordinated, human-driven
    # migration rather than an automated PR — but the ignore is SCOPED to those
    # toolchains, not "*": `ignore` also suppresses Dependabot SECURITY updates,
    # and a blanket major-ignore would silently drop a majors-only security fix
    # in a runtime dep (react-router-dom, @tanstack/react-query, zustand,
    # cytoscape, axe-core stay eligible for major PRs). NB: entries must be
    # explicit names, not "react*" — that wildcard would also match
    # react-router-dom and defeat the purpose.
    ignore:
      # React stack (framework majors are migrations).
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@testing-library/*"
        update-types: ["version-update:semver-major"]
      # Build/test stack.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest-axe"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
      # Lint stack.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript-eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "globals"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # CSS stack.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "postcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "autoprefixer"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by .github/workflows/. All actions are SHA-pinned
  # (ci.yml); Dependabot updates the pinned SHA and keeps the trailing `# vN`
  # comment in sync. Grouped so the ~9 pinned actions arrive as one monthly PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    groups:
      gha-all:
        patterns:
          - "*"

  # Base images in deploy/docker/*.Dockerfile. Deliberately NO cooldown: base-
  # image bumps are how OS CVE fixes arrive (Trivy image gate). Monthly cadence
  # can delay Dependabot-opened base bumps vs weekly — Trivy still gates every
  # CI image build, and a manual Dockerfile bump is always available off-cycle.
  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
