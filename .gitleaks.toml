# gitleaks configuration — CI secret scanning (P1 W6-T4, ADR-0016 D16 pipeline,
# ADR-0011 §6 no-secret posture).
#
# The CI `security-scan` job runs gitleaks over BOTH the working tree AND the full
# git history (`gitleaks detect`, no --no-git): a secret committed earlier and
# later removed is still exposed in history and must fail the gate.
#
# This file EXTENDS the upstream default rule set (extend.useDefault = true) — it
# does NOT replace it. We only add a *reviewed, scoped* allowlist. We never
# disable a rule globally and never blanket-ignore by broad secret-shaped regex
# (that would also hide a real planted secret). Each allowlist entry below has a
# justification; revisit at the stated re-review date.
#
# Triage / policy: docs/security/supply-chain-scanning.md.

title = "netops gitleaks config"

[extend]
# Inherit gitleaks' built-in detectors (AWS keys, generic-api-key, high-entropy,
# JWTs, private keys, etc.). New rules layer on top; nothing is weakened.
useDefault = true

# ---------------------------------------------------------------------------
# Reviewed allowlist — scoped to known false-positive surfaces ONLY.
# Re-review: 2026-12-31. An entry that outlives a removed fixture should be pruned.
# ---------------------------------------------------------------------------
[allowlist]
description = "Reviewed false-positive allowlist (test fixtures + frontend lockfile). Path-scoped, not regex-scoped, so real secrets in app/config/CI code still fail. The generated backend lockfile is deliberately NOT listed: gitleaks does not flag its --hash=sha256 integrity lines, so it is scanned normally and a real token/URL committed there still fails the gate."

# PATH-SCOPED (not content-scoped): the unit-test suites intentionally contain
# OBVIOUSLY-FAKE credential sentinels (e.g. "hunter2-super-secret",
# "FAKE-bam-session-token-zzz", "unit-test-password") to exercise auth /
# credential-encryption / drift code paths. These are not real secrets. They are
# additionally bandit-suppressed in-source (# noqa: S105/S106). Allowlisting the
# test trees keeps gitleaks' generic-api-key / high-entropy rules from wedging the
# gate on fixtures while leaving every NON-test path fully scanned.
#
# NOTE: a real secret hardcoded into application or deployment code (outside these
# test trees) is NOT covered by this allowlist and still fails the gate.
paths = [
  '''(^|/)backend/tests/''',
  '''(^|/)frontend/src/__tests__/''',
  # Generated dependency lockfiles: integrity hashes (sha512-.../sha256-...) trip
  # the high-entropy detector but are not secrets.
  '''(^|/)frontend/package-lock\.json$''',
  # This config file itself documents the allowed-path regexes above; do not let
  # gitleaks scan its own example strings.
  '''(^|/)\.gitleaks\.toml$''',
]
