{{- /*
W4-T4 render-twice REUSE-STABILITY fixture (not shipped). This reproduces the
EXACT dev-fallback reuse idiom from deploy/kubernetes/netops/templates/
mtls-postgres.yaml: when a prior Secret's material is present REUSE it verbatim
(index … | b64dec), else GENERATE a fresh self-signed triple. The production
template keys that decision on `lookup "v1" "Secret"`; here the prior is injected
through .Values.prior so render-twice.sh can PRIME the reuse path (helm template's
real lookup returns empty with no API server). The reuse branch below is
byte-for-byte the same Sprig calls the production template performs on upgrade —
so two renders with the same prior proving identical output proves the L4
upgrade-stability invariant for that idiom.
*/ -}}
{{- $p := .Values.prior -}}
{{- $caCrt := "" -}}{{- $srvCrt := "" -}}{{- $srvKey := "" -}}
{{- $cliCrt := "" -}}{{- $cliKey := "" -}}
{{- /* Mirror mtls-postgres.yaml's M4 (PR#76) FAIL-CLOSED reuse idiom: the reuse
branch is taken ONLY when the WHOLE triple (server cert+key+ca AND client cert+key)
is present AND every decoded member is NON-EMPTY; otherwise regenerate consistently.
A half-set / empty prior must NOT emit empty material (fail-open). */ -}}
{{- $srvPrior := (dict "data" (dict "tls.crt" ($p.srvCrt | b64enc) "tls.key" ($p.srvKey | b64enc) "ca.crt" ($p.caCrt | b64enc))) -}}
{{- $cliPrior := (dict "data" (dict "tls.crt" ($p.cliCrt | b64enc) "tls.key" ($p.cliKey | b64enc))) -}}
{{- $priorComplete := false -}}
{{- if and $srvPrior $srvPrior.data
        (hasKey $srvPrior.data "tls.crt") (hasKey $srvPrior.data "tls.key") (hasKey $srvPrior.data "ca.crt")
        $cliPrior $cliPrior.data
        (hasKey $cliPrior.data "tls.crt") (hasKey $cliPrior.data "tls.key") -}}
  {{- $pSrvCrt := index $srvPrior.data "tls.crt" | b64dec -}}
  {{- $pSrvKey := index $srvPrior.data "tls.key" | b64dec -}}
  {{- $pCaCrt := index $srvPrior.data "ca.crt" | b64dec -}}
  {{- $pCliCrt := index $cliPrior.data "tls.crt" | b64dec -}}
  {{- $pCliKey := index $cliPrior.data "tls.key" | b64dec -}}
  {{- if and (ne $pSrvCrt "") (ne $pSrvKey "") (ne $pCaCrt "") (ne $pCliCrt "") (ne $pCliKey "") -}}
    {{- $priorComplete = true -}}
    {{- $srvCrt = $pSrvCrt -}}{{- $srvKey = $pSrvKey -}}{{- $caCrt = $pCaCrt -}}
    {{- $cliCrt = $pCliCrt -}}{{- $cliKey = $pCliKey -}}
  {{- end -}}
{{- end -}}
{{- if not $priorComplete -}}
  {{- $ca := genCA "netops-db-ca" 3650 -}}
  {{- $srv := genSignedCert "netops-postgres" (list) (list "netops-postgres") 825 $ca -}}
  {{- $cli := genSignedCert "netops-db-client" (list) (list "netops-db-client") 825 $ca -}}
  {{- $caCrt = $ca.Cert -}}
  {{- $srvCrt = $srv.Cert -}}{{- $srvKey = $srv.Key -}}
  {{- $cliCrt = $cli.Cert -}}{{- $cliKey = $cli.Key -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: netops-db-ca-tls
type: Opaque
data:
  ca.crt: {{ $caCrt | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: netops-postgres-server-tls
type: kubernetes.io/tls
data:
  tls.crt: {{ $srvCrt | b64enc }}
  tls.key: {{ $srvKey | b64enc }}
  ca.crt: {{ $caCrt | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: netops-db-client-tls
type: kubernetes.io/tls
data:
  tls.crt: {{ $cliCrt | b64enc }}
  tls.key: {{ $cliKey | b64enc }}
  ca.crt: {{ $caCrt | b64enc }}
