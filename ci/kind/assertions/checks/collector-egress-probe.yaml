# W4-T5 collector/worker egress PROBE pod (ADR-0041 §3).
#
# The kind assertion (collector-egress.sh) execs a short-timeout TCP probe in this
# pod to prove, against the chart's NetworkPolicies in the install namespace:
#   * an ALLOWED egress — a named in-cluster service the worker reaches
#     (Postgres :5432, re-permitted by the §2 allow-worker-egress policy) —
#     SUCCEEDS;
#   * a DENIED egress — an arbitrary external destination (outside the device mgmt
#     subnet and the cluster) — is BLOCKED.
#
# The pod carries the SAME app labels as the worker Deployment
# (app.kubernetes.io/name=netops, app.kubernetes.io/component=worker) so EVERY
# policy that selects the worker selects it too: the `-default-deny-all` floor (all
# pods), `-allow-dns-egress` (DNS), `-allow-worker-egress` (the named data stores),
# and `-allow-collector-mgmt-egress` (the W4-T5 mgmt-subnet egress). It is thus
# subject to the exact egress posture a real worker pod has, which is what makes
# the allow/deny bite meaningful (ADR-0041 §3).
#
# Pinned by explicit tag (admission forbids :latest). netshoot carries nc for the
# TCP probe; the harness drives the probe via `kubectl exec`, so the entrypoint
# idles. Hardened to satisfy the cluster's restricted Pod Security baseline
# (ADR-0029 §3): non-root, no caps, RO-rootfs, seccomp RuntimeDefault, no
# privilege escalation. The probe never needs the K8s API — its token is dropped.
apiVersion: v1
kind: Pod
metadata:
  name: collector-egress-probe
  labels:
    # The WORKER labels — so the default-deny floor + the §2 worker-egress allow +
    # the W4-T5 collector mgmt-egress policy all select this probe exactly as they
    # select a real worker pod.
    app.kubernetes.io/name: netops
    app.kubernetes.io/component: worker
spec:
  automountServiceAccountToken: false
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: probe
      # netshoot carries nc for the egress probe; pinned explicit tag (no :latest).
      image: ghcr.io/nicolaka/netshoot:v0.13
      command: ["sleep", "3600"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
