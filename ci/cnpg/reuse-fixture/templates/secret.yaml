{{- /*
W1-T1 CNPG render-twice REUSE-STABILITY fixture (not shipped). Reproduces the
EXACT dev-fallback reuse idiom from deploy/kubernetes/netops/templates/
cloudnativepg-secret.yaml: when a prior Secret's password is present REUSE it
verbatim (index … | b64dec), else GENERATE a fresh randAlphaNum. The production
template keys that decision on `lookup "v1" "Secret"`; here the prior is injected
through .Values.prior so render-twice.sh can PRIME the reuse path (helm template's
real lookup returns empty with no API server). The reuse branch below is the same
Sprig calls the production template performs on upgrade — so two renders with the
same prior proving identical output proves the L4 upgrade-stability invariant.
*/ -}}
{{- $p := .Values.prior -}}
{{- $superData := dict -}}
{{- if ne $p.superuserPasswordB64 "" }}{{ $superData = (dict "password" $p.superuserPasswordB64) }}{{ end -}}
{{- $appData := dict -}}
{{- if ne $p.appPasswordB64 "" }}{{ $appData = (dict "password" $p.appPasswordB64) }}{{ end -}}
{{- /* Mirror cloudnativepg-secret.yaml: reuse the prior (base64) value when the
       key is present, else generate a fresh randAlphaNum 32. */ -}}
{{- $superPass := (hasKey $superData "password") | ternary (index $superData "password" | default "" | b64dec) (randAlphaNum 32) -}}
{{- $appPass := (hasKey $appData "password") | ternary (index $appData "password" | default "" | b64dec) (randAlphaNum 32) -}}
apiVersion: v1
kind: Secret
metadata:
  name: netops-cnpg-superuser
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: {{ $superPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: netops-cnpg-app
type: kubernetes.io/basic-auth
stringData:
  username: netops
  password: {{ $appPass | quote }}
