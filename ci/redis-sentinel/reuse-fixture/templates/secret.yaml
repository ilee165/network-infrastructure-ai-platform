{{- /*
W1-T4 Redis Sentinel render-twice REUSE-STABILITY fixture (not shipped). Reproduces
the EXACT dev-fallback reuse idiom from deploy/kubernetes/netops/templates/secret.yaml
for the `redis-password` key the Sentinel tier consumes by-reference: when a prior
Secret's value is present REUSE it verbatim (index … | b64dec), else GENERATE a fresh
randAlphaNum 32. The production template keys that decision on `lookup "v1" "Secret"`;
here the prior is injected through .Values.prior so render-twice.sh can PRIME the reuse
path (helm template's real lookup returns empty with no API server). The reuse branch
below is the same Sprig call the production template performs on upgrade — so two
renders with the same prior proving identical output proves the L4 upgrade-stability
invariant for the redis credential the Sentinel/Redis pods authenticate with.
*/ -}}
{{- $p := .Values.prior -}}
{{- $priorData := dict -}}
{{- if ne $p.redisPasswordB64 "" }}{{ $priorData = (dict "redis-password" $p.redisPasswordB64) }}{{ end -}}
{{- $redis := (hasKey $priorData "redis-password") | ternary (index $priorData "redis-password" | default "" | b64dec) (randAlphaNum 32) -}}
apiVersion: v1
kind: Secret
metadata:
  name: netops-dev-secrets
  annotations:
    netops.io/dev-secret: "true"
type: Opaque
stringData:
  redis-password: {{ $redis | quote }}
