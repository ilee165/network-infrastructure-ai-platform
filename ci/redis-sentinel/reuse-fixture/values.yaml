# Simulates the INSTALLED prior dev-secrets Secret that `lookup "v1" "Secret"` would
# return on a real `helm upgrade`. The render-twice script injects a fixed base64
# redis password here so the reuse branch has a deterministic prior to reuse; two
# renders with the same prior MUST be byte-identical (the L4 upgrade-stability
# invariant — a regenerated redis password would sever every broker/replication/
# Sentinel-auth connection).
prior:
  # When unset, the fixture takes the GENERATE branch (mirrors a fresh install with
  # an empty lookup); when set (base64), it takes the REUSE branch (upgrade).
  redisPasswordB64: ""
