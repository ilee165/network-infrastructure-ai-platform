# Alembic configuration (D4: Alembic owns the schema).
# The database URL is intentionally NOT set here — alembic/env.py reads
# NETOPS_DATABASE_URL through app.core.config.Settings so migrations use the
# exact same configuration source as the application.

[alembic]
script_location = alembic
prepend_sys_path = .

# Revision file slug per REPO-STRUCTURE §4.3 (P13): <rev>_<snake_case_summary>.py
file_template = %%(rev)s_%%(slug)s

# Run `alembic revision` with a descriptive -m message — required (P13).
truncate_slug_length = 60

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
